name: jthorvaldur.github.io
language:
  primary: html/javascript
  secondary:
    - python
    - latex
    - r

category: web-portfolio
owner: joel
visibility: public

uses:
  vector_db: false
  llm_agents: false
  web_publish: true
  github_actions: false

allowed_llm_providers:
  - anthropic

required_files:
  - INTENT.md
  - README.md
  - CLAUDE.md
  - .gitignore

forbidden_files:
  - .env
  - secrets.json
  - id_rsa
  - service_account.json
  - .passwords

update_hooks:
  deploy: scripts/sync_all.sh
