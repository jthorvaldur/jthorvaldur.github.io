<style>
:root { --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --bd:#30363d;
  --fg:#c9d1d9; --muted:#8b949e; --accent:#58a6ff;
  --jp:#f7768e; --ks:#e0af68; --cn:#9ece6a; --pg:#7aa2f7; --gr:#bb9af7; --ar:#ff9e64; --rr:#73daca; }
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'JetBrains Mono',monospace; background:var(--bg); color:var(--fg); overflow:hidden; }
.bar { position:fixed; top:0; left:0; right:0; height:48px; background:var(--bg2);
  border-bottom:1px solid var(--bd); display:flex; align-items:center; padding:0 12px; z-index:1000; gap:8px; }
.bar a { color:var(--accent); text-decoration:none; font-weight:600; font-size:13px; }
.bar .sp { flex:1; }
.bar select { background:var(--bg3); border:1px solid var(--bd); border-radius:5px;
  color:var(--fg); padding:4px 8px; font-size:11px; font-family:inherit; cursor:pointer; }
svg { position:fixed; top:48px; left:0; right:0; bottom:0; }
.node circle { stroke-width:2; cursor:pointer; transition:all .15s; }
.node text { font-size:8px; fill:var(--fg); pointer-events:none; font-family:'JetBrains Mono',monospace; }
.node:hover circle { stroke-width:4; filter:brightness(1.3); }
.link { stroke-opacity:0.25; fill:none; }
.tooltip { position:fixed; background:var(--bg2); border:1px solid var(--bd);
  border-radius:8px; padding:10px 14px; font-size:11px; pointer-events:none;
  z-index:2000; max-width:320px; box-shadow:0 4px 16px rgba(0,0,0,.5); }
.tooltip .tt-name { font-weight:700; font-size:13px; }
.tooltip .tt-detail { margin:4px 0; color:var(--fg); }
.tooltip .tt-meta { font-size:10px; color:var(--muted); }
.legend { position:fixed; bottom:12px; left:12px; background:var(--bg2); border:1px solid var(--bd);
  border-radius:8px; padding:10px 14px; font-size:10px; z-index:1000; }
.legend div { display:flex; align-items:center; gap:5px; margin:2px 0; }
.legend .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.stats { position:fixed; bottom:12px; right:12px; background:var(--bg2); border:1px solid var(--bd);
  border-radius:8px; padding:8px 12px; font-size:10px; color:var(--muted); z-index:1000; }
</style>
</head>

  facing:'#58a6ff', rear:'#f7768e', sitting:'#9ece6a', standing:'#e0af68',
  side:'#bb9af7', inverted:'#73daca', oral:'#ff9e64', special:'#8b949e'
};

const width = window.innerWidth;
const height = window.innerHeight - 48;

const svg = d3.select('#graph').attr('width', width).attr('height', height);
const g = svg.append('g');

// Zoom + pan
svg.call(d3.zoom().scaleExtent([0.2, 5]).on('zoom', e => g.attr('transform', e.transform)));

// Connection counts
const connCount = {};
data.nodes.forEach(n => connCount[n.id] = 0);
data.edges.forEach(e => {
  connCount[e.source] = (connCount[e.source]||0) + 1;
  connCount[e.target] = (connCount[e.target]||0) + 1;
});

// Force simulation
const simulation = d3.forceSimulation(data.nodes)
  .force('link', d3.forceLink(data.edges).id(d => d.id).distance(90).strength(d => d.similarity * 0.5))
  .force('charge', d3.forceManyBody().strength(-250))
  .force('x', d3.forceX(width / 2).strength(0.04))
  .force('y', d3.forceY(height / 2).strength(0.04))
  .force('collision', d3.forceCollide().radius(d => Math.sqrt(connCount[d.id]||1) * 5 + 14));

// Edges
const link = g.append('g').selectAll('line')
  .data(data.edges).join('line')
  .attr('class', 'link')
  .attr('stroke', d => catColors[d.cat] || '#555')
  .attr('stroke-width', d => d.similarity * 3)
  .attr('stroke-opacity', d => d.similarity * 0.5);

// Nodes
const node = g.append('g').selectAll('.node')
  .data(data.nodes).join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end', (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
  );

node.append('circle')
  .attr('r', d => Math.sqrt(connCount[d.id]||1) * 4 + 6)
  .attr('fill', d => d.color)
  .attr('stroke', d => catColors[d.cat] || '#555')
  .attr('opacity', 0.85);

node.append('text')
  .text(d => d.name.length > 18 ? d.name.slice(0,16)+'...' : d.name)
  .attr('dy', d => Math.sqrt(connCount[d.id]||1) * 4 + 18)
  .attr('text-anchor', 'middle')
  .style('font-size', d => connCount[d.id] > 3 ? '9px' : '7px')
  .style('font-weight', d => connCount[d.id] > 3 ? '600' : '400');

// Tooltip
const tooltip = d3.select('#tooltip');
node.on('mouseover', (e, d) => {
  const conns = data.edges.filter(l => (l.source.id||l.source)===d.id || (l.target.id||l.target)===d.id);
  tooltip.style('display', 'block')
    .style('left', (e.pageX+14)+'px').style('top', (e.pageY-10)+'px')
    .html(`<div class="tt-name" style="color:${d.color}">${d.name}</div>
      <div class="tt-detail">${d.tradDisplay} &middot; ${d.cat}</div>
      <div class="tt-meta">${connCount[d.id]} connections</div>
      <div class="tt-meta" style="margin-top:4px">${conns.slice(0,5).map(c => {
        const other = (c.source.id||c.source)===d.id ? (c.target.name||c.target) : (c.source.name||c.source);
        return `${(c.similarity*100).toFixed(0)}% ${other}`;
      }).join('<br>')}</div>`);
  // Highlight connected
  const connected = new Set(conns.map(c => c.source.id||c.source).concat(conns.map(c => c.target.id||c.target)));
  node.style('opacity', n => connected.has(n.id) || n.id===d.id ? 1 : 0.12);
  link.style('opacity', l => (l.source.id||l.source)===d.id || (l.target.id||l.target)===d.id ? 0.8 : 0.03);
}).on('mouseout', () => {
  tooltip.style('display', 'none');
  node.style('opacity', 0.85);
  link.style('opacity', d => d.similarity * 0.5);
});

// Tick
simulation.on('tick', () => {
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Filters
let activeTrad = 'all', activeCat = 'all', activeSim = 0.85;
function applyFilters() {
  node.style('opacity', d => {
    if (activeTrad !== 'all' && d.tradition !== activeTrad) return 0.08;
    if (activeCat !== 'all' && d.cat !== activeCat) return 0.08;
    return 0.85;
  });
  link.style('opacity', d => {
    if (d.similarity < activeSim) return 0.02;
    const s = d.source, t = d.target;
    if (activeTrad !== 'all' && s.tradition !== activeTrad && t.tradition !== activeTrad) return 0.02;
    if (activeCat !== 'all' && d.cat !== activeCat) return 0.02;
    return d.similarity * 0.5;
  });
  link.attr('stroke-width', d => d.similarity < activeSim ? 0.3 : d.similarity * 3);
}
window.filterTradition = v => { activeTrad = v; applyFilters(); };
window.filterCategory = v => { activeCat = v; applyFilters(); };
window.filterSimilarity = v => { activeSim = v; applyFilters(); };
applyFilters();

// Stats
document.getElementById('stats').innerHTML =
  `${data.nodes.length} positions | ${data.edges.length} mappings<br>` +
  `Drag nodes &middot; Scroll to zoom &middot; Hover for details`;
</script>
</body></html>
