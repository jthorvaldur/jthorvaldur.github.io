    font-weight: 700; border-radius: 4px; cursor: pointer;

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

function b64ToArr(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decrypt() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  try {
    const salt = b64ToArr(BLOB.salt);
    const iv = b64ToArr(BLOB.iv);
    const data = b64ToArr(BLOB.data);
    const key = await deriveKey(pw, salt);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
    const html = new TextDecoder().decode(decrypted);
    // Store auth in sessionStorage so index can link without re-prompting
    sessionStorage.setItem('qwl_auth', '1');
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}
