<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daylight — Protected</title>
<style>
:root{--bg:#fefcf8;--card:#ffffff;--border:#e8dcc8;--text:#2c2416;--text2:#8c7d66;--accent:#c47a1a;--accent-hover:#a06315;--red:#b44a3f}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',-apple-system,sans-serif;background:linear-gradient(180deg,#fdf6e8 0%,#fefcf8 100%);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:400px;width:100%;box-shadow:0 4px 24px rgba(44,36,22,0.08)}
.login-card h1{font-family:'Libre Baskerville',Georgia,serif;font-size:24px;font-weight:400;margin-bottom:8px;text-align:center}
.login-card .tagline{font-family:'Libre Baskerville',Georgia,serif;font-size:15px;font-style:italic;color:var(--text2);text-align:center;margin-bottom:24px}
.input-group{position:relative;margin-bottom:16px}
.input-group input{width:100%;padding:12px 16px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.2s;font-family:inherit}
.input-group input:focus{border-color:var(--accent)}
.btn{width:100%;padding:12px;font-size:15px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:background 0.2s;font-family:inherit}
.btn:hover{background:var(--accent-hover)}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.error{color:var(--red);font-size:13px;margin-top:10px;display:none;text-align:center}
.sun{display:block;margin:0 auto 20px}
</style>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-card" id="loginCard">
  <svg class="sun" width="48" height="48" viewBox="0 0 64 64" fill="none">
    <circle cx="32" cy="32" r="16" fill="#e8a840" opacity="0.2"><animate attributeName="r" values="14;18;14" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="32" cy="32" r="10" fill="#c47a1a" opacity="0.4"><animate attributeName="r" values="9;11;9" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="32" cy="32" r="5" fill="#c47a1a"/>
  </svg>
  <h1>Daylight</h1>
  <p class="tagline">See your case clearly.</p>
  <form id="loginForm" onsubmit="return handleSubmit(event)" autocomplete="on">
    <input type="hidden" name="username" autocomplete="username" value="thorarinson-daylight">
    <div class="input-group">
      <input type="password" id="pwd" name="password" placeholder="Password" autofocus autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="submitBtn">Unlock</button>
    <div class="error" id="error">Incorrect password.</div>
  </form>
</div>

function b64d(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
async function decrypt(p){
const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(p),"PBKDF2",false,["deriveKey"]);
const k=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(SALT),iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
return new TextDecoder().decode(await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(IV)},k,b64d(CT)));
}
async function handleSubmit(e){
e.preventDefault();
const p=document.getElementById("pwd").value;if(!p)return false;
const btn=document.getElementById("submitBtn"),err=document.getElementById("error");
btn.disabled=true;btn.textContent="Decrypting...";err.style.display="none";
try{const h=await decrypt(p);try{sessionStorage.setItem("daylight_key",p)}catch(x){}
try{if(window.PasswordCredential){navigator.credentials.store(new PasswordCredential({id:"thorarinson-daylight",password:p}))}}catch(x){}
document.open();document.write(h);document.close()}
catch(e){err.style.display="block";btn.disabled=false;btn.textContent="Unlock"}
return false}
(async function(){let s=null;try{s=sessionStorage.getItem("daylight_key")}catch(x){}
if(s){try{const h=await decrypt(s);document.open();document.write(h);document.close();return}catch(e){try{sessionStorage.removeItem("daylight_key")}catch(x){}}}})();
</script>
