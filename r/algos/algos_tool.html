<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Algorithm Explorer — div_legal</title>
<style>
:root {
  --bg: #0e1014;
  --panel: #161922;
  --panel-2: #1c2030;
  --edge: #1f2330;
  --edge-hot: #3a3f56;
  --ink: #e7e9ee;
  --ink-dim: #9aa3b2;
  --ink-faint: #5d6577;
  --accent: #f5a623;
  --accent-dim: #8a5d12;
  --L1: #4ec9b0;
  --L2: #c586c0;
  --L3: #e06c75;
  --meta: #61afef;
  --vocab: #e5c07b;
  --phil: #d19a66;
  --unscored: #6b7280;
  --chip: #2c3140;
  --chip-on: #3d4566;
  --chip-on-text: #e7e9ee;
  --good: #5ed46f;
  --warn: #f5a623;
  --bad: #e06c75;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font: 13px/1.55 'Inter', 'SF Pro Text', -apple-system, system-ui, sans-serif;
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr;
  grid-template-areas: "header header" "sidebar main";
  min-height: 100vh;
}
header {
  grid-area: header;
  padding: 16px 24px;
  border-bottom: 1px solid var(--edge);
  background: var(--panel);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
h1 {
  margin: 0;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -.01em;
}
header .meta { color: var(--ink-dim); font-size: 11px; }
header .right { margin-left: auto; display: flex; gap: 8px; }
button.view-btn {
  background: var(--chip);
  color: var(--ink-dim);
  border: 1px solid var(--edge-hot);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font: inherit;
  font-size: 12px;
}
button.view-btn.active { background: var(--accent); color: #1a1814; border-color: var(--accent); }
input.search {
  background: var(--panel-2);
  border: 1px solid var(--edge-hot);
  border-radius: 6px;
  color: var(--ink);
  font: inherit;
  font-size: 12px;
  padding: 6px 10px;
  width: 260px;
}
aside {
  grid-area: sidebar;
  background: var(--panel);
  border-right: 1px solid var(--edge);
  padding: 16px 18px;
  overflow-y: auto;
  max-height: calc(100vh - 60px);
  position: sticky;
  top: 60px;
}
aside h3 {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin: 18px 0 8px;
  padding-top: 12px;
  border-top: 1px dashed var(--edge-hot);
}
aside h3:first-child { padding-top: 0; border-top: 0; margin-top: 0; }
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.filter-chip {
  background: var(--chip);
  color: var(--ink-dim);
  padding: 2px 8px;
  border-radius: 9px;
  font-size: 11px;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .12s;
}
.filter-chip:hover { border-color: var(--edge-hot); }
.filter-chip.on { background: var(--chip-on); color: var(--chip-on-text); border-color: var(--accent-dim); }
.filter-chip .count {
  color: var(--ink-faint);
  margin-left: 4px;
  font-size: 10px;
}
.filter-chip.on .count { color: var(--accent); }
main {
  grid-area: main;
  padding: 16px 24px 64px;
  overflow-x: auto;
}
.stats-bar {
  display: flex;
  gap: 24px;
  font-size: 11px;
  color: var(--ink-dim);
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--edge-hot);
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.stats-bar strong { color: var(--ink); font-size: 14px; }
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px;
}
article.algo {
  background: var(--panel);
  border: 1px solid var(--edge);
  border-radius: 6px;
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color .12s;
}
article.algo:hover { border-color: var(--edge-hot); }
article.algo.expanded { border-color: var(--accent-dim); background: var(--panel-2); }
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 6px;
}
.card-head h4 {
  margin: 0;
  font: inherit;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
}
.layer-badge {
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 9px;
  font-weight: 600;
  letter-spacing: .04em;
}
.layer-badge.meta { background: var(--meta); color: #06121e; }
.layer-badge.L1_demand { background: var(--L1); color: #062019; }
.layer-badge.L2_refuse { background: var(--L2); color: #1f0a1e; }
.layer-badge.L3_expose { background: var(--L3); color: #2a0a0c; }
.layer-badge.vocab { background: var(--vocab); color: #1c1606; }
.layer-badge.phil { background: var(--phil); color: #1b0f06; }
.layer-badge.unscored { background: var(--unscored); color: #0e1014; }
.factor-row {
  font-size: 10px;
  color: var(--ink-faint);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  margin: 4px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.factor-row .k { color: var(--ink-dim); }
.lev {
  font-weight: 600;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px;
}
.lev.l5, .lev.l4 { color: var(--good); }
.lev.l3 { color: var(--warn); }
.lev.l2, .lev.l1, .lev.l0 { color: var(--bad); }
.detail {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--edge-hot);
  font-size: 12px;
}
article.algo.expanded .detail { display: block; }
.detail .lbl { color: var(--accent); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
.detail .row { margin: 6px 0; }
.detail .vocab span {
  background: var(--chip);
  color: var(--ink-dim);
  padding: 1px 6px;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  margin-right: 3px;
  display: inline-block;
  margin-bottom: 3px;
}
.detail .source {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  word-break: break-all;
}
.detail .preview {
  background: var(--bg);
  border-left: 2px solid var(--edge-hot);
  padding: 8px 10px;
  margin-top: 6px;
  color: var(--ink-dim);
  font-size: 11px;
  white-space: pre-wrap;
}
table.matrix {
  border-collapse: collapse;
  margin-top: 14px;
}
table.matrix th, table.matrix td {
  border: 1px solid var(--edge);
  padding: 5px 8px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  vertical-align: middle;
  min-width: 50px;
}
table.matrix th {
  background: var(--panel);
  color: var(--ink-dim);
  font-weight: 600;
}
table.matrix th.corner { background: transparent; border: 0; }
table.matrix th.row {
  text-align: right;
  background: var(--panel-2);
}
table.matrix td.gap {
  background: rgba(224, 108, 117, 0.10);
  color: var(--bad);
  cursor: default;
}
table.matrix td.has {
  background: rgba(94, 212, 111, 0.07);
  cursor: pointer;
}
table.matrix td.has:hover { background: rgba(94, 212, 111, 0.18); }
table.matrix td .cell-count { color: var(--good); font-weight: 600; }
.axis-pickers {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--ink-dim);
  margin-bottom: 10px;
}
.axis-pickers select {
  background: var(--panel-2);
  color: var(--ink);
  border: 1px solid var(--edge-hot);
  border-radius: 4px;
  padding: 4px 8px;
  font: inherit;
  font-size: 12px;
}
.gap-summary {
  margin-top: 18px;
  font-size: 12px;
  color: var(--ink-dim);
}
.gap-summary ul { margin: 6px 0 0 0; padding-left: 20px; }
.gap-summary li { margin-bottom: 4px; }
.gap-summary code {
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.empty-state {
  padding: 40px;
  text-align: center;
  color: var(--ink-faint);
  font-size: 13px;
}
@media (max-width: 900px) {
  body { grid-template-columns: 1fr; grid-template-areas: "header" "sidebar" "main"; }
  aside { position: static; max-height: none; }
}
</style>

const DIMENSIONS = ["layer", "target", "venue", "input", "output", "reversibility", "tempo", "deploy_cost", "leverage", "jurisdiction", "abstraction"];
const LIST_DIMS = new Set(["target","venue","input","output","jurisdiction"]);

let state = {
  view: "cards",
  filters: {},  // {dimension: Set<value>}
  search: "",
  matrixX: "layer",
  matrixY: "tempo",
};
DIMENSIONS.forEach(d => state.filters[d] = new Set());

// Pre-compute value->count per dimension
function dimensionStats(algos) {
  const stats = {};
  DIMENSIONS.forEach(d => stats[d] = new Map());
  for (const a of algos) {
    for (const d of DIMENSIONS) {
      let vals = a[d];
      if (vals == null) continue;
      if (!Array.isArray(vals)) vals = [vals];
      for (const v of vals) {
        if (v === undefined || v === null) continue;
        const sv = String(v);
        stats[d].set(sv, (stats[d].get(sv) || 0) + 1);
      }
    }
  }
  return stats;
}
const FULL_STATS = dimensionStats(ALGOS);

function valuesFor(dim) {
  return Array.from(FULL_STATS[dim].keys()).sort((a,b) => {
    // Numeric first if possible
    if (!isNaN(Number(a)) && !isNaN(Number(b))) return Number(a) - Number(b);
    return a.localeCompare(b);
  });
}

function matches(algo) {
  // Filter match
  for (const d of DIMENSIONS) {
    const sel = state.filters[d];
    if (sel.size === 0) continue;
    let vals = algo[d];
    if (vals == null) vals = [];
    if (!Array.isArray(vals)) vals = [vals];
    const sv = vals.map(String);
    let hit = false;
    for (const v of sel) if (sv.includes(v)) { hit = true; break; }
    if (!hit) return false;
  }
  // Search match
  if (state.search) {
    const q = state.search.toLowerCase();
    const hay = [
      algo.doc_id, algo.precondition, algo.anti_pattern, algo.preview || "",
      ...(algo.vocabulary || []),
    ].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function renderSidebar() {
  const aside = document.getElementById("sidebar");
  let html = "";
  for (const d of DIMENSIONS) {
    html += `<h3>${d}</h3><div class="filters">`;
    for (const v of valuesFor(d)) {
      const on = state.filters[d].has(v);
      const count = FULL_STATS[d].get(v) || 0;
      html += `<span class="filter-chip${on ? " on" : ""}" data-dim="${d}" data-val="${escapeHtml(v)}">${escapeHtml(v)}<span class="count">${count}</span></span>`;
    }
    html += `</div>`;
  }
  aside.innerHTML = html;
  aside.querySelectorAll(".filter-chip").forEach(el => {
    el.addEventListener("click", () => {
      const d = el.dataset.dim;
      const v = el.dataset.val;
      const set = state.filters[d];
      if (set.has(v)) set.delete(v); else set.add(v);
      render();
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c]);
}

function fmt(v) {
  if (Array.isArray(v)) return v.join(", ");
  return String(v);
}

function renderCard(a) {
  const layer = a.layer || "unscored";
  const lev = `l${a.leverage || 0}`;
  const inDb = a.in_db ? "" : ' <span class="layer-badge unscored">PEND</span>';
  return `
    <article class="algo" data-doc-id="${a.doc_id}">
      <div class="card-head">
        <h4>${escapeHtml(a.doc_id)}</h4>
        <span class="layer-badge ${layer}">${escapeHtml(layer)}</span>
      </div>
      <div class="factor-row"><span class="k">target:</span> ${escapeHtml(fmt(a.target))}</div>
      <div class="factor-row"><span class="k">venue:</span> ${escapeHtml(fmt(a.venue))} <span class="k">· tempo:</span> ${escapeHtml(a.tempo || "")}</div>
      <div class="factor-row"><span class="k">output:</span> ${escapeHtml(fmt(a.output))}</div>
      <div class="factor-row"><span class="k">lev:</span> <span class="lev ${lev}">${a.leverage || 0}</span> <span class="k">· cost:</span> ${escapeHtml(a.deploy_cost || "")} <span class="k">· revers:</span> ${escapeHtml(a.reversibility || "")} <span class="k">· chunks:</span> ${a.chunks || 0}${inDb}</div>
      <div class="detail">
        <div class="row"><div class="lbl">precondition</div>${escapeHtml(a.precondition || "—")}</div>
        <div class="row"><div class="lbl">anti-pattern</div>${escapeHtml(a.anti_pattern || "—")}</div>
        <div class="row"><div class="lbl">vocabulary</div><div class="vocab">${(a.vocabulary || []).map(v => `<span>${escapeHtml(v)}</span>`).join("")}</div></div>
        <div class="row"><div class="lbl">source</div><div class="source">${escapeHtml(a.source_file || "(no source linked)")}</div></div>
        ${a.preview ? `<div class="row"><div class="lbl">preview</div><div class="preview">${escapeHtml(a.preview)}</div></div>` : ""}
      </div>
    </article>`;
}

function renderCards() {
  const filtered = ALGOS.filter(matches);
  const main = document.getElementById("main");
  document.getElementById("active-count").textContent = filtered.length;
  document.getElementById("gap-count").textContent = 0;
  if (filtered.length === 0) {
    main.innerHTML = `<div class="stats-bar"><strong>0</strong> matches</div><div class="empty-state">No algorithms match current filters.</div>`;
    return;
  }
  main.innerHTML = `
    <div class="stats-bar">
      <span><strong>${filtered.length}</strong> of ${ALGOS.length} algos</span>
      <span>chunks: <strong>${filtered.reduce((s,a) => s + (a.chunks||0), 0)}</strong></span>
      <span>avg leverage: <strong>${(filtered.reduce((s,a) => s + (a.leverage||0), 0) / filtered.length).toFixed(1)}</strong></span>
    </div>
    <div class="cards">${filtered.map(renderCard).join("")}</div>`;
  main.querySelectorAll("article.algo").forEach(el => {
    el.addEventListener("click", () => el.classList.toggle("expanded"));
  });
}

function valuesOf(a, d) {
  let v = a[d];
  if (v == null) return [];
  return Array.isArray(v) ? v.map(String) : [String(v)];
}

function renderMatrix() {
  const main = document.getElementById("main");
  const filtered = ALGOS.filter(matches);
  const xVals = valuesFor(state.matrixX);
  const yVals = valuesFor(state.matrixY);
  // Build matrix: (x,y) -> [doc_ids]
  const cells = new Map();
  for (const a of filtered) {
    const xs = valuesOf(a, state.matrixX);
    const ys = valuesOf(a, state.matrixY);
    for (const x of xs) for (const y of ys) {
      const k = `${x}|||${y}`;
      if (!cells.has(k)) cells.set(k, []);
      cells.get(k).push(a.doc_id);
    }
  }
  let gaps = 0;
  let rows = `<tr><th class="corner"></th>${xVals.map(x => `<th>${escapeHtml(x)}</th>`).join("")}</tr>`;
  for (const y of yVals) {
    rows += `<tr><th class="row">${escapeHtml(y)}</th>`;
    for (const x of xVals) {
      const ids = cells.get(`${x}|||${y}`) || [];
      if (ids.length === 0) {
        gaps++;
        rows += `<td class="gap" title="gap: ${escapeHtml(state.matrixX)}=${escapeHtml(x)}, ${escapeHtml(state.matrixY)}=${escapeHtml(y)}">·</td>`;
      } else {
        rows += `<td class="has" title="${escapeHtml(ids.join(', '))}"><span class="cell-count">${ids.length}</span></td>`;
      }
    }
    rows += `</tr>`;
  }
  document.getElementById("active-count").textContent = filtered.length;
  document.getElementById("gap-count").textContent = gaps;
  const xPicker = `<select id="x-axis">${DIMENSIONS.map(d => `<option ${d===state.matrixX?"selected":""}>${d}</option>`).join("")}</select>`;
  const yPicker = `<select id="y-axis">${DIMENSIONS.map(d => `<option ${d===state.matrixY?"selected":""}>${d}</option>`).join("")}</select>`;
  main.innerHTML = `
    <div class="stats-bar"><span><strong>${filtered.length}</strong> algos in matrix</span><span><strong>${gaps}</strong> empty cells (potential gaps)</span></div>
    <div class="axis-pickers">X: ${xPicker} &nbsp; Y: ${yPicker}</div>
    <table class="matrix">${rows}</table>`;
  document.getElementById("x-axis").addEventListener("change", e => { state.matrixX = e.target.value; renderMatrix(); });
  document.getElementById("y-axis").addEventListener("change", e => { state.matrixY = e.target.value; renderMatrix(); });
}

function renderGaps() {
  const main = document.getElementById("main");
  const filtered = ALGOS.filter(matches);
  // For each pair of dimensions, count empty cells under current selection
  let lines = [];
  for (let i = 0; i < DIMENSIONS.length; i++) {
    for (let j = i+1; j < DIMENSIONS.length; j++) {
      const dx = DIMENSIONS[i], dy = DIMENSIONS[j];
      const xv = valuesFor(dx), yv = valuesFor(dy);
      let occupied = new Set();
      for (const a of filtered) {
        for (const x of valuesOf(a, dx)) for (const y of valuesOf(a, dy)) {
          occupied.add(`${x}|||${y}`);
        }
      }
      const total = xv.length * yv.length;
      const gaps = total - occupied.size;
      const ratio = total > 0 ? gaps / total : 0;
      lines.push({dx, dy, total, gaps, ratio});
    }
  }
  lines.sort((a,b) => b.ratio - a.ratio);
  const top = lines.slice(0, 24);
  document.getElementById("active-count").textContent = filtered.length;
  document.getElementById("gap-count").textContent = top.reduce((s,l) => s + l.gaps, 0);
  let html = `<div class="stats-bar">Top gap-dense factor pairs (under current filters)</div>`;
  html += `<table class="matrix"><tr><th>X axis</th><th>Y axis</th><th>gaps</th><th>total</th><th>% empty</th></tr>`;
  for (const l of top) {
    html += `<tr><th class="row">${escapeHtml(l.dx)}</th><td>${escapeHtml(l.dy)}</td><td class="cell-count">${l.gaps}</td><td>${l.total}</td><td>${(l.ratio*100).toFixed(0)}%</td></tr>`;
  }
  html += `</table>`;
  html += `<div class="gap-summary"><strong>Read this:</strong> rows with high % empty are factor regions where no algorithm currently lives. Each empty cell is a candidate for the next algo to formalize. Switch to <code>Matrix</code> view and pick X/Y from the top of this list to see which specific cells are blank.</div>`;
  main.innerHTML = html;
}

function render() {
  renderSidebar();
  if (state.view === "cards") renderCards();
  else if (state.view === "matrix") renderMatrix();
  else if (state.view === "gaps") renderGaps();
}

// Bind controls
document.getElementById("search").addEventListener("input", e => { state.search = e.target.value; render(); });
document.querySelectorAll("button.view-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll("button.view-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    state.view = b.dataset.view;
    render();
  });
});

render();
</script>
</body>
</html>
