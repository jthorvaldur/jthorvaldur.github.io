<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Algorithm Explorer — div_legal</title>
<style>
:root {
  --bg: #0e1014;
  --panel: #161922;
  --panel-2: #1c2030;
  --edge: #1f2330;
  --edge-hot: #3a3f56;
  --ink: #e7e9ee;
  --ink-dim: #9aa3b2;
  --ink-faint: #5d6577;
  --accent: #f5a623;
  --accent-dim: #8a5d12;
  --L1: #4ec9b0;
  --L2: #c586c0;
  --L3: #e06c75;
  --meta: #61afef;
  --vocab: #e5c07b;
  --phil: #d19a66;
  --unscored: #6b7280;
  --chip: #2c3140;
  --chip-on: #3d4566;
  --chip-on-text: #e7e9ee;
  --good: #5ed46f;
  --warn: #f5a623;
  --bad: #e06c75;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font: 13px/1.55 'Inter', 'SF Pro Text', -apple-system, system-ui, sans-serif;
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr;
  grid-template-areas: "header header" "sidebar main";
  min-height: 100vh;
}
header {
  grid-area: header;
  padding: 16px 24px;
  border-bottom: 1px solid var(--edge);
  background: var(--panel);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
h1 {
  margin: 0;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -.01em;
}
header .meta { color: var(--ink-dim); font-size: 11px; }
header .right { margin-left: auto; display: flex; gap: 8px; }
button.view-btn {
  background: var(--chip);
  color: var(--ink-dim);
  border: 1px solid var(--edge-hot);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font: inherit;
  font-size: 12px;
}
button.view-btn.active { background: var(--accent); color: #1a1814; border-color: var(--accent); }
input.search {
  background: var(--panel-2);
  border: 1px solid var(--edge-hot);
  border-radius: 6px;
  color: var(--ink);
  font: inherit;
  font-size: 12px;
  padding: 6px 10px;
  width: 260px;
}
aside {
  grid-area: sidebar;
  background: var(--panel);
  border-right: 1px solid var(--edge);
  padding: 16px 18px;
  overflow-y: auto;
  max-height: calc(100vh - 60px);
  position: sticky;
  top: 60px;
}
aside h3 {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin: 18px 0 8px;
  padding-top: 12px;
  border-top: 1px dashed var(--edge-hot);
}
aside h3:first-child { padding-top: 0; border-top: 0; margin-top: 0; }
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.filter-chip {
  background: var(--chip);
  color: var(--ink-dim);
  padding: 2px 8px;
  border-radius: 9px;
  font-size: 11px;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .12s;
}
.filter-chip:hover { border-color: var(--edge-hot); }
.filter-chip.on { background: var(--chip-on); color: var(--chip-on-text); border-color: var(--accent-dim); }
.filter-chip .count {
  color: var(--ink-faint);
  margin-left: 4px;
  font-size: 10px;
}
.filter-chip.on .count { color: var(--accent); }
main {
  grid-area: main;
  padding: 16px 24px 64px;
  overflow-x: auto;
}
.stats-bar {
  display: flex;
  gap: 24px;
  font-size: 11px;
  color: var(--ink-dim);
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--edge-hot);
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.stats-bar strong { color: var(--ink); font-size: 14px; }
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px;
}
article.algo {
  background: var(--panel);
  border: 1px solid var(--edge);
  border-left: 3px solid var(--edge-hot);
  border-radius: 6px;
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color .12s;
}
article.algo:hover { border-color: var(--edge-hot); }
article.algo.expanded { border-color: var(--accent-dim); background: var(--panel-2); }
article.algo.meta      { border-left-color: var(--meta); }
article.algo.L1_demand { border-left-color: var(--L1); }
article.algo.L2_refuse { border-left-color: var(--L2); }
article.algo.L3_expose { border-left-color: var(--L3); }
article.algo.vocab     { border-left-color: var(--vocab); }
article.algo.phil      { border-left-color: var(--phil); }
.explain {
  color: var(--ink);
  font-size: 12.5px;
  line-height: 1.5;
  margin: 6px 0 8px;
  padding-bottom: 8px;
  border-bottom: 1px dotted var(--edge-hot);
}
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 6px;
}
.card-head h4 {
  margin: 0;
  font: inherit;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
}
.layer-badge {
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 9px;
  font-weight: 600;
  letter-spacing: .04em;
}
.layer-badge.meta      { background: var(--meta); color: #06121e; }
.layer-badge.L1_demand { background: var(--L1);   color: #062019; }
.layer-badge.L2_refuse { background: var(--L2);   color: #1f0a1e; }
.layer-badge.L3_expose { background: var(--L3);   color: #2a0a0c; }
.layer-badge.vocab     { background: var(--vocab);color: #1c1606; }
.layer-badge.phil      { background: var(--phil); color: #1b0f06; }
.layer-badge.unscored  { background: var(--unscored); color: #0e1014; }
.lev-bar {
  display: inline-flex; gap: 2px; align-items: center;
  vertical-align: middle; margin: 0 2px;
}
.lev-bar .seg { width: 7px; height: 5px; border-radius: 1px; background: var(--edge); }
.lev-bar .seg.on.high { background: var(--good); }
.lev-bar .seg.on.mid  { background: var(--warn); }
.lev-bar .seg.on.low  { background: var(--bad); }
.factor-row {
  font-size: 10px;
  color: var(--ink-faint);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  margin: 4px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.factor-row .k { color: var(--ink-dim); }
.lev {
  font-weight: 600;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px;
}
.lev.l5, .lev.l4 { color: var(--good); }
.lev.l3 { color: var(--warn); }
.lev.l2, .lev.l1, .lev.l0 { color: var(--bad); }
.detail {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--edge-hot);
  font-size: 12px;
}
article.algo.expanded .detail { display: block; }
.detail .lbl { color: var(--accent); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
.detail .row { margin: 6px 0; }
.detail .vocab span {
  background: var(--chip);
  color: var(--ink-dim);
  padding: 1px 6px;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  margin-right: 3px;
  display: inline-block;
  margin-bottom: 3px;
}
.detail .source {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  word-break: break-all;
}
.detail .preview {
  background: var(--bg);
  border-left: 2px solid var(--edge-hot);
  padding: 8px 10px;
  margin-top: 6px;
  color: var(--ink-dim);
  font-size: 11px;
  white-space: pre-wrap;
}
table.matrix {
  border-collapse: collapse;
  margin-top: 14px;
}
table.matrix th, table.matrix td {
  border: 1px solid var(--edge);
  padding: 5px 8px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  vertical-align: middle;
  min-width: 50px;
}
table.matrix th {
  background: var(--panel);
  color: var(--ink-dim);
  font-weight: 600;
}
table.matrix th.corner { background: transparent; border: 0; }
table.matrix th.row {
  text-align: right;
  background: var(--panel-2);
}
table.matrix td.gap {
  background: rgba(224, 108, 117, 0.10);
  color: var(--bad);
  cursor: default;
}
table.matrix td.has {
  background: rgba(94, 212, 111, 0.07);
  cursor: pointer;
}
table.matrix td.has:hover { background: rgba(94, 212, 111, 0.18); }
table.matrix td .cell-count { color: var(--good); font-weight: 600; }
.axis-pickers {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--ink-dim);
  margin-bottom: 10px;
}
.axis-pickers select {
  background: var(--panel-2);
  color: var(--ink);
  border: 1px solid var(--edge-hot);
  border-radius: 4px;
  padding: 4px 8px;
  font: inherit;
  font-size: 12px;
}
.gap-summary {
  margin-top: 18px;
  font-size: 12px;
  color: var(--ink-dim);
}
.gap-summary ul { margin: 6px 0 0 0; padding-left: 20px; }
.gap-summary li { margin-bottom: 4px; }
.gap-summary code {
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.empty-state {
  padding: 40px;
  text-align: center;
  color: var(--ink-faint);
  font-size: 13px;
}
@media (max-width: 900px) {
  body { grid-template-columns: 1fr; grid-template-areas: "header" "sidebar" "main"; }
  aside { position: static; max-height: none; }
}
</style>

hecklist of acceptable identity proofs up front and treat the perjury-declaration form as automatically sufficient; never reject a submission without naming the specific defect and the cure, so the 'ping-pong' record cannot be built against you.", "chunks": 19, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/foia_identity_verification_trap.md", "preview": "# FOIA 26-356 Response Analysis", "in_db": true}, {"doc_id": "foia_title_iv_d_template", "layer": "L1_demand", "target": ["regulator"], "venue": ["FOIA"], "input": ["deadline"], "output": ["informational", "deadline"], "reversibility": "high", "tempo": "reactive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["universal", "IL", "federal"], "abstraction": "template", "precondition": "Title IV-D case active; requesting agency is IV-D administering authority; fee waiver available for pro se litigant", "anti_pattern": "Omitting fee waiver request; not specifying ledger gaps; too vague on records requested", "vocabulary": ["title_iv_d", "payment_ledger", "federal_reimbursement", "child_support_enforcement", "iv_d_case_status"], "explanation": "A structured public-records request to the state child-support agency that asks, item by item, for case status, full payment ledger, federal incentive reimbursements, income-withholding orders, license-suspension and credit-reporting referrals, and the intergovernmental agreement, so the response either produces the enforcement file or proves the agency is hiding it.", "inverse_strategy": "If such a templated request lands on you, respond strictly within the statutory window, produce the non-exempt records exactly as listed (or item-by-item denials tied to a single statute each), and avoid stacking unrelated exemptions; that removes the requester's strongest argument that the denial is pretextual.", "chunks": 6, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/foia_title_iv_d_template.md", "preview": "the petitioner\n100-80092 306 Avenue East\nFoothills, AB T1S 4R5, Canada\n[petitioner-email]\n(908) 458-2199\n\nMay 24, 2026\n\n**VIA EMAIL**\n\nFOIA Officer\nIllinois Department of Healthcare and Family Services\nDivision of Child Support Services\n509 South Sixth Street\nSpringfield, Illinois 62701\n\n**Re: Freedom of Information Act Request — 5 ILCS 140**\n**Case: In re Marriage of the petitioner v. the respondent, No. [Case No.]**\n**the trial court, Illinois — Domestic Relations Division**\n\nDear FOIA Officer:\n\nPursuant to the Illinois Freedom of Information Act, 5 ILCS 140/1 *et seq.*, I request copies of ", "in_db": true}, {"doc_id": "judge_profile", "layer": "meta", "target": ["judge", "self"], "venue": ["all"], "input": ["evidence", "pattern"], "output": ["informational"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "medium", "leverage": 2, "jurisdiction": ["IL"], "abstraction": "concept", "precondition": "Judge has public record; biographical data available; bar memberships and community affiliations documented", "anti_pattern": "Personalizing the judge; assuming politics determine outcomes; relying on rumors over verified record", "vocabulary": ["judicial_profile", "community_service", "career_trajectory", "decision_making_pattern", "enforcement_leaning"], "explanation": "Build a structured profile of the assigned judge from public sources only (court directory, law-school record, prior assignments, bar memberships, published rulings, observed in-court patterns) and convert it into numerical lean scores on axes like enforcement-vs-accommodation, financial sophistication, pro-se sympathy, and form-order deference. The profile drives concrete tactical choices about who argues, what evidence leads, and what to put in writing.", "inverse_strategy": "Assume the other side has built a profile on the judge and on you; neutralize the asymmetry by never tailoring oral argument to the judge's identity in ways that can be replayed as bias-baiting, by submitting your own proposed orders so the judge's form-order tendency is captured by your draft instead of opposing counsel's, and by keeping every argument grounded in the trial record rather than identity-coded signals.", "chunks": 27, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/judge_profile.md", "preview": "# Judicial Profile: Hon. Matthew W. the trial judge", "in_db": true}, {"doc_id": "liar_algorithm", "layer": "L3_expose", "target": ["counterparty", "opposing_counsel"], "venue": ["deposition", "discovery", "filing"], "input": ["claim", "evidence"], "output": ["lock-in", "sanction", "appellate"], "reversibility": "low", "tempo": "parallel", "deploy_cost": "high", "leverage": 4, "jurisdiction": ["universal"], "abstraction": "pattern", "precondition": "Counterparty has made ≥3 sworn statements contradicted by objective evidence; counter-evidence exists before lock-in", "anti_pattern": "Confronting lie in real-time; engaging substance of the lie; filing single-instance contradiction", "vocabulary": ["lock_in", "documented_gap", "objective_evidence", "perjury", "fraud_on_the_court", "sanctions"], "explanation": "When the opposing party lies repeatedly, do not correct them in the moment; instead move every contested claim into a higher-stakes sworn venue (admissions, sworn affidavits, depositions, trial testimony) so the lie locks in, then introduce the objective contradicting evidence later in a single motion that stacks the pattern. The case is won by the documented gap between sworn statements and objective records, not by argument.", "inverse_strategy": "If you suspect this trap is being set against you, never sign a sworn document, affidavit, or admission without first reconciling it against bank, registry, and third-party records you can independently produce, mark uncertain items as 'to the best of my present knowledge, subject to amendment,' and supplement immediately when any error surfaces so no lockable gap ever forms.", "chunks": 20, "source_file": "/Users/jthor/GitHub/caseledger/docs/liar_algorithm.md", "preview": "# Liar Algorithm", "in_db": true}, {"doc_id": "manipulation_taxonomy", "layer": "L3_expose", "target": ["system", "counterparty"], "venue": ["all"], "input": ["pattern", "claim"], "output": ["informational", "appellate"], "reversibility": "low", "tempo": "preemptive", "deploy_cost": "medium", "leverage": 3, "jurisdiction": ["universal"], "abstraction": "concept", "precondition": "Pattern identified across psychological, interpersonal, legal, institutional, and linguistic layers", "anti_pattern": "Single-layer analysis; ignoring institutional design; not connecting DSM diagnosis to statutory language", "vocabulary": ["dsm_5", "cluster_b", "darvo", "gaslighting", "financial_abuse", "coercive_control", "orwell_index", "manipulation_tactic"], "explanation": "A unified five-layer index that maps psychological diagnoses to interpersonal tactics to statutory legal terms to bureaucratic design patterns to a measurable linguistic signature ('Orwell Index'). The point is that gaslighting, stonewalling, perjury, agency loops, and false sworn statements are the same pattern at different scales and can be detected by language analysis.", "inverse_strategy": "Against a counterparty deploying this taxonomy, force every interaction into structured, time-stamped, schema-checked written exchanges (numbered demands, dated responses, attached evidence) so soft tactics like stonewalling and gaslighting cannot survive contact with the record; never engage on the emotional or narrative layer where the manipulation is designed to operate.", "chunks": 24, "source_file": "/Users/jthor/GitHub/caseledger/docs/manipulation_taxonomy.md", "preview": "# The Manipulation Taxonomy", "in_db": true}, {"doc_id": "marriage_validity_analysis", "layer": "L2_refuse", "target": ["judge", "self"], "venue": ["filing", "hearing"], "input": ["evidence", "claim"], "output": ["lock-in", "appellate"], "reversibility": "medium", "tempo": "endgame", "deploy_cost": "high", "leverage": 3, "jurisdiction": ["IL", "Alberta", "federal"], "abstraction": "concept", "precondition": "Marriage performed in another jurisdiction; separation period documented; comparative law frameworks available", "anti_pattern": "Assuming Illinois jurisdiction is unquestionable; not researching home jurisdiction law; filing before demand period complete", "vocabulary": ["forum_non_conveniens", "concurrent_jurisdiction", "zerruttungsprinzip", "marriage_validity", "separation_period"], "explanation": "Treat the marriage certificate and the underlying jurisdictional facts (where performed, when, current residence, length of separation) as a foundational document the case cannot stand on without; demand it through formal discovery, and use comparative-law thresholds for separation-based dissolution to argue that the proceeding has been consumed by enforcement rather than resolution. Concurrent filing in the jurisdiction of the marriage's origin is the strongest leverage move.", "inverse_strategy": "Produce the marriage certificate and a one-page jurisdictional declaration (place of marriage, both residences, date of separation) at the first case-management conference so the foundation is uncontested, and oppose any concurrent foreign filing immediately by moving for an anti-suit injunction or invoking the first-filed rule so jurisdiction never fragments.", "chunks": 17, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/marriage_validity_analysis.md", "preview": "# Marriage Validity Analysis", "in_db": true}, {"doc_id": "no_contract", "layer": "L2_refuse", "target": ["judge", "opposing_counsel"], "venue": ["filing"], "input": ["charge"], "output": ["lock-in", "appellate"], "reversibility": "low", "tempo": "reactive", "deploy_cost": "medium", "leverage": 3, "jurisdiction": ["universal"], "abstraction": "tactic", "precondition": "Charge lacks required findings (Turner, Rule 137, etc.); underlying order void or procured by fraud; written filing only", "anti_pattern": "Oral invocation in pro se court appearance; mixing with substantive defense; using without procedural citations", "vocabulary": ["notice_of_non_consent", "required_finding", "jurisdictional_defect", "void_order", "coercive_sanction"], "explanation": "When the other side asserts a coercive charge (contempt, sanctions, jurisdictional finding), refuse the implicit contract that the charge is valid before defending the merits: in writing only, demand they show the authority, the injured party, the required findings, and the properly named party. Engaging substance accepts the framing; refusing it forces them to prove the charge is even properly stated.", "inverse_strategy": "When you are the moving party, pre-load your charge with every required finding on the face of the motion (statute, authority, named party, specific conduct, required threshold findings) and attach the supporting record, so a 'no consent / show authority' response collapses into mere rhetoric the court can dismiss without engaging.", "chunks": 14, "source_file": "/Users/jthor/GitHub/caseledger/docs/no_contract.md", "preview": "# No Contract / I Do Not Consent Algorithm", "in_db": true}, {"doc_id": "opt_out_weapon_strategy", "layer": "L1_demand", "target": ["system", "counterparty"], "venue": ["filing"], "input": ["pattern", "evidence"], "output": ["lock-in", "sanction", "asymmetric_cost"], "reversibility": "low", "tempo": "endgame", "deploy_cost": "high", "leverage": 4, "jurisdiction": ["TX", "federal"], "abstraction": "tactic", "precondition": "Class action filed and proven; individual plaintiff has strongest evidence; opt-out window respected", "anti_pattern": "Opting out before class verdict; relying on class alone without individual reserve; sharing plaintiff list", "vocabulary": ["opt_out", "collateral_estoppel", "class_action", "treble_damages", "individual_recovery", "offensive_non_mutual"], "explanation": "In a class action against a defendant who commits the same wrong many times, the plaintiffs with the strongest individual evidence should opt out of the class before certification; the class proves the pattern, and the opt-outs then sue individually using that finding as collateral estoppel, collecting full statutory damages instead of a pro-rata share. The opt-out has no losing move: if the class wins, they collect more; if it loses, they are not bound.", "inverse_strategy": "Stop the opt-out leverage early by settling the strongest individual cases on confidential, non-precedent-setting terms before class certification, vigorously contesting any class-wide finding that could be reused offensively, and where settlement is unavoidable, structuring it to require dismissal with prejudice and a no-collateral-estoppel clause so individual reuse of the finding is barred.", "chunks": 16, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/opt_out_weapon_strategy.md", "preview": "# The Opt-Out Weapon — Class Action Strategy for the rental car carrier", "in_db": true}, {"doc_id": "orwell_index_spec", "layer": "L3_expose", "target": ["system", "self"], "venue": ["all"], "input": ["claim"], "output": ["informational"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["universal"], "abstraction": "concept", "precondition": "Any document can be scored on seven axes (verbosity, referrals, agency hiding, stated_vs_actual, template, exemptions, contradiction)", "anti_pattern": "Using single-axis scoring; applying subjectively; not weighting stated_vs_actual at 0.20", "vocabulary": ["verbosity_ratio", "referral_loops", "agency_hiding", "stated_vs_actual", "template_ratio", "exemption_stacking", "contradiction"], "explanation": "A 0-to-1 score that rates any document on how much it obscures or contradicts its own stated purpose, measured across seven axes: verbosity, referral loops, hidden agency, title-vs-content gap, template ratio, exemption stacking, and internal contradictions. It quantifies the gut sense of which side is being straight with the reader and which side is hiding behind language.", "inverse_strategy": "Score your own incoming and outgoing filings before sending; keep your score near zero by saying what you mean in active voice, citing one reason not five, defining your terms, and ensuring the title matches the content. Refuse to engage their high-Orwell document on its terms — quote the contradictory passages side-by-side and let the gap speak.", "chunks": 52, "source_file": "/Users/jthor/GitHub/caseledger/docs/orwell_index_spec.md", "preview": "# Orwell Index — Document Doublespeak Scoring", "in_db": true}, {"doc_id": "petition_modify_support_510", "layer": "L1_demand", "target": ["judge"], "venue": ["filing", "hearing"], "input": ["evidence", "deadline"], "output": ["deadline", "lock-in"], "reversibility": "medium", "tempo": "reactive", "deploy_cost": "high", "leverage": 3, "jurisdiction": ["IL"], "abstraction": "template", "precondition": "Substantial change in circumstances documented; foreseeability is statutorily barred as defense; involuntary loss proven", "anti_pattern": "Vague causation chain; not quantifying financial change; accepting foreseeability argument", "vocabulary": ["substantial_change_in_circumstances", "involuntary_unemployment", "ability_to_pay", "financial_collapse", "support_modification"], "explanation": "A petition that asks the court to lower an existing support obligation by proving a substantial, involuntary change in circumstances since the last order, while citing the statutory bar that prevents the other side from arguing the change was foreseeable. It converts a 'pay or be jailed' posture into a 'the underlying number is wrong' posture.", "inverse_strategy": "When the other side files for downward modification, immediately attack voluntariness and causation: produce evidence the change is self-inflicted (resignations, declined offers, lifestyle inconsistent with claimed income) and force a vocational evaluation. Demand sworn updated financial disclosure tied to the change date.", "chunks": 12, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/petition_modify_support_510.md", "preview": "**IN THE CIRCUIT COURT OF the trial court, ILLINOIS**\n**COUNTY DEPARTMENT --- DOMESTIC RELATIONS DIVISION**\n\nIN RE THE MARRIAGE OF:\n\nthe petitioner the petitioner,\nPetitioner, Pro Se\n\nv.                                          No. [Case No.]\n                                            Calendar DRCAL11\n                                            the trial judge\n\nthe respondent,\nRespondent.\n\n---", "in_db": true}, {"doc_id": "petition_parenting_time_607_5", "layer": "L2_refuse", "target": ["judge"], "venue": ["filing", "hearing"], "input": ["claim", "evidence"], "output": ["lock-in", "sanction"], "reversibility": "medium", "tempo": "reactive", "deploy_cost": "medium", "leverage": 4, "jurisdiction": ["IL"], "abstraction": "template", "precondition": "Parenting time denied for ≥30 days; allocation judgment in place; violations specific and documented", "anti_pattern": "Lumping violations together; not quantifying separation days; assuming reunification without proof", "vocabulary": [6075, "parenting_time_abuse", "expedited_procedure", "make_up_parenting_time", "contempt_for_violator", "reunification_therapy"], "explanation": "An expedited petition that flips a parent-versus-parent dispute by asking the court to find the custodial parent has engaged in a pattern of 'parenting time abuse' — blocking contact, ignoring required reunification steps, or refusing record access — and to impose make-up time, fines, fee-shifting, and potential jail on the blocking parent. The same statute that can be used to threaten the absent parent is reframed against the gatekeeper.", "inverse_strategy": "Maintain a contemporaneous, time-stamped log of every offered visit, every facilitated call, and every therapist referral; respond promptly in the agreed communication channel; document the other parent's refusals or no-shows in writing. Counter-file showing good-faith facilitation and shift the abuse finding back.", "chunks": 13, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/petition_parenting_time_607_5.md", "preview": "**IN THE CIRCUIT COURT OF the trial court, ILLINOIS**\n**COUNTY DEPARTMENT --- DOMESTIC RELATIONS DIVISION**\n\nIN RE THE MARRIAGE OF:\n\nthe petitioner the petitioner,\nPetitioner, Pro Se\n\nv.                                          No. [Case No.]\n                                            Calendar DRCAL11\n                                            the trial judge\n\nthe respondent,\nRespondent.\n\n---", "in_db": true}, {"doc_id": "precision_trigger_words", "layer": "vocab", "target": ["judge", "appellate_court"], "venue": ["filing"], "input": ["evidence", "claim"], "output": ["lock-in", "appellate"], "reversibility": "low", "tempo": "preemptive", "deploy_cost": "medium", "leverage": 3, "jurisdiction": ["universal", "IL"], "abstraction": "tactic", "precondition": "Word has ≥1 dictionary definition and ≥1 Black's Law entry; describes conduct not persons; deployed once per motion", "anti_pattern": "Reusing word across multiple motions; profane or defamatory language; personalizing the word to the litigant", "vocabulary": ["retardation", "dissipation", "dereliction", "spoliation", "contumacious", "obdurate", "peculation", "subterfuge", "unconscionable"], "explanation": "A drafting technique that selects a single dictionary-defined word with both precise technical meaning and emotional charge (e.g. retardation, dissipation, contumacious), immediately defines it with three sources to neutralize objections, then deploys it structurally throughout one filing to reframe the narrative. The friction makes the judge read instead of skim.", "inverse_strategy": "Do not object to the word — that concedes its power and signals you care about tone over substance. Instead, accept the dictionary definition in your response, then show the factual predicate for the word is absent ('the cited conduct is not, in fact, dissipation under the statute because X'). Strip its emotional charge by treating it as ordinary vocabulary.", "chunks": 11, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/precision_trigger_words.md", "preview": "# The Algorithm: Precision Trigger Words in Legal Filings", "in_db": true}, {"doc_id": "procedural_discovery_algorithm", "layer": "L1_demand", "target": ["self", "opposing_counsel"], "venue": ["filing", "discovery"], "input": ["situation", "silence"], "output": ["informational", "lock-in"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["IL", "universal"], "abstraction": "concept", "precondition": "Pro se litigant has incomplete procedural map; reversal of search direction (situation→tools not tool→situation)", "anti_pattern": "Assuming all tools are known; not connecting case facts to dormant procedures", "vocabulary": ["fee_waiver", "510_modification", 6075, "508a_interim_fees", "exemptions", "turner_motion", "procedural_tools"], "explanation": "A reverse-search system: instead of a litigant trying to name a tool they don't know exists, the system takes the litigant's situation (no income, no contact with kids, threatened with jail, hidden financial disclosure) and returns every applicable statute, rule, and motion that maps to that situation. It closes the gap between what the law offers and what a pro se litigant can find.", "inverse_strategy": "Run the same situation-to-tool map on your own posture and pre-empt the obvious motions — file your own fee request, your own discovery enforcement, your own modification petition before the other side does. Whoever names the tool first frames it.", "chunks": 12, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/procedural_discovery_algorithm.md", "preview": "# Procedural Discovery Algorithm", "in_db": true}, {"doc_id": "three_layer_algo", "layer": "meta", "target": ["opposing_counsel", "counterparty", "judge"], "venue": ["all"], "input": ["obligation", "charge", "claim"], "output": ["lock-in", "deadline", "appellate"], "reversibility": "high", "tempo": "parallel", "deploy_cost": "medium", "leverage": 4, "jurisdiction": ["universal"], "abstraction": "concept", "precondition": "Counterparty lies repeatedly under oath; separate L1 (owed), L2 (charged), L3 (claimed) into orthogonal vectors", "anti_pattern": "Mixing layers in one message; oral L2 without counsel; L1 without deadline; L3 with substance engagement", "vocabulary": ["layer_1_demand", "layer_2_no_contract", "layer_3_liar_algorithm", "orthogonal_vectors", "one_algorithm_per_move"], "explanation": "A meta-framework that splits adversarial moves into three orthogonal layers: demanding performance on what they owe (with deadlines and default consequences), refusing consent to charges built on missing predicate findings, and locking in their false sworn statements without arguing the substance. The rule is one layer per move — never mix demand with rebuttal in the same breath.", "inverse_strategy": "Force them to mix layers. Respond to a demand with a substantive denial; respond to a 'no consent' filing with the missing findings produced cleanly; respond to a lie-lock attempt by promptly issuing a corrected sworn record so the locked statement becomes stale. Each cross-layer move you draw from them dilutes their next move.", "chunks": 10, "source_file": "/Users/jthor/GitHub/caseledger/docs/three_layer_algo.md", "preview": "# Three-Layer Adversarial Algorithm", "in_db": true}, {"doc_id": "title_iv_d_camarda_analysis", "layer": "L3_expose", "target": ["judge", "system", "regulator"], "venue": ["filing", "federal"], "input": ["evidence", "pattern"], "output": ["appellate", "informational"], "reversibility": "low", "tempo": "endgame", "deploy_cost": "high", "leverage": 4, "jurisdiction": ["IL", "federal"], "abstraction": "concept", "precondition": "Camarda case researched; Title IV-D structural conflict documented; federal incentive quantified", "anti_pattern": "Assuming state is neutral; not connecting IV-D incentive to enforcement pressure; missing appellate angle", "vocabulary": ["title_iv_d", "federal_incentive", "enforcement_incentive", "structural_conflict", "section_1983", "deprivation_of_rights"], "explanation": "An enforcement-defense framework that, for every coercive action (contempt, garnishment, license suspension, arrest), demands the certified signed judicial instrument behind it and the ledger of dollars seized versus dollars disbursed. When the signed predicate cannot be produced or the ledger shows a gap, the enforcement chain collapses and a federal civil-rights path opens.", "inverse_strategy": "Keep every enforcement order pristine: certified signature, complete ledger reconciliation, every disbursement traceable to a dated entry. Pre-stage the signed instrument and the running ledger as exhibits so the 'show me the paper' attack is answered before it lands.", "chunks": 14, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/title_iv_d_camarda_analysis.md", "preview": "# Title IV-D: Camarda Framework Analysis", "in_db": true}, {"doc_id": "title_iv_d_deconstruction", "layer": "L1_demand", "target": ["regulator", "judge", "self"], "venue": ["FOIA", "filing", "federal"], "input": ["evidence", "silence"], "output": ["informational", "lock-in", "deadline"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "high", "leverage": 3, "jurisdiction": ["universal", "IL", "federal"], "abstraction": "algorithm", "precondition": "Every enforcement action must have signed judicial predicate; ledger must balance; fitness hearing required for parenting; ability finding required for incarceration", "anti_pattern": "Accepting unsigned orders; not auditing ledger gaps; mixing parenting with debt collection", "vocabulary": ["signed_instrument", "ledger_audit", "parenting_debt_separation", "fitness_hearing", "ability_finding", "section_1983_path"], "explanation": "A records-driven audit of the state child-support enforcement apparatus that pulls, via public-records request, the case status, full payment ledger, federal reimbursement totals, withholding orders, cooperative agreement, license-suspension referrals, and bonding records. The point is to expose the structural financial incentive that funds enforcement over resolution and to surface ledger gaps that contradict the underlying contempt narrative.", "inverse_strategy": "Pre-emptively maintain a clean enforcement file: matched ledger, current cooperative agreement on record, bonding compliant, every referral documented with its predicate order. If targeted, respond to the records request fully and on the statutory clock — partial or late responses are themselves evidence of the dysfunction being alleged.", "chunks": 9, "source_file": "/Users/jthor/GitHub/div_legal/title_IV_D/algorithm.md", "preview": "# Title IV-D Deconstruction Algorithm", "in_db": true}, {"doc_id": "selective_recall_credibility_trap", "layer": "L3_expose", "target": ["counterparty", "opposing_counsel", "settlement_negotiator"], "venue": ["deposition", "settlement", "filing"], "input": ["claim", "pattern", "evidence"], "output": ["informational", "lock-in"], "reversibility": "medium", "tempo": "parallel", "deploy_cost": "medium", "leverage": 3, "jurisdiction": ["universal", "IL"], "abstraction": "pattern", "precondition": "Counterparty's verified filings mix dollar-precision recall (when convenient) with formulaic 'lacks requisite knowledge' responses (when inconvenient), in the same filing; ideally in the same paragraph", "anti_pattern": "Citing as standalone basis for allocation/fitness motion (judges treat axes as orthogonal); listing all contradictions found (volume dilutes impact); leaking the list to opposing counsel before deposition", "vocabulary": ["lacks_requisite_knowledge", "dollar_precision_recall", "selective_verification", "intra_paragraph_self_cancel", "verified_pleading", "credibility_asymmetry", "deposition_outline", "pretrial_memorandum"], "explanation": "A pattern-spotting algorithm: when a verified pleading from the other side mixes dollar-precise recall for facts that help them with formulaic 'lacks knowledge' boilerplate for facts that hurt them — sometimes in the same paragraph that authenticates an exhibit — that contrast becomes a credibility weapon. It is reserved for deposition, settlement memos, and the credibility section of a pretrial brief, never as a standalone motion.", "inverse_strategy": "Audit your own verified filings before signing: never plead ignorance in a paragraph that also quotes specifics; use uniform hedge language; have one drafter so the recall posture is consistent across the document. In deposition, prepare a clean answer for every disclaimer paragraph by re-reading the filing aloud with adverse intent.", "chunks": 18, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/selective_recall_credibility_trap.md", "preview": "# Selective-Recall Credibility Trap", "in_db": true}, {"doc_id": "twelve_laws_legal_framework", "layer": "phil", "target": ["self", "judge", "system"], "venue": ["all"], "input": ["all"], "output": ["informational"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["universal"], "abstraction": "concept", "precondition": "Universal laws apply to litigation; Nash equilibrium is the true goal; court system by design prevents it", "anti_pattern": "Treating law as purely procedural; missing philosophical alignment; pursuing punishment instead of resolution", "vocabulary": ["law_of_oneness", "law_of_vibration", "law_of_correspondence", "law_of_attraction", "law_of_inspired_action", "nash_equilibrium"], "explanation": "A philosophical overlay that maps twelve universal principles (oneness, vibration, correspondence, attraction, inspired action, transmutation, cause-and-effect, compensation, relativity, polarity, rhythm, gender) onto litigation strategy to identify the negotiated-settlement equilibrium that serves the whole family system. It treats the courtroom as the obstacle to that equilibrium, not the path.", "inverse_strategy": "When the other side pitches a 'whole-system win-win' framing, anchor on the discrete legal issue actually before the court and the specific statutory standard that governs it. Do not let philosophical scope-expansion convert a narrow ruling into an open-ended negotiation.", "chunks": 16, "source_file": "/Users/jthor/GitHub/caseledger/docs/clean/twelve_laws_legal_framework.md", "preview": "# The Twelve Laws Applied to Legal Strategy", "in_db": true}, {"doc_id": "motivational_levers_rice", "layer": "phil", "target": ["counterparty", "opposing_counsel", "judge", "regulator", "self"], "venue": ["interpersonal", "settlement", "deposition", "meeting", "filing"], "tempo": "preemptive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "A diagnostic that decomposes any actor in a case (judge, opposing counsel, opposing party, regulator, witness) into four motivational channels — Reward, Ideology, Coercion, Ego — scores each on a 1-to-5 scale, and selects the dominant accessible lever to drive your approach to that actor. It prevents the common failure of pushing the lever you respond to rather than the one they respond to.", "inverse_strategy": "Run R-I-C-E on yourself first and notice which lever the other side is pushing on you (usually Coercion via threats or Ego via shame). Disclose your own dominant lever to a trusted advisor so you can be flagged when an offer is exploiting it, and respond on the lever the other actor cares about, not the one you find satisfying.", "chunks": 15, "source_file": "/Users/jthor/GitHub/caseledger/docs/motivational_levers_rice.md", "preview": "# R-I-C-E — Four Motivational Levers", "in_db": true}, {"doc_id": "authority_monopoly_prevention", "layer": "vocab", "target": ["opposing_counsel", "judge", "witness", "self"], "venue": ["settlement", "hearing", "deposition"], "tempo": "preemptive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "When any actor positions themselves as the sole interpreter of a domain — the only person who knows what the kids need, what the finances really say, or what the judge wants — that gatekeeper framing is the trap. The countermove is to independently pull the raw records, do your own statutory research, and refuse the translator role.", "inverse_strategy": "When this is used against you, do not argue with the gatekeeper; bypass them. Subpoena the underlying records directly from custodians, cite the statute yourself, retain a separate expert, and put your independent verification on the record so the monopoly claim is mooted by the parallel source.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/authority_monopoly_prevention.md", "preview": "# Authority Monopoly Prevention", "in_db": true}, {"doc_id": "coherence_consistency_test", "layer": "L1_demand", "target": ["opposing_counsel", "judge", "advisor_subprocess"], "venue": ["interpersonal", "deposition", "settlement"], "tempo": "parallel", "leverage": 4, "jurisdiction": ["universal"], "explanation": "An ongoing scoring of how much an actor's stated values match their observed actions across at least three independent domains (treatment of subordinates, behavior under criticism, conduct toward people who can do nothing for them, consistency over weeks not minutes). The signal is the trend in the coherence delta over time, not any single instance.", "inverse_strategy": "Assume you are being scored. Keep your own actions consistent with your stated values across every domain and time window, including informal interactions, so the coherence delta on you stays small. If accused of incoherence, produce the durable-over-time record (calendar, communications log) that shows the alleged delta is cherry-picked.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/coherence_consistency_test.md", "preview": "# Coherence Consistency Test", "in_db": true}, {"doc_id": "micropattern_extraction_early_detection", "layer": "L1_demand", "target": ["opposing_counsel", "witness", "judge"], "venue": ["deposition", "interpersonal", "hearing"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "In a deposition or interview, seed early questions where ground truth is known so you can baseline the witness's normal linguistic and physical tells (gaze, hand movement, gratuitous adjectives, reflexive smiles), then ask the contested question and watch for the delta from baseline. The micropatterns are not courtroom evidence — they are internal signal telling you which threads to pull harder.", "inverse_strategy": "Before any sworn examination, do a mock with adverse questioning so your baseline and stress responses are similar. Slow your cadence uniformly across all answers, avoid filler adjectives, keep hands and gaze neutral throughout. Treat every question as the contested one.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/micropattern_extraction_early_detection.md", "preview": "# Micropattern Extraction — Early Detection", "in_db": true}, {"doc_id": "emotional_dysregulation_leverage", "layer": "L2_refuse", "target": ["opposing_counsel", "counterparty"], "venue": ["settlement", "interpersonal", "hearing"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Stress narrows cognition in predictable ways. The algorithm tracks signs that the other side is in a degraded-judgment window (escalating message cadence, unforced procedural errors, repeated demands, after-hours sends) and times consequential offers or filings to land while that window is open, so they evaluate the move under poor judgment. The rule is to spot windows, not manufacture them.", "inverse_strategy": "Install a cooling-off rule on yourself: no signed agreement, no filing, no consequential email sent within a defined window after a triggering event (bad ruling, late-night provocation, surprise filing). Route all consequential decisions through a second reviewer who is not currently in the fight.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/emotional_dysregulation_leverage.md", "preview": "# Emotional Dysregulation Window", "in_db": true}, {"doc_id": "momentum_cascade_filing", "layer": "L3_expose", "target": ["opposing_counsel", "judge", "counterparty"], "venue": ["filing", "hearing"], "tempo": "parallel", "leverage": 4, "jurisdiction": ["universal"], "explanation": "A coordinated wave of multiple substantively meritorious motions across distinct domains, all filed within a narrow window, that exceeds the other side's ability to respond adequately on any one. The judge reads volume as productivity, opposing counsel reads it as a billing crisis, and the counterparty reads it as falling behind — and all three readings work in the filer's favor.", "inverse_strategy": "Triage immediately: rank the incoming filings by stakes and statutory deadlines, request brief continuances on the lower-stakes ones to consolidate response time on the high-stakes ones, and move to consolidate or strike duplicative filings. Flag any unsupported filing for Rule 137 / bad-faith sanctions to convert the cascade itself into your exhibit.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/momentum_cascade_filing.md", "preview": "# Momentum Cascade Filing", "in_db": true}, {"doc_id": "negative_sum_frame_shift", "layer": "vocab", "target": ["opposing_counsel", "judge", "counterparty", "advisor_subprocess"], "venue": ["settlement", "interpersonal"], "tempo": "preemptive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Reframes a fight from 'your gain is my loss' to 'we both lose value the longer this drags on,' making compromise feel rational instead of weak. Works by making the shared cost (fees, time, depletion of a fixed pool) visible to the decision-maker.", "inverse_strategy": "Refuse the framing by demonstrating asymmetric cost tolerance — show you can outlast and that delay actually grows your position (e.g., interest accrual, statutory clock running against them). Anchor the dispute back to concrete entitlements on the record rather than abstract pool math.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/negative_sum_frame_shift.md", "preview": "# Negative-Sum Reframing", "in_db": true}, {"doc_id": "leverage_choice_framing", "layer": "vocab", "target": ["opposing_counsel"], "venue": ["settlement", "interpersonal"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Presents the other side's attorney with a clean either/or memo — settle on these terms by date X, or face these pre-built filings on date X+1. Designed to flip opposing counsel from billing the dispute to advising their client to take the exit.", "inverse_strategy": "Treat the 'memo with deadline' as a litigation threat for the record, not a settlement overture. Reply in writing demanding any leverage be filed formally so it enters evidence, refuse to negotiate under an artificial deadline, and document the coercive framing for a future fees motion.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/leverage_choice_framing.md", "preview": "# Leverage as Choice, Not Threat", "in_db": true}, {"doc_id": "credential_collapse_documentary", "layer": "L3_expose", "target": ["judge", "opposing_counsel", "counterparty"], "venue": ["filing", "hearing"], "tempo": "reactive", "leverage": 5, "jurisdiction": ["universal"], "explanation": "Builds a single annotated table of every numeric, date, and identity contradiction across the opponent's own filings until the pattern itself proves dishonesty. One inconsistency is a typo; thirty side-by-side is fraud.", "inverse_strategy": "Audit your own prior filings for internal consistency before any new submission, file errata correcting innocent discrepancies on your own initiative, and prepare a witness or affidavit that explains category differences (gross vs net, snapshot vs averaged) before they get stacked against you.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/credential_collapse_documentary.md", "preview": "# Credential Collapse via Documentary Contradiction", "in_db": true}, {"doc_id": "trigger_point_mapping", "layer": "L2_refuse", "target": ["counterparty", "opposing_counsel"], "venue": ["settlement", "interpersonal", "deposition"], "tempo": "reactive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Catalogs specific topics, names, or phrasings that reliably knock the opposing party off-script, mostly to recognize them when used as bait. Primary use is defensive — spotting when the other side tries to derail you with emotional landmines.", "inverse_strategy": "Pre-rehearse flat, neutral responses to your known sensitivity topics and practice returning to the legal question within one sentence. Bring a written outline to depositions and hearings so you anchor to the document instead of reacting to provocation.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/trigger_point_mapping.md", "preview": "# Trigger Point Mapping", "in_db": true}, {"doc_id": "settlement_rejection_narrative", "layer": "vocab", "target": ["judge", "advisor_subprocess", "counterparty_counsel"], "venue": ["hearing", "filing"], "tempo": "reactive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Frames the other side's rejection of a generous offer as proof they want control rather than money, shifting the judge's read of their motives. Works only when the offer genuinely exceeds what a court would order under standard formulas.", "inverse_strategy": "Reject in writing with a specific, math-backed counter that identifies missing categories (omitted assets, undisclosed income, valuation disputes), so the rejection reads as principled rather than irrational. Never let a rejection stand without an articulated number.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/settlement_rejection_narrative.md", "preview": "# Settlement Rejection as Control Signal", "in_db": true}, {"doc_id": "procedure_compliance_signal", "layer": "L1_demand", "target": ["judge"], "venue": ["filing", "hearing"], "tempo": "parallel", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Treats every caption, deadline, certificate of service, and exhibit number as a small credibility deposit with the judge, accumulating into a substantive advantage. Opposing sloppiness then reads as substantive weakness by mirror.", "inverse_strategy": "Run a pre-filing checklist on every submission — captions, page numbers, certificate of service, exhibit indexing — and cure any past procedural defects with a clean amended filing. Do not point fingers at minor opposing defects; that draws scrutiny back to your own record.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/procedure_compliance_signal.md", "preview": "# Procedural Compliance as Credibility Signal", "in_db": true}, {"doc_id": "behavioral_coordinate_mapping", "layer": "meta", "target": ["opposing_counsel", "counterparty", "judge"], "venue": ["interpersonal"], "tempo": "parallel", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Scores each actor on three independent axes — autonomy versus control, coherence versus fragmentation, other-focus versus self-focus — to predict their responses in novel situations. Used internally to choose which lever to pull on whom.", "inverse_strategy": "Vary your own behavior deliberately across contexts so observers cannot fit you to a fixed coordinate, and keep written communications boring, factual, and identical in tone across recipients. Remove the data signal they need to model you.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/behavioral_coordinate_mapping.md", "preview": "# Three-Axis Behavioral Coordinate", "in_db": true}, {"doc_id": "extractive_mask_vulnerability", "layer": "L1_demand", "target": ["opposing_counsel", "witness", "advisor_subprocess"], "venue": ["interpersonal", "deposition"], "tempo": "preemptive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Identifies people running a covert extraction script by their early linguistic tells — rushed intimacy, unilateral credibility claims, dense future-promises — so distance can be created before the extraction lands. Bias is toward early withdrawal.", "inverse_strategy": "Keep all interactions slow, written, and transactional; refuse rapport acceleration and verify every credential claim independently. If someone presses for fast trust, slow the cadence deliberately and route through a third party.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/extractive_mask_vulnerability.md", "preview": "# Extractive Mask — Pre-Slip Detection", "in_db": true}, {"doc_id": "mutual_destruction_parity", "layer": "L3_expose", "target": ["opposing_counsel", "counterparty"], "venue": ["filing"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Constructs symmetric exposure so the other side faces the same financial, reputational, or regulatory risk you do, removing their incentive to drag the fight out for free. Once both sides bleed equally, settlement becomes the rational move.", "inverse_strategy": "Minimize your own exposure surface by cleaning up regulatory filings, tax positions, and licensing before they can be weaponized, and segregate assets so any one threat does not cascade. Refuse to engage in symmetric-disclosure offers — demand the other side go first on the record.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/mutual_destruction_parity.md", "preview": "# Mutual-Exposure Parity", "in_db": true}, {"doc_id": "finite_pool_negative_sum_reframing", "layer": "phil", "target": ["counterparty", "judge"], "venue": ["settlement", "mediation"], "tempo": "preemptive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Shows the mediator a calendar-math chart of monthly burn rate times months remaining, converting the dispute from an outcome contest into a time contest. The party with less appetite for time loss tends to move first.", "inverse_strategy": "Reframe the time axis as working for you (statutory interest, accruing arrears, a deadline running against the opponent) and present your own chart showing their burn exceeds yours. Decline mediation framings that assume a closed pool when income or contributions are still flowing.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/finite_pool_negative_sum_reframing.md", "preview": "# Finite-Pool Negative-Sum Reframing", "in_db": true}, {"doc_id": "information_leverage_settlement_forcing", "layer": "L2_refuse", "target": ["opposing_counsel", "counterparty"], "venue": ["settlement"], "tempo": "preemptive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Holds undisclosed damaging information in reserve and offers a binary choice in a settlement memo — agree by date X or it becomes part of the public record. The information is more valuable unfiled than filed.", "inverse_strategy": "Demand any allegation be put in a formal filing under oath rather than negotiated in private, preserving the choice memo as evidence of extortion-like leverage for a sanctions or fees motion. Get ahead of damaging facts by self-disclosing them with context first.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/information_leverage_settlement_forcing.md", "preview": "# Information Leverage → Forced Settlement", "in_db": true}, {"doc_id": "documented_defection_pattern_recognition", "layer": "L1_demand", "target": ["judge", "opposing_counsel"], "venue": ["filing", "hearing"], "tempo": "parallel", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Maintains an indexed log of every missed deadline, withheld disclosure, and ignored communication by the other side, so a pattern is visible to the judge. Each entry is trivial alone; the index is the weapon.", "inverse_strategy": "Respond to every communication in writing within a stated window even if the answer is 'will respond by date,' meet every deadline or file a contemporaneous explained extension request, and keep your own dated log so any pattern claim against you can be rebutted line by line.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/documented_defection_pattern_recognition.md", "preview": "# Documented Defection Pattern", "in_db": true}, {"doc_id": "cooperative_signal_through_procedural_restraint", "layer": "L1_demand", "target": ["judge"], "venue": ["filing", "hearing"], "tempo": "preemptive", "leverage": 2, "jurisdiction": ["universal"], "explanation": "Uses measured, courteous language ('respectfully requests,' 'in the interest of resolution') over aggressive substantive filings, so the judge reads you as the non-escalator while you still hit hard. The asymmetry between tone and content is the point.", "inverse_strategy": "Match the restrained tone in your own filings so no contrast benefits them, and quote their substantive content (not their polite wrapper) directly back at the court to expose the gap between tone and ask. Do not respond to courteous language with hostile language.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/cooperative_signal_through_procedural_restraint.md", "preview": "# Cooperative Signal via Restraint", "in_db": true}, {"doc_id": "motion_sequencing_ambush", "layer": "L2_refuse", "target": ["counterparty", "opposing_counsel", "judge"], "venue": ["filing"], "tempo": "reactive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Files a small number of heavy, fully-documented motions in a planned sequence so the second lands before the first is answered, compounding response burden. Each filing creates exposure the next one exploits.", "inverse_strategy": "Move immediately for consolidated briefing or a scheduling conference so all motions are heard together on a single set track, and request extensions tied to the cumulative page count. Triage your responses to the strongest motion first and answer the weaker ones with short procedural objections preserving rights.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/motion_sequencing_ambush.md", "preview": "# Motion Sequencing Ambush", "in_db": true}, {"doc_id": "financial_affidavit_as_leverage_weapon", "layer": "L1_demand", "target": ["counterparty", "judge"], "venue": ["filing", "hearing"], "tempo": "preemptive", "leverage": 5, "jurisdiction": ["universal"], "explanation": "Attacks the sworn financial disclosure directly with bank records, tax returns, and third-party documents, because every downstream support and asset order rests on that one document. Collapse the affidavit and you collapse the foundation.", "inverse_strategy": "Treat your own financial disclosure as a litigation document — reconcile every line to source records before signing, file timely amendments the moment any error is found, and keep a working file of the source documents indexed to each line so any challenge can be answered the same day.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/financial_affidavit_as_leverage_weapon.md", "preview": "# Financial Affidavit as Primary Weapon", "in_db": true}, {"doc_id": "threshold_triggered_disclosure_sequencing", "layer": "L2_refuse", "target": ["counterparty", "judge"], "venue": ["filing"], "tempo": "reactive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Pre-drafts a cascade of motions and holds them until the other side files something that can serve as the trigger, then releases the cascade as a 'response.' The reactive framing reads as more legitimate than an unprompted strike.", "inverse_strategy": "Avoid filing anything that hands them a clean trigger — keep your own filings narrow, factual, and free of provocative claims. When a 'response' arrives that obviously exceeds the scope of what you filed, move to strike the excess portions as non-responsive and request leave-of-court requirements for any new affirmative relief.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/threshold_triggered_disclosure_sequencing.md", "preview": "# Threshold-Triggered Motion Cascade", "in_db": true}, {"doc_id": "sworn_statement_burden_shift", "layer": "L1_demand", "target": ["counterparty", "judge"], "venue": ["filing", "hearing"], "tempo": "preemptive", "leverage": 2, "jurisdiction": ["universal"], "explanation": "Convert your argumentative claims into numbered factual assertions signed under oath with supporting documents attached, so the other side must either file their own sworn counter-affidavit (with their own documents) or be treated as conceding the point. It mechanically shifts the work of disproving facts onto the opponent.", "inverse_strategy": "Reply with a point-by-point sworn counter-affidavit on the same numbered structure, attaching primary documents for every disputed item; never let a numbered sworn assertion sit unanswered, because silence is treated as admission.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/sworn_statement_burden_shift.md", "preview": "# Sworn Statement Burden Shift", "in_db": true}, {"doc_id": "procedural_exhaustion_attrition", "layer": "L3_expose", "target": ["counterparty", "opposing_counsel"], "venue": ["filing"], "tempo": "parallel", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Use legitimate procedural friction (continuances, discovery disputes, scheduling motions) to bleed the better-resourced or more-urgent opponent dry over months, while always framing each individual delay as a good-faith procedural request rather than stalling. Time is the actual weapon.", "inverse_strategy": "Maintain a public timeline exhibit logging every continuance, extension, and scheduling motion with cumulative day counts, then file a single motion to set firm deadlines or for fee-shifting based on that pattern, converting drip-delay into one sanctionable record.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/procedural_exhaustion_attrition.md", "preview": "# Procedural Exhaustion as Attrition", "in_db": true}, {"doc_id": "system_extraction_loop_exit", "layer": "phil", "target": ["counterparty", "mediator"], "venue": ["settlement", "mediation"], "tempo": "preemptive", "leverage": 2, "jurisdiction": ["universal"], "explanation": "Name out loud that the litigation system itself profits from prolonged conflict (lawyers bill, experts engage, courts clear dockets via settlement) and present a negotiated exit as the only escape from a shared extractive trap rather than as a concession. Reframes the fight as both parties versus the meter.", "inverse_strategy": "Refuse the meta-frame; insist on adjudicating the specific issues on the merits and require any settlement proposal to be made as a concrete numbered offer with deadline, so abstract appeals to fatigue cannot substitute for actual terms.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/system_extraction_loop_exit.md", "preview": "# System Extraction Loop — Exit Path", "in_db": true}, {"doc_id": "discovery_gap_foundational_challenge", "layer": "L1_demand", "target": ["judge"], "venue": ["filing", "hearing"], "tempo": "preemptive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Attack the opponent's incomplete financial or factual disclosure as a foundational defect, then argue that any prior orders entered while disclosure was incomplete should be revisited because the court was missing the information it needed. Two sequential motions force the court into a corner where granting one logically requires granting the other.", "inverse_strategy": "Produce a complete, time-stamped disclosure package proactively and certify it on the record before any contested ruling; if accused of gaps, file a sworn statement enumerating what was produced when, plus an offer to supplement on any specific category they identify within a short deadline.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/discovery_gap_foundational_challenge.md", "preview": "# Discovery Gap as Foundational Challenge", "in_db": true}, {"doc_id": "forcing_function_procedural", "layer": "L2_refuse", "target": ["opposing_counsel", "judge"], "venue": ["filing"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Number every factual assertion in your filing and label each as deemed-admitted unless the other side specifically denies it within a stated window, so the opponent's only choices are to engage on your structure or build a record of non-engagement. Either path produces a usable result.", "inverse_strategy": "File a timely, item-by-item specific denial on every numbered assertion (even weak ones), citing the rule that requires only a general traverse, and refuse to adopt the opponent's numbering as binding by reorganizing the response under your own framework.", "chunks": 5, "source_file": "/Users/jthor/GitHub/caseledger/docs/concept_stubs/forcing_function_procedural.md", "preview": "# Forcing Function — Procedural", "in_db": true}, {"doc_id": "record_checkpoint_saturation", "layer": "L2_refuse", "target": ["judge"], "venue": ["filing"], "tempo": "parallel", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Every two or three months, file a status table listing every numbered factual const DIMENSIONS = ["layer", "target", "venue", "input", "output", "reversibility", "tempo", "deploy_cost", "leverage", "jurisdiction", "abstraction"];
const LIST_DIMS = new Set(["target","venue","input","output","jurisdiction"]);

let state = {
  view: "cards",
  filters: {},  // {dimension: Set<value>}
  search: "",
  matrixX: "layer",
  matrixY: "tempo",
};
DIMENSIONS.forEach(d => state.filters[d] = new Set());

// Pre-compute value->count per dimension
function dimensionStats(algos) {
  const stats = {};
  DIMENSIONS.forEach(d => stats[d] = new Map());
  for (const a of algos) {
    for (const d of DIMENSIONS) {
      let vals = a[d];
      if (vals == null) continue;
      if (!Array.isArray(vals)) vals = [vals];
      for (const v of vals) {
        if (v === undefined || v === null) continue;
        const sv = String(v);
        stats[d].set(sv, (stats[d].get(sv) || 0) + 1);
      }
    }
  }
  return stats;
}
const FULL_STATS = dimensionStats(ALGOS);

function valuesFor(dim) {
  return Array.from(FULL_STATS[dim].keys()).sort((a,b) => {
    // Numeric first if possible
    if (!isNaN(Number(a)) && !isNaN(Number(b))) return Number(a) - Number(b);
    return a.localeCompare(b);
  });
}

function matches(algo) {
  // Filter match
  for (const d of DIMENSIONS) {
    const sel = state.filters[d];
    if (sel.size === 0) continue;
    let vals = algo[d];
    if (vals == null) vals = [];
    if (!Array.isArray(vals)) vals = [vals];
    const sv = vals.map(String);
    let hit = false;
    for (const v of sel) if (sv.includes(v)) { hit = true; break; }
    if (!hit) return false;
  }
  // Search match
  if (state.search) {
    const q = state.search.toLowerCase();
    const hay = [
      algo.doc_id, algo.precondition, algo.anti_pattern, algo.preview || "",
      algo.explanation || "", algo.inverse_strategy || "",
      ...(algo.vocabulary || []),
    ].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function renderSidebar() {
  const aside = document.getElementById("sidebar");
  let html = "";
  for (const d of DIMENSIONS) {
    html += `<h3>${d}</h3><div class="filters">`;
    for (const v of valuesFor(d)) {
      const on = state.filters[d].has(v);
      const count = FULL_STATS[d].get(v) || 0;
      html += `<span class="filter-chip${on ? " on" : ""}" data-dim="${d}" data-val="${escapeHtml(v)}">${escapeHtml(v)}<span class="count">${count}</span></span>`;
    }
    html += `</div>`;
  }
  aside.innerHTML = html;
  aside.querySelectorAll(".filter-chip").forEach(el => {
    el.addEventListener("click", () => {
      const d = el.dataset.dim;
      const v = el.dataset.val;
      const set = state.filters[d];
      if (set.has(v)) set.delete(v); else set.add(v);
      render();
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c]);
}

function fmt(v) {
  if (Array.isArray(v)) return v.join(", ");
  return String(v);
}

function renderCard(a) {
  const layer = a.layer || "unscored";
  const lev = `l${a.leverage || 0}`;
  const inDb = a.in_db ? "" : ' <span class="layer-badge unscored">PEND</span>';
  const explain = a.explanation ? `<div class="explain">${escapeHtml(a.explanation)}</div>` : "";
  const inv = a.inverse_strategy ? `<div class="row"><div class="lbl">Counter — when used against you</div>${escapeHtml(a.inverse_strategy)}</div>` : "";
  const layerDisp = (a.layer || "unscored").replace("L1_demand","L1 demand").replace("L2_refuse","L2 refuse").replace("L3_expose","L3 expose");
  // Layer-aware short tag
  const tagBare = (a.layer || "unscored").startsWith("L") ? (a.layer || "").split("_")[0] : layerDisp;
  // Leverage bar (5 segments)
  const levN = a.leverage || 0;
  const levClass = levN >= 4 ? "high" : (levN === 3 ? "mid" : "low");
  let levBar = '<span class="lev-bar">';
  for (let i = 1; i <= 5; i++) levBar += `<span class="seg ${i <= levN ? "on " + levClass : ""}"></span>`;
  levBar += '</span>';
  return `
    <article class="algo ${layer}" data-doc-id="${a.doc_id}">
      <div class="card-head">
        <h4>${escapeHtml(a.doc_id)}</h4>
        <span class="layer-badge ${layer}">${escapeHtml(layerDisp)}</span>
      </div>
      ${explain}
      <div class="factor-row"><span class="k">target:</span> ${escapeHtml(fmt(a.target))}</div>
      <div class="factor-row"><span class="k">venue:</span> ${escapeHtml(fmt(a.venue))} <span class="k">· tempo:</span> ${escapeHtml(a.tempo || "")}</div>
      <div class="factor-row"><span class="k">output:</span> ${escapeHtml(fmt(a.output))}</div>
      <div class="factor-row"><span class="k">leverage</span> ${levBar} <span class="lev ${lev}">${levN}/5</span> <span class="k">· cost:</span> ${escapeHtml(a.deploy_cost || "")} <span class="k">· risk:</span> ${escapeHtml(a.reversibility || "")}${inDb}</div>
      <div class="detail">
        <div class="row"><div class="lbl">When to use — precondition</div>${escapeHtml(a.precondition || "—")}</div>
        <div class="row"><div class="lbl">Failure mode — anti-pattern</div>${escapeHtml(a.anti_pattern || "—")}</div>
        ${inv}
        <div class="row"><div class="lbl">Key vocabulary</div><div class="vocab">${(a.vocabulary || []).map(v => `<span>${escapeHtml(v)}</span>`).join("")}</div></div>
        <div class="row"><div class="lbl">Source file</div><div class="source">${escapeHtml(a.source_file || "(no source linked)")}</div></div>
        ${a.preview ? `<div class="row"><div class="lbl">Excerpt from source</div><div class="preview">${escapeHtml(a.preview)}</div></div>` : ""}
      </div>
    </article>`;
}

function renderCards() {
  const filtered = ALGOS.filter(matches);
  const main = document.getElementById("main");
  document.getElementById("active-count").textContent = filtered.length;
  document.getElementById("gap-count").textContent = 0;
  if (filtered.length === 0) {
    main.innerHTML = `<div class="stats-bar"><strong>0</strong> matches</div><div class="empty-state">No algorithms match current filters.</div>`;
    return;
  }
  main.innerHTML = `
    <div class="stats-bar">
      <span><strong>${filtered.length}</strong> of ${ALGOS.length} algos</span>
      <span>chunks: <strong>${filtered.reduce((s,a) => s + (a.chunks||0), 0)}</strong></span>
      <span>avg leverage: <strong>${(filtered.reduce((s,a) => s + (a.leverage||0), 0) / filtered.length).toFixed(1)}</strong></span>
    </div>
    <div class="cards">${filtered.map(renderCard).join("")}</div>`;
  main.querySelectorAll("article.algo").forEach(el => {
    el.addEventListener("click", () => el.classList.toggle("expanded"));
  });
}

function valuesOf(a, d) {
  let v = a[d];
  if (v == null) return [];
  return Array.isArray(v) ? v.map(String) : [String(v)];
}

function renderMatrix() {
  const main = document.getElementById("main");
  const filtered = ALGOS.filter(matches);
  const xVals = valuesFor(state.matrixX);
  const yVals = valuesFor(state.matrixY);
  // Build matrix: (x,y) -> [doc_ids]
  const cells = new Map();
  for (const a of filtered) {
    const xs = valuesOf(a, state.matrixX);
    const ys = valuesOf(a, state.matrixY);
    for (const x of xs) for (const y of ys) {
      const k = `${x}|||${y}`;
      if (!cells.has(k)) cells.set(k, []);
      cells.get(k).push(a.doc_id);
    }
  }
  let gaps = 0;
  let rows = `<tr><th class="corner"></th>${xVals.map(x => `<th>${escapeHtml(x)}</th>`).join("")}</tr>`;
  for (const y of yVals) {
    rows += `<tr><th class="row">${escapeHtml(y)}</th>`;
    for (const x of xVals) {
      const ids = cells.get(`${x}|||${y}`) || [];
      if (ids.length === 0) {
        gaps++;
        rows += `<td class="gap" title="gap: ${escapeHtml(state.matrixX)}=${escapeHtml(x)}, ${escapeHtml(state.matrixY)}=${escapeHtml(y)}">·</td>`;
      } else {
        rows += `<td class="has" title="${escapeHtml(ids.join(', '))}"><span class="cell-count">${ids.length}</span></td>`;
      }
    }
    rows += `</tr>`;
  }
  document.getElementById("active-count").textContent = filtered.length;
  document.getElementById("gap-count").textContent = gaps;
  const xPicker = `<select id="x-axis">${DIMENSIONS.map(d => `<option ${d===state.matrixX?"selected":""}>${d}</option>`).join("")}</select>`;
  const yPicker = `<select id="y-axis">${DIMENSIONS.map(d => `<option ${d===state.matrixY?"selected":""}>${d}</option>`).join("")}</select>`;
  main.innerHTML = `
    <div class="stats-bar"><span><strong>${filtered.length}</strong> algos in matrix</span><span><strong>${gaps}</strong> empty cells (potential gaps)</span></div>
    <div class="axis-pickers">X: ${xPicker} &nbsp; Y: ${yPicker}</div>
    <table class="matrix">${rows}</table>`;
  document.getElementById("x-axis").addEventListener("change", e => { state.matrixX = e.target.value; renderMatrix(); });
  document.getElementById("y-axis").addEventListener("change", e => { state.matrixY = e.target.value; renderMatrix(); });
}

      for (const a of filtered) {
        for (const x of valuesOf(a, dx)) for (const y of valuesOf(a, dy)) {
          occupied.add(`${x}|||${y}`);
        }
      }
      const total = xv.length * yv.length;
      const gaps = total - occupied.size;
      const ratio = total > 0 ? gaps / total : 0;
      lines.push({dx, dy, total, gaps, ratio});
    }
  }
  lines.sort((a,b) => b.ratio - a.ratio);
  const top = lines.slice(0, 24);
  document.getElementById("active-count").textContent = filtered.length;
  document.getElementById("gap-count").textContent = top.reduce((s,l) => s + l.gaps, 0);
  let html = `<div class="stats-bar">Top gap-dense factor pairs (under current filters)</div>`;
  html += `<table class="matrix"><tr><th>X axis</th><th>Y axis</th><th>gaps</th><th>total</th><th>% empty</th></tr>`;
  for (const l of top) {
    html += `<tr><th class="row">${escapeHtml(l.dx)}</th><td>${escapeHtml(l.dy)}</td><td class="cell-count">${l.gaps}</td><td>${l.total}</td><td>${(l.ratio*100).toFixed(0)}%</td></tr>`;
  }
  html += `</table>`;
  html += `<div class="gap-summary"><strong>Read this:</strong> rows with high % empty are factor regions where no algorithm currently lives. Each empty cell is a candidate for the next algo to formalize. Switch to <code>Matrix</code> view and pick X/Y from the top of this list to see which specific cells are blank.</div>`;
  main.innerHTML = html;
}

function render() {
  renderSidebar();
  if (state.view === "cards") renderCards();
  else if (state.view === "matrix") renderMatrix();
  else if (state.view === "gaps") renderGaps();
}

// Bind controls
document.getElementById("search").addEventListener("input", e => { state.search = e.target.value; render(); });
document.querySelectorAll("button.view-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll("button.view-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    state.view = b.dataset.view;
    render();
  });
});

render();
</script>
</body>
</html>
