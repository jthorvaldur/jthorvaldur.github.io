<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Algorithm Network</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #0e1014;
  --panel: #161922;
  --panel-2: #1c2030;
  --edge: #1f2330;
  --edge-hot: #3a3f56;
  --ink: #e7e9ee;
  --ink-dim: #9aa3b2;
  --ink-faint: #5d6577;
  --accent: #f5a623;
  --L1: #4ec9b0;
  --L2: #c586c0;
  --L3: #e06c75;
  --meta: #61afef;
  --vocab: #e5c07b;
  --phil: #d19a66;
  --chip: #2c3140;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: var(--bg); color: var(--ink);
  font: 13px/1.5 'Inter','SF Pro Text',-apple-system,system-ui,sans-serif;
  overflow: hidden;
}
header {
  position: fixed; top: 0; left: 0; right: 0;
  background: rgba(22, 25, 34, 0.92);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--edge);
  padding: 12px 22px;
  z-index: 10;
  display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
}
h1 { font-size: 15px; font-weight: 600; }
.meta { color: var(--ink-dim); font-size: 11px; }
.stats { margin-left: auto; display: flex; gap: 18px; font-size: 11px; color: var(--ink-dim); }
.stats strong { color: var(--ink); font-size: 13px; }
.controls {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
input.search {
  background: var(--panel-2); border: 1px solid var(--edge-hot);
  border-radius: 5px; color: var(--ink); padding: 5px 10px;
  font: inherit; font-size: 12px; width: 200px;
}
button.layer-chip, button.lev-chip {
  background: var(--chip); border: 1px solid transparent; color: var(--ink-dim);
  padding: 3px 9px; border-radius: 10px; font: inherit; font-size: 11px;
  cursor: pointer; font-family: 'JetBrains Mono', ui-monospace, monospace;
}
button.layer-chip.on, button.lev-chip.on { color: var(--ink); border-color: var(--accent); }
button.layer-chip[data-layer="meta"].on      { background: rgba(97,175,239,.18); }
button.layer-chip[data-layer="L1_demand"].on { background: rgba(78,201,176,.18); }
button.layer-chip[data-layer="L2_refuse"].on { background: rgba(197,134,192,.18); }
button.layer-chip[data-layer="L3_expose"].on { background: rgba(224,108,117,.18); }
button.layer-chip[data-layer="vocab"].on     { background: rgba(229,192,123,.18); }
button.layer-chip[data-layer="phil"].on      { background: rgba(209,154,102,.18); }
#graph { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; }
#graph svg { width: 100%; height: 100%; cursor: grab; }
#graph svg:active { cursor: grabbing; }
circle.node { stroke: rgba(255,255,255,0.15); stroke-width: 1px; cursor: pointer; transition: stroke-width 0.15s; }
circle.node:hover { stroke: #fff; stroke-width: 2px; }
circle.node.dim { opacity: 0.18; }
circle.node.highlight { stroke: var(--accent); stroke-width: 2.5px; }
line.link { stroke: #4a5060; stroke-opacity: 0.35; pointer-events: none; }
line.link.dim { stroke-opacity: 0.06; }
line.link.highlight { stroke: var(--accent); stroke-opacity: 0.75; }
text.label {
  fill: var(--ink-dim); font-size: 10px;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  pointer-events: none; text-anchor: middle;
  paint-order: stroke; stroke: var(--bg); stroke-width: 3px; stroke-linejoin: round;
}
text.label.dim { opacity: 0.15; }
text.label.highlight { fill: var(--accent); }
#detail {
  position: fixed; right: 16px; top: 80px; width: 340px;
  background: var(--panel); border: 1px solid var(--edge-hot);
  border-radius: 8px; padding: 14px 18px;
  max-height: calc(100vh - 110px); overflow-y: auto;
  display: none; box-shadow: 0 12px 36px rgba(0,0,0,0.5);
}
#detail.show { display: block; }
#detail h2 {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 14px; color: var(--accent); margin-bottom: 10px;
  font-weight: 600;
}
#detail .factor { font-size: 11px; color: var(--ink-dim); font-family: 'JetBrains Mono', monospace; margin: 3px 0; }
#detail .factor .k { color: var(--ink-faint); }
#detail .section { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--edge-hot); }
#detail .lbl { font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }
#detail .body { font-size: 12px; color: var(--ink); }
#detail .vocab span {
  background: var(--chip); color: var(--ink-dim);
  padding: 1px 6px; border-radius: 3px; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; margin-right: 3px; display: inline-block; margin-bottom: 3px;
}
#detail .neighbors { font-size: 11px; }
#detail .neighbors .row {
  display: flex; justify-content: space-between; padding: 3px 0;
  border-bottom: 1px dotted var(--edge);
  font-family: 'JetBrains Mono', monospace; cursor: pointer;
}
#detail .neighbors .row:hover { color: var(--accent); }
#detail .neighbors .w { color: var(--ink-faint); }
#detail .close {
  position: absolute; top: 10px; right: 12px;
  background: none; border: 0; color: var(--ink-faint);
  font-size: 18px; cursor: pointer; line-height: 1;
}
#detail .close:hover { color: var(--ink); }
.legend {
  position: fixed; left: 16px; bottom: 16px;
  background: var(--panel); border: 1px solid var(--edge-hot);
  border-radius: 6px; padding: 10px 12px; font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
}
.legend .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; color: var(--ink-dim); }
.legend .dot { width: 9px; height: 9px; border-radius: 50%; }
</style>
</head>

</header>

red_vocab": [], "factor_pair": "meta / parallel"}, {"source": "appellate_leverage_record_auditability", "target": "title_iv_d_camarda_analysis", "weight": 0.5, "vocab_overlap": 0, "shared_vocab": [], "factor_pair": "L3_expose / endgame"}, {"source": "leverage_choice_framing", "target": "settlement_rejection_narrative", "weight": 0.5, "vocab_overlap": 0, "shared_vocab": [], "factor_pair": "vocab / reactive"}]};

document.getElementById("n-nodes").textContent = GRAPH.nodes.length;
document.getElementById("n-links").textContent = GRAPH.links.length;

// Legend
const layers = [
  ["meta", "#61afef", "meta-framework"],
  ["L1_demand", "#4ec9b0", "L1 demand performance"],
  ["L2_refuse", "#c586c0", "L2 no contract"],
  ["L3_expose", "#e06c75", "L3 liar/expose"],
  ["vocab", "#e5c07b", "vocabulary"],
  ["phil", "#d19a66", "philosophy"],
];
document.getElementById("legend").innerHTML = layers.map(([id, c, label]) =>
  `<div class="row"><span class="dot" style="background:${c}"></span><span>${label}</span></div>`
).join("");

const svg = d3.select("#graph").append("svg");
const width = window.innerWidth;
const height = window.innerHeight - 56;
svg.attr("viewBox", [0, 0, width, height]);

const g = svg.append("g");
const zoom = d3.zoom().scaleExtent([0.2, 4]).on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);

const linkScale = d3.scaleLinear()
  .domain(d3.extent(GRAPH.links, l => l.weight))
  .range([0.8, 3.5]);

const radiusScale = d3.scaleLinear()
  .domain([0, 5])
  .range([6, 14]);

const linkG = g.append("g").attr("class", "links");
const nodeG = g.append("g").attr("class", "nodes");
const labelG = g.append("g").attr("class", "labels");

const linkSel = linkG.selectAll("line")
  .data(GRAPH.links)
  .join("line")
  .attr("class", "link")
  .attr("stroke-width", d => linkScale(d.weight));

const nodeSel = nodeG.selectAll("circle")
  .data(GRAPH.nodes)
  .join("circle")
  .attr("class", "node")
  .attr("r", d => radiusScale(d.leverage))
  .attr("fill", d => d.color)
  .call(d3.drag()
    .on("start", dragStart)
    .on("drag", dragMove)
    .on("end", dragEnd));

const labelSel = labelG.selectAll("text")
  .data(GRAPH.nodes)
  .join("text")
  .attr("class", "label")
  .text(d => d.id);

const sim = d3.forceSimulation(GRAPH.nodes)
  .force("link", d3.forceLink(GRAPH.links).id(d => d.id).distance(d => 80 - d.weight * 2).strength(d => 0.05 + d.weight * 0.04))
  .force("charge", d3.forceManyBody().strength(-180))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collide", d3.forceCollide().radius(d => radiusScale(d.leverage) + 4))
  .on("tick", tick);

function tick() {
  linkSel
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  nodeSel.attr("cx", d => d.x).attr("cy", d => d.y);
  labelSel.attr("x", d => d.x).attr("y", d => d.y - radiusScale(d.leverage) - 3);
}

function dragStart(e, d) { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragMove(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d) { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }

// Filtering
const state = {
  layers: new Set(["meta", "L1_demand", "L2_refuse", "L3_expose", "vocab", "phil"]),
  minLev: 0,
  search: "",
  selected: null,
};

function applyFilters() {
  const q = state.search.toLowerCase();
  GRAPH.nodes.forEach(n => {
    const layerOk = state.layers.has(n.layer);
    const levOk = (n.leverage || 0) >= state.minLev;
    let searchOk = true;
    if (q) {
      const hay = (n.id + " " + (n.vocabulary || []).join(" ")).toLowerCase();
      searchOk = hay.includes(q);
    }
    n._visible = layerOk && levOk && searchOk;
  });
  const visibleIds = new Set(GRAPH.nodes.filter(n => n._visible).map(n => n.id));
  GRAPH.links.forEach(l => {
    const sId = typeof l.source === "object" ? l.source.id : l.source;
    const tId = typeof l.target === "object" ? l.target.id : l.target;
    l._visible = visibleIds.has(sId) && visibleIds.has(tId);
  });

  nodeSel.classed("dim", n => !n._visible);
  labelSel.classed("dim", n => !n._visible);
  linkSel.classed("dim", l => !l._visible);
  document.getElementById("n-visible").textContent = visibleIds.size;
  applyHighlight();
}

function applyHighlight() {
  nodeSel.classed("highlight", n => state.selected && n.id === state.selected);
  labelSel.classed("highlight", n => state.selected && n.id === state.selected);
  if (!state.selected) {
    linkSel.classed("highlight", false);
    return;
  }
  const neighborIds = new Set([state.selected]);
  GRAPH.links.forEach(l => {
    const sId = typeof l.source === "object" ? l.source.id : l.source;
    const tId = typeof l.target === "object" ? l.target.id : l.target;
    if (sId === state.selected) neighborIds.add(tId);
    if (tId === state.selected) neighborIds.add(sId);
  });
  linkSel.classed("highlight", l => {
    const sId = typeof l.source === "object" ? l.source.id : l.source;
    const tId = typeof l.target === "object" ? l.target.id : l.target;
    return sId === state.selected || tId === state.selected;
  });
}

// Bind controls
document.querySelectorAll("button.layer-chip").forEach(b => {
  b.addEventListener("click", () => {
    const layer = b.dataset.layer;
    if (state.layers.has(layer)) {
      state.layers.delete(layer);
      b.classList.remove("on");
    } else {
      state.layers.add(layer);
      b.classList.add("on");
    }
    applyFilters();
  });
});
document.querySelectorAll("button.lev-chip").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll("button.lev-chip").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    state.minLev = +b.dataset.lev;
    applyFilters();
  });
});
document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  applyFilters();
});

// Detail panel
function showDetail(node) {
  state.selected = node.id;
  applyHighlight();
  const neighbors = [];
  GRAPH.links.forEach(l => {
    const sId = typeof l.source === "object" ? l.source.id : l.source;
    const tId = typeof l.target === "object" ? l.target.id : l.target;
    if (sId === node.id) neighbors.push({ id: tId, weight: l.weight, shared: l.shared_vocab || [] });
    else if (tId === node.id) neighbors.push({ id: sId, weight: l.weight, shared: l.shared_vocab || [] });
  });
  neighbors.sort((a, b) => b.weight - a.weight);
  const factors = [
    ["layer", node.layer], ["leverage", `${node.leverage}/5`],
    ["tempo", node.tempo], ["target", (node.target || []).join(", ")],
    ["venue", (node.venue || []).join(", ")],
    ["jurisdiction", (node.jurisdiction || []).join(", ")],
    ["abstraction", node.abstraction],
  ];
  const factorHtml = factors.map(([k, v]) => v ? `<div class="factor"><span class="k">${k}:</span> ${esc(String(v))}</div>` : "").join("");
  const vocab = (node.vocabulary || []).map(v => `<span>${esc(v)}</span>`).join("");
  const neighborHtml = neighbors.slice(0, 12).map(n => `<div class="row" data-id="${n.id}"><span>${esc(n.id)}</span><span class="w">${n.weight.toFixed(1)}</span></div>`).join("");
  document.getElementById("detail-body").innerHTML = `
    <h2>${esc(node.id)}</h2>
    ${factorHtml}
    <div class="section"><div class="lbl">precondition</div><div class="body">${esc(node.precondition || "—")}</div></div>
    <div class="section"><div class="lbl">anti-pattern</div><div class="body">${esc(node.anti_pattern || "—")}</div></div>
    ${vocab ? `<div class="section"><div class="lbl">vocabulary</div><div class="vocab">${vocab}</div></div>` : ""}
    ${neighbors.length ? `<div class="section"><div class="lbl">neighbors (weight)</div><div class="neighbors">${neighborHtml}</div></div>` : ""}
  `;
  document.getElementById("detail").classList.add("show");
  document.querySelectorAll("#detail .neighbors .row").forEach(r => {
    r.addEventListener("click", () => {
      const target = GRAPH.nodes.find(n => n.id === r.dataset.id);
      if (target) showDetail(target);
    });
  });
}

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c]); }

nodeSel.on("click", (e, d) => showDetail(d));
document.getElementById("detail-close").addEventListener("click", () => {
  document.getElementById("detail").classList.remove("show");
  state.selected = null;
  applyHighlight();
});

applyFilters();
</script>
</body>
