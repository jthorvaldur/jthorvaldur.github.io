<style>
:root {
  --bg: #0e1014;
  --panel: #161922;
  --panel-2: #1c2030;
  --edge: #1f2330;
  --edge-hot: #3a3f56;
  --ink: #e7e9ee;
  --ink-dim: #9aa3b2;
  --ink-faint: #5d6577;
  --accent: #f5a623;
  --accent-dim: #8a5d12;
  --L1: #4ec9b0;
  --L2: #c586c0;
  --L3: #e06c75;
  --meta: #61afef;
  --vocab: #e5c07b;
  --phil: #d19a66;
  --good: #5ed46f;
  --warn: #f5a623;
  --bad: #e06c75;
  --chip: #2c3140;
  --chip-on: #3d4566;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font: 13px/1.55 'Inter', 'SF Pro Text', -apple-system, system-ui, sans-serif;
  display: grid;
  grid-template-rows: auto 1fr;
  grid-template-columns: 320px 1fr;
  grid-template-areas: "header header" "list detail";
  min-height: 100vh;
}
header {
  grid-area: header;
  background: var(--panel);
  padding: 14px 24px;
  border-bottom: 1px solid var(--edge);
  display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
}
h1 { margin: 0; font-size: 16px; font-weight: 600; }
header .meta { color: var(--ink-dim); font-size: 11px; }
.stats-bar {
  margin-left: auto; display: flex; gap: 20px; font-size: 11px; color: var(--ink-dim);
}
.stats-bar strong { color: var(--ink); font-size: 14px; }
aside.list {
  grid-area: list;
  background: var(--panel);
  border-right: 1px solid var(--edge);
  overflow-y: auto;
  max-height: calc(100vh - 56px);
}
aside.list .head {
  position: sticky; top: 0;
  background: var(--panel);
  padding: 12px 18px 6px;
  border-bottom: 1px solid var(--edge);
  font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: .08em;
}
aside.list .item {
  padding: 10px 18px;
  border-bottom: 1px dotted var(--edge);
  cursor: pointer;
}
aside.list .item:hover { background: var(--panel-2); }
aside.list .item.active { background: var(--panel-2); border-left: 3px solid var(--accent); }
aside.list .doc-id {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
}
aside.list .row {
  display: flex; gap: 8px; align-items: center; margin-top: 4px;
  font-size: 10px; color: var(--ink-faint);
  font-family: 'JetBrains Mono', monospace;
}
.bar {
  flex-grow: 1;
  height: 4px;
  background: var(--edge);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.bar > span {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, var(--bad), var(--warn) 50%, var(--good));
}
main.detail {
  grid-area: detail;
  padding: 22px 30px 60px;
  overflow-y: auto;
  max-height: calc(100vh - 56px);
}
.detail-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 14px;
}
.detail-head h2 {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -.01em;
}
.summary-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  margin-bottom: 22px;
}
.summary-cell {
  background: var(--panel); padding: 10px 12px; border-radius: 6px;
  border: 1px solid var(--edge);
}
.summary-cell .lbl { font-size: 10px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: .06em; }
.summary-cell .val { font-size: 16px; color: var(--ink); font-weight: 600; margin-top: 4px; }
.summary-cell .sub { font-size: 10px; color: var(--ink-faint); font-family: monospace; margin-top: 2px; }
section.block {
  background: var(--panel); border: 1px solid var(--edge); border-radius: 8px;
  padding: 14px 18px; margin-bottom: 14px;
}
section.block h3 {
  margin: 0 0 10px; font-size: 11px; color: var(--accent);
  text-transform: uppercase; letter-spacing: .08em; font-weight: 600;
}
table.vocab {
  width: 100%; border-collapse: collapse;
}
table.vocab th, table.vocab td {
  text-align: left; padding: 6px 8px; font-size: 12px;
  border-bottom: 1px dotted var(--edge);
}
table.vocab th {
  color: var(--ink-dim);
  font-size: 10px;
  text-transform: uppercase;
  font-weight: 500;
  letter-spacing: .04em;
}
table.vocab td.tok {
  font-family: 'JetBrains Mono', monospace;
  color: var(--ink);
  font-size: 11px;
}
table.vocab td.miss { color: var(--bad); }
table.vocab td.juris { color: var(--ink-dim); font-family: monospace; font-size: 11px; }
table.vocab td.statute { color: var(--vocab); font-family: monospace; font-size: 11px; }
table.vocab td .leverage-cell {
  display: flex; gap: 8px; align-items: center;
}
table.vocab td .leverage-cell .v { font-family: monospace; min-width: 30px; }
.tag {
  display: inline-block; background: var(--chip); color: var(--ink-dim);
  font-size: 10px; padding: 1px 7px; border-radius: 9px;
  margin-right: 4px; font-family: monospace;
}
.tag.miss { background: rgba(224, 108, 117, 0.15); color: var(--bad); }
.tag.hit { background: rgba(94, 212, 111, 0.13); color: var(--good); }
.co-list { display: flex; flex-direction: column; gap: 4px; }
.co-list .row {
  display: flex; align-items: center; gap: 10px;
}
.co-list .row .name {
  font-family: monospace; color: var(--accent); font-size: 12px;
  cursor: pointer;
}
.co-list .row .name:hover { text-decoration: underline; }
.co-list .row .shared {
  font-family: monospace; font-size: 11px; color: var(--ink-dim);
}
.notes {
  font-size: 11px; color: var(--ink-dim);
  background: var(--bg);
  border-left: 2px solid var(--edge-hot);
  padding: 6px 10px;
}
.factor-line { font-size: 11px; color: var(--ink-dim); font-family: monospace; }
.factor-line .k { color: var(--ink-faint); }
.legend {
  font-size: 10px; color: var(--ink-faint);
  margin-bottom: 14px;
  font-family: monospace;
}
.search-box {
  margin: 8px 18px 0; width: calc(100% - 36px);
  background: var(--panel-2);
  color: var(--ink);
  border: 1px solid var(--edge-hot);
  border-radius: 6px;
  padding: 6px 10px;
  font: inherit;
  font-size: 12px;
}
@media (max-width: 950px) {
  body { grid-template-columns: 1fr; grid-template-areas: "header" "list" "detail"; }
  aside.list, main.detail { max-height: none; }
}
</style>

const ALGOS = CATALOG.map(a => {
  const j = DATA.join[a.doc_id] || {tokens:[], matched_count:0, total_count:0, avg_leverage:0};
  return Object.assign({}, a, {
    tokens: j.tokens || [],
    matched_count: j.matched_count || 0,
    total_count: j.total_count || 0,
    avg_leverage: j.avg_leverage || 0,
  });
}).sort((a,b) => (b.avg_leverage - a.avg_leverage));

const CO = DATA.co_occurrence || {};

let state = { activeId: null, search: "" };

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c]);
}

function bar(v) {
  const pct = Math.round(Math.max(0, Math.min(1, v)) * 100);
  return `<div class="bar"><span style="width:${pct}%"></span></div>`;
}

function renderList() {
  const q = state.search.toLowerCase();
  const filtered = ALGOS.filter(a => {
    if (!q) return true;
    if (a.doc_id.toLowerCase().includes(q)) return true;
    return (a.tokens || []).some(t => t.token.toLowerCase().includes(q));
  });
  let html = "";
  for (const a of filtered) {
    const pct = a.total_count > 0 ? Math.round(a.matched_count / a.total_count * 100) : 0;
    const layer = a.layer || "unscored";
    html += `<div class="item${state.activeId === a.doc_id ? ' active' : ''}" data-id="${a.doc_id}">
      <div class="doc-id">${escapeHtml(a.doc_id)}</div>
      <div class="row">
        <span style="min-width:30px">${a.avg_leverage.toFixed(2)}</span>
        ${bar(a.avg_leverage)}
        <span style="min-width:50px;text-align:right">${a.matched_count}/${a.total_count} · ${pct}%</span>
      </div>
      <div class="row">
        <span style="color:var(--ink-faint)">layer:</span> ${escapeHtml(layer)} · <span style="color:var(--ink-faint)">lev:</span> ${a.leverage || 0}/5
      </div>
    </div>`;
  }
  document.getElementById("algo-list").innerHTML = html;
  document.querySelectorAll(".item").forEach(el => {
    el.addEventListener("click", () => {
      state.activeId = el.dataset.id;
      renderList();
      renderDetail();
    });
  });
}

function renderDetail() {
  const main = document.getElementById("detail");
  if (!state.activeId) return;
  const a = ALGOS.find(x => x.doc_id === state.activeId);
  if (!a) return;
  const tokens = a.tokens || [];
  const matched = tokens.filter(t => t.match);
  const missed = tokens.filter(t => !t.match);

  let vocabRows = "";
  for (const t of tokens) {
    const m = t.match;
    if (!m) {
      vocabRows += `<tr>
        <td class="tok miss">${escapeHtml(t.token)} <span class="tag miss">no match</span></td>
        <td colspan="3" style="color:var(--ink-faint);font-size:10px">(token not in word_leverage; candidate for vocabulary ingest)</td>
      </tr>`;
      continue;
    }
    vocabRows += `<tr>
      <td class="tok">${escapeHtml(t.token)} <span class="tag hit">→ "${escapeHtml(m.matched_word)}"</span></td>
      <td><div class="leverage-cell"><span class="v">${m.leverage_score.toFixed(2)}</span>${bar(m.leverage_score)}</div></td>
      <td class="juris">${escapeHtml(m.jurisdiction || "—")}</td>
      <td class="statute">${escapeHtml(m.statutes || "—")}</td>
    </tr>`;
  }

  const factors = [
    ["target", a.target], ["venue", a.venue], ["tempo", a.tempo],
    ["leverage", a.leverage], ["reversibility", a.reversibility],
    ["jurisdiction", a.jurisdiction], ["abstraction", a.abstraction],
    ["deploy_cost", a.deploy_cost],
  ];
  const factorLines = factors.map(([k,v]) => {
    if (v == null) return "";
    const display = Array.isArray(v) ? v.join(", ") : v;
    return `<div class="factor-line"><span class="k">${k}:</span> ${escapeHtml(String(display))}</div>`;
  }).join("");

  const co = CO[a.doc_id] || [];
  const coHtml = co.length === 0
    ? `<div style="color:var(--ink-faint); font-size:11px">(no shared vocabulary with other algos)</div>`
    : `<div class="co-list">${co.map(([name, n]) => `<div class="row"><span class="name" data-jump="${name}">${escapeHtml(name)}</span><span class="shared">${n} shared tokens</span></div>`).join("")}</div>`;

  const pctMatched = a.total_count > 0 ? Math.round(a.matched_count / a.total_count * 100) : 0;

  main.innerHTML = `
    <div class="detail-head">
      <h2>${escapeHtml(a.doc_id)}</h2>
      <div style="color:var(--ink-dim); font-size:11px;font-family:monospace">layer: ${escapeHtml(a.layer || "")}</div>
    </div>

    <div class="summary-grid">
      <div class="summary-cell"><div class="lbl">vocab tokens</div><div class="val">${tokens.length}</div></div>
      <div class="summary-cell"><div class="lbl">matched in word_leverage</div><div class="val">${matched.length}</div><div class="sub">${pctMatched}% coverage</div></div>
      <div class="summary-cell"><div class="lbl">avg leverage</div><div class="val">${a.avg_leverage.toFixed(2)}</div></div>
      <div class="summary-cell"><div class="lbl">factor leverage</div><div class="val">${a.leverage || 0} / 5</div></div>
    </div>

    <section class="block">
      <h3>Factor map</h3>
      ${factorLines}
      <div class="factor-line" style="margin-top:6px"><span class="k">precondition:</span> ${escapeHtml(a.precondition || "—")}</div>
      <div class="factor-line"><span class="k">anti-pattern:</span> ${escapeHtml(a.anti_pattern || "—")}</div>
    </section>

    <section class="block">
      <h3>Vocabulary ↔ word_leverage</h3>
      <div class="legend">Each token in this algorithm joined against the 282K-row vocabulary DB. Misses are candidates for the next vocabulary ingest run.</div>
      <table class="vocab">
        <thead><tr><th>algo token</th><th>leverage</th><th>jurisdiction</th><th>statute</th></tr></thead>
        <tbody>${vocabRows}</tbody>
      </table>
    </section>

    <section class="block">
      <h3>Co-occurrence (algos sharing vocabulary)</h3>
      ${coHtml}
    </section>
  `;

  main.querySelectorAll("[data-jump]").forEach(el => {
    el.addEventListener("click", () => {
      state.activeId = el.dataset.jump;
      renderList();
      renderDetail();
      main.scrollTop = 0;
    });
  });
}

document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  renderList();
});

// Initial render — highlight the top algo
state.activeId = ALGOS[0]?.doc_id;
renderList();
renderDetail();
</script>
