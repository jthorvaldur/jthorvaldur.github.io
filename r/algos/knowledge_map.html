const CATALOG = [{"doc_id": "appellate_word_layering", "layer": "vocab", "target": ["judge", "appellate_court"], "venue": ["filing", "appeal"], "input": ["evidence", "claim"], "output": ["appellate", "lock-in"], "reversibility": "low", "tempo": "preemptive", "deploy_cost": "high", "leverage": 4, "jurisdiction": ["common-law", "IL", "federal"], "abstraction": "pattern", "precondition": "Trial filings must embed foreign legal concepts before appeal is raised; issue must be preserved in record", "anti_pattern": "Adding comparative law arguments post-appeal; late introduction of novel vocabulary", "vocabulary": ["mu'sir", "umgangssabotage", "capitis_deminutio_minima", "legitieme_portie", "restschuldbefreiung", "nazira", "pflichtteil"], "explanation": "Embed foreign-law concepts and comparative-law parentheticals into trial filings as decorative footnotes so they sit harmlessly in the record but ripen into full constitutional and structural-gap arguments on appeal. The trial judge ignores them; the appellate clerk and law-review writers do not.", "inverse_strategy": "When the other side plants comparative-law or 'structural gap' references, file a motion in limine and written objection at the trial level treating them as unpreserved legal theories outside the pleadings, force them to plead the theory or strike it, and demand they identify the U.S. statute or case that actually governs so the foreign citation never becomes a clean appellate hook."}, {"doc_id": "asymmetric_cost_pressure", "layer": "L1_demand", "target": ["opposing_counsel"], "venue": ["discovery", "filing", "regulatory"], "input": ["claim", "evidence", "deadline"], "output": ["lock-in", "asymmetric_cost", "deadline"], "reversibility": "medium", "tempo": "parallel", "deploy_cost": "low", "leverage": 5, "jurisdiction": ["universal"], "abstraction": "tactic", "precondition": "Counterparty uses high-volume collection model with thin margins per case; opponent must process attorney time", "anti_pattern": "Giving counsel time to prepare response; filing demands sequentially instead of simultaneously", "vocabulary": ["double_recovery", "deceptive_collection", "false_communication", "insurance_verification", "pattern_practice"], "explanation": "Against a high-volume opposing operation that profits from defaults, deploy cheap pre-templated discovery, admissions, depositions, bar grievances, and regulatory complaints in parallel so each of your hours costs them ten-plus. The goal is not to win on the merits but to make defending the case more expensive than walking away.", "inverse_strategy": "Refuse to be drawn into multi-front warfare: move early for a protective order and to consolidate or limit discovery as disproportionate, calendar each request and respond inside the rule with bare-minimum compliant objections, and challenge regulatory and bar complaints as litigation-tactic harassment so the cost-multiplier never compounds."}, {"doc_id": "bill_of_review_resurrection", "layer": "L1_demand", "target": ["counterparty", "system"], "venue": ["filing", "hearing"], "input": ["evidence", "pattern"], "output": ["lock-in", "sanction"], "reversibility": "medium", "tempo": "endgame", "deploy_cost": "high", "leverage": 4, "jurisdiction": ["common-law", "TX"], "abstraction": "template", "precondition": "Default judgment entered; extrinsic fraud documented (e.g., hidden prior payment)", "anti_pattern": "Filing after limitation period expires; using bill of review for intrinsic fraud", "vocabulary": ["bill_of_review", "extrinsic_fraud", "meritorious_defense", "prior_payment", "double_recovery"], "explanation": "Use the equitable bill of review (or its equivalent) to reopen long-closed default judgments by showing the winning party hid a material fact (like a prior insurance payment) that prevented the defendant from ever knowing they had a defense. The clock on 'reasonable time' restarts the day the concealed fact is discovered, not the day judgment entered.", "inverse_strategy": "Build the original record so the closed judgment cannot later be characterized as extrinsic fraud: attach insurance, payment, and offset documentation to the original petition, plead any setoffs on the face of the pleading, and if a bill of review is filed years later, attack it on the elements (no extrinsic fraud, movant's own negligence in failing to answer, no meritorious defense) with documentary proof of disclosure."}, {"doc_id": "class_action_investigation", "layer": "L2_refuse", "target": ["system", "regulator"], "venue": ["discovery", "regulatory", "filing"], "input": ["pattern", "evidence"], "output": ["informational", "lock-in"], "reversibility": "low", "tempo": "parallel", "deploy_cost": "high", "leverage": 5, "jurisdiction": ["universal", "TX"], "abstraction": "concept", "precondition": "Pattern documented across multiple cases; default rate calculable; non-disclosure must be systematic", "anti_pattern": "Single case investigation; assuming pattern without statistical validation", "vocabulary": ["pattern_practice", "systematic_fraud", "default_judgment_mill", "class_action", "dtpa", "treble_damages"], "explanation": "Convert a single bad case against a high-volume plaintiff into a class by scraping court dockets statewide, sampling templated petitions, calculating the default-judgment rate, and proving that the same omission or false statement appears across hundreds of filings. Once the pattern is documented, plaintiff-side firms will take it on contingency because treble-damages statutes make the math work.", "inverse_strategy": "Aggressively individuate every case: vary petition language, document insurance and payment status on the face of each filing, settle outlier cases with strong evidence quickly and quietly to remove typicality plaintiffs, and if a class is threatened, attack predominance and adequacy by showing each renter's facts differ on damages, insurance, and consent."}, {"doc_id": "demand_performance", "layer": "L1_demand", "target": ["counterparty", "opposing_counsel"], "venue": ["email", "filing"], "input": ["deadline", "obligation"], "output": ["deadline", "lock-in", "sanction"], "reversibility": "high", "tempo": "reactive", "deploy_cost": "low", "leverage": 3, "jurisdiction": ["universal"], "abstraction": "pattern", "precondition": "Specific outstanding obligation exists; deadline is statutory or reasonable; sanction is pre-positioned", "anti_pattern": "Pleading tone; restating opponent's position; offering alternatives; vague consequences", "vocabulary": ["obligation", "deadline", "demand", "sanction", "default", "noncompliance", "motion_to_compel"], "explanation": "Every written message to an adversary must (1) name a specific obligation they already owe, (2) attach a hard deadline, and (3) pre-state the exact sanction that fires if the deadline passes; then their silence becomes admissible evidence and their response locks them to a position. The party who issues many such demands sets the tempo and looks productive on the record.", "inverse_strategy": "Never let a demand sit unanswered: respond inside the deadline with a written objection that defines the obligation more narrowly, denies any agreement on tempo, and offers a counter-deadline; if the demand is harassing or overbroad, file a one-page motion for protective order so the record shows engagement rather than default."}, {"doc_id": "dutch_default_principle", "layer": "phil", "target": ["self", "system"], "venue": ["all"], "input": ["silence"], "output": ["informational"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["universal"], "abstraction": "concept", "precondition": "Every legal system has defaults; defaults are never favorable to the inactive party", "anti_pattern": "Assuming inaction is neutral; failing to map system defaults", "vocabulary": ["default_outcome", "wettelijke_verdeling", "legitieme_portie", "baseline", "mapped_defaults"], "explanation": "Every legal system has hardcoded defaults that fire automatically when a party does nothing, and those defaults are never neutral; they advance the system or the moving party. Mastery of the system is essentially mastery of the default outcomes and the windows in which they can be flipped.", "inverse_strategy": "When facing an opponent who systematically uses defaults as a weapon, map every deadline, statutory presumption, and 'silence-equals-consent' rule before any contact, calendar each one, and pre-stage a minimal one-page filing to break each default; treat 'doing nothing' as an active and dangerous choice in every interaction."}, {"doc_id": "foia_confirmation_by_protection", "layer": "L2_refuse", "target": ["regulator", "system"], "venue": ["FOIA", "regulatory"], "input": ["silence", "deadline"], "output": ["informational"], "reversibility": "high", "tempo": "reactive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["universal", "IL"], "abstraction": "concept", "precondition": "FOIA response cites confidentiality protections (implies records exist); denials contradict across agencies", "anti_pattern": "Accepting 'no records found' at face value; not detecting confirmation-by-protection signal", "vocabulary": ["confirmation_by_protection", "foia_denial", "confidentiality_exemption", "identity_verification", "records_exist"], "explanation": "When an agency denies a records request by citing confidentiality statutes or asking for identity verification, it has confirmed the records exist, because there is nothing to protect when nothing exists. The specific exemption cited tells you which type of record they are holding.", "inverse_strategy": "When you are the agency or party fielding such a request and don't want to confirm existence, respond with a true Glomar-style 'we can neither confirm nor deny' answer, or issue a generic 'no records responsive within the search parameters described' denial that cites no record-specific exemption, so the denial leaks no information about underlying files."}, {"doc_id": "foia_doublespeak_test", "layer": "L3_expose", "target": ["system", "regulator"], "venue": ["FOIA", "discovery"], "input": ["silence", "claim"], "output": ["informational"], "reversibility": "low", "tempo": "reactive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["universal"], "abstraction": "concept", "precondition": "Multiple FOIA denials from different offices; contradiction documentable", "anti_pattern": "Treating each denial independently; not tracking circular referrals", "vocabulary": ["bureaucratic_loop", "doublespeak", "orwell_index", "circular_referral", "contradiction"], "explanation": "When two arms of the same bureaucracy give contradictory answers to the same records request, the contradiction itself becomes the case: one office cited confidentiality to protect records the other office said do not exist, and only one statement can be true. Score the response on verbosity, referrals, template-ratio, and contradiction to detect the loop programmatically.", "inverse_strategy": "If you are the requester, send identical requests to every referenced office on the same day, log every response, and when you catch the contradiction, file a single appeal that attaches both responses side by side and demands the appellate body resolve which statement is correct; do not get drawn into another round of the loop."}, {"doc_id": "foia_identity_verification_trap", "layer": "L1_demand", "target": ["regulator"], "venue": ["FOIA", "email"], "input": ["deadline"], "output": ["deadline", "informational"], "reversibility": "high", "tempo": "reactive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["universal", "IL"], "abstraction": "tactic", "precondition": "Identity verification required but agency has not specified accepted forms; perjury declaration is legal equivalent to notarization", "anti_pattern": "Accepting agency's vague 'verification needed' without demanding specification; using wrong form first", "vocabulary": ["identity_verification", "perjury_declaration", "penalty_of_perjury", "doj_form_361", "burden_shift"], "explanation": "Agencies stall first-party records requests by demanding identity verification but refusing to specify what proof they will accept, then rejecting whatever the requester sends. Including a perjury declaration plus an offer of notary and photo ID in one submission, with a sentence demanding they specify which method they accept, collapses the loop into a single decision.", "inverse_strategy": "When verification is genuinely required, publish (or demand) a written one-page checklist of acceptable identity proofs up front and treat the perjury-declaration form as automatically sufficient; never reject a submission without naming the specific defect and the cure, so the 'ping-pong' record cannot be built against you."}, {"doc_id": "foia_title_iv_d_template", "layer": "L1_demand", "target": ["regulator"], "venue": ["FOIA"], "input": ["deadline"], "output": ["informational", "deadline"], "reversibility": "high", "tempo": "reactive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["universal", "IL", "federal"], "abstraction": "template", "precondition": "Title IV-D case active; requesting agency is IV-D administering authority; fee waiver available for pro se litigant", "anti_pattern": "Omitting fee waiver request; not specifying ledger gaps; too vague on records requested", "vocabulary": ["title_iv_d", "payment_ledger", "federal_reimbursement", "child_support_enforcement", "iv_d_case_status"], "explanation": "A structured public-records request to the state child-support agency that asks, item by item, for case status, full payment ledger, federal incentive reimbursements, income-withholding orders, license-suspension and credit-reporting referrals, and the intergovernmental agreement, so the response either produces the enforcement file or proves the agency is hiding it.", "inverse_strategy": "If such a templated request lands on you, respond strictly within the statutory window, produce the non-exempt records exactly as listed (or item-by-item denials tied to a single statute each), and avoid stacking unrelated exemptions; that removes the requester's strongest argument that the denial is pretextual."}, {"doc_id": "judge_profile", "layer": "meta", "target": ["judge", "self"], "venue": ["all"], "input": ["evidence", "pattern"], "output": ["informational"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "medium", "leverage": 2, "jurisdiction": ["IL"], "abstraction": "concept", "precondition": "Judge has public record; biographical data available; bar memberships and community affiliations documented", "anti_pattern": "Personalizing the judge; assuming politics determine outcomes; relying on rumors over verified record", "vocabulary": ["judicial_profile", "community_service", "career_trajectory", "decision_making_pattern", "enforcement_leaning"], "explanation": "Build a structured profile of the assigned judge from public sources only (court directory, law-school record, prior assignments, bar memberships, published rulings, observed in-court patterns) and convert it into numerical lean scores on axes like enforcement-vs-accommodation, financial sophistication, pro-se sympathy, and form-order deference. The profile drives concrete tactical choices about who argues, what evidence leads, and what to put in writing.", "inverse_strategy": "Assume the other side has built a profile on the judge and on you; neutralize the asymmetry by never tailoring oral argument to the judge's identity in ways that can be replayed as bias-baiting, by submitting your own proposed orders so the judge's form-order tendency is captured by your draft instead of opposing counsel's, and by keeping every argument grounded in the trial record rather than identity-coded signals."}, {"doc_id": "liar_algorithm", "layer": "L3_expose", "target": ["counterparty", "opposing_counsel"], "venue": ["deposition", "discovery", "filing"], "input": ["claim", "evidence"], "output": ["lock-in", "sanction", "appellate"], "reversibility": "low", "tempo": "parallel", "deploy_cost": "high", "leverage": 4, "jurisdiction": ["universal"], "abstraction": "pattern", "precondition": "Counterparty has made ≥3 sworn statements contradicted by objective evidence; counter-evidence exists before lock-in", "anti_pattern": "Confronting lie in real-time; engaging substance of the lie; filing single-instance contradiction", "vocabulary": ["lock_in", "documented_gap", "objective_evidence", "perjury", "fraud_on_the_court", "sanctions"], "explanation": "When the opposing party lies repeatedly, do not correct them in the moment; instead move every contested claim into a higher-stakes sworn venue (admissions, sworn affidavits, depositions, trial testimony) so the lie locks in, then introduce the objective contradicting evidence later in a single motion that stacks the pattern. The case is won by the documented gap between sworn statements and objective records, not by argument.", "inverse_strategy": "If you suspect this trap is being set against you, never sign a sworn document, affidavit, or admission without first reconciling it against bank, registry, and third-party records you can independently produce, mark uncertain items as 'to the best of my present knowledge, subject to amendment,' and supplement immediately when any error surfaces so no lockable gap ever forms."}, {"doc_id": "manipulation_taxonomy", "layer": "L3_expose", "target": ["system", "counterparty"], "venue": ["all"], "input": ["pattern", "claim"], "output": ["informational", "appellate"], "reversibility": "low", "tempo": "preemptive", "deploy_cost": "medium", "leverage": 3, "jurisdiction": ["universal"], "abstraction": "concept", "precondition": "Pattern identified across psychological, interpersonal, legal, institutional, and linguistic layers", "anti_pattern": "Single-layer analysis; ignoring institutional design; not connecting DSM diagnosis to statutory language", "vocabulary": ["dsm_5", "cluster_b", "darvo", "gaslighting", "financial_abuse", "coercive_control", "orwell_index", "manipulation_tactic"], "explanation": "A unified five-layer index that maps psychological diagnoses to interpersonal tactics to statutory legal terms to bureaucratic design patterns to a measurable linguistic signature ('Orwell Index'). The point is that gaslighting, stonewalling, perjury, agency loops, and false sworn statements are the same pattern at different scales and can be detected by language analysis.", "inverse_strategy": "Against a counterparty deploying this taxonomy, force every interaction into structured, time-stamped, schema-checked written exchanges (numbered demands, dated responses, attached evidence) so soft tactics like stonewalling and gaslighting cannot survive contact with the record; never engage on the emotional or narrative layer where the manipulation is designed to operate."}, {"doc_id": "marriage_validity_analysis", "layer": "L2_refuse", "target": ["judge", "self"], "venue": ["filing", "hearing"], "input": ["evidence", "claim"], "output": ["lock-in", "appellate"], "reversibility": "medium", "tempo": "endgame", "deploy_cost": "high", "leverage": 3, "jurisdiction": ["IL", "Alberta", "federal"], "abstraction": "concept", "precondition": "Marriage performed in another jurisdiction; separation period documented; comparative law frameworks available", "anti_pattern": "Assuming Illinois jurisdiction is unquestionable; not researching home jurisdiction law; filing before demand period complete", "vocabulary": ["forum_non_conveniens", "concurrent_jurisdiction", "zerruttungsprinzip", "marriage_validity", "separation_period"], "explanation": "Treat the marriage certificate and the underlying jurisdictional facts (where performed, when, current residence, length of separation) as a foundational document the case cannot stand on without; demand it through formal discovery, and use comparative-law thresholds for separation-based dissolution to argue that the proceeding has been consumed by enforcement rather than resolution. Concurrent filing in the jurisdiction of the marriage's origin is the strongest leverage move.", "inverse_strategy": "Produce the marriage certificate and a one-page jurisdictional declaration (place of marriage, both residences, date of separation) at the first case-management conference so the foundation is uncontested, and oppose any concurrent foreign filing immediately by moving for an anti-suit injunction or invoking the first-filed rule so jurisdiction never fragments."}, {"doc_id": "no_contract", "layer": "L2_refuse", "target": ["judge", "opposing_counsel"], "venue": ["filing"], "input": ["charge"], "output": ["lock-in", "appellate"], "reversibility": "low", "tempo": "reactive", "deploy_cost": "medium", "leverage": 3, "jurisdiction": ["universal"], "abstraction": "tactic", "precondition": "Charge lacks required findings (Turner, Rule 137, etc.); underlying order void or procured by fraud; written filing only", "anti_pattern": "Oral invocation in pro se court appearance; mixing with substantive defense; using without procedural citations", "vocabulary": ["notice_of_non_consent", "required_finding", "jurisdictional_defect", "void_order", "coercive_sanction"], "explanation": "When the other side asserts a coercive charge (contempt, sanctions, jurisdictional finding), refuse the implicit contract that the charge is valid before defending the merits: in writing only, demand they show the authority, the injured party, the required findings, and the properly named party. Engaging substance accepts the framing; refusing it forces them to prove the charge is even properly stated.", "inverse_strategy": "When you are the moving party, pre-load your charge with every required finding on the face of the motion (statute, authority, named party, specific conduct, required threshold findings) and attach the supporting record, so a 'no consent / show authority' response collapses into mere rhetoric the court can dismiss without engaging."}, {"doc_id": "opt_out_weapon_strategy", "layer": "L1_demand", "target": ["system", "counterparty"], "venue": ["filing"], "input": ["pattern", "evidence"], "output": ["lock-in", "sanction", "asymmetric_cost"], "reversibility": "low", "tempo": "endgame", "deploy_cost": "high", "leverage": 4, "jurisdiction": ["TX", "federal"], "abstraction": "tactic", "precondition": "Class action filed and proven; individual plaintiff has strongest evidence; opt-out window respected", "anti_pattern": "Opting out before class verdict; relying on class alone without individual reserve; sharing plaintiff list", "vocabulary": ["opt_out", "collateral_estoppel", "class_action", "treble_damages", "individual_recovery", "offensive_non_mutual"], "explanation": "In a class action against a defendant who commits the same wrong many times, the plaintiffs with the strongest individual evidence should opt out of the class before certification; the class proves the pattern, and the opt-outs then sue individually using that finding as collateral estoppel, collecting full statutory damages instead of a pro-rata share. The opt-out has no losing move: if the class wins, they collect more; if it loses, they are not bound.", "inverse_strategy": "Stop the opt-out leverage early by settling the strongest individual cases on confidential, non-precedent-setting terms before class certification, vigorously contesting any class-wide finding that could be reused offensively, and where settlement is unavoidable, structuring it to require dismissal with prejudice and a no-collateral-estoppel clause so individual reuse of the finding is barred."}, {"doc_id": "orwell_index_spec", "layer": "L3_expose", "target": ["system", "self"], "venue": ["all"], "input": ["claim"], "output": ["informational"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["universal"], "abstraction": "concept", "precondition": "Any document can be scored on seven axes (verbosity, referrals, agency hiding, stated_vs_actual, template, exemptions, contradiction)", "anti_pattern": "Using single-axis scoring; applying subjectively; not weighting stated_vs_actual at 0.20", "vocabulary": ["verbosity_ratio", "referral_loops", "agency_hiding", "stated_vs_actual", "template_ratio", "exemption_stacking", "contradiction"], "explanation": "A 0-to-1 score that rates any document on how much it obscures or contradicts its own stated purpose, measured across seven axes: verbosity, referral loops, hidden agency, title-vs-content gap, template ratio, exemption stacking, and internal contradictions. It quantifies the gut sense of which side is being straight with the reader and which side is hiding behind language.", "inverse_strategy": "Score your own incoming and outgoing filings before sending; keep your score near zero by saying what you mean in active voice, citing one reason not five, defining your terms, and ensuring the title matches the content. Refuse to engage their high-Orwell document on its terms — quote the contradictory passages side-by-side and let the gap speak."}, {"doc_id": "petition_modify_support_510", "layer": "L1_demand", "target": ["judge"], "venue": ["filing", "hearing"], "input": ["evidence", "deadline"], "output": ["deadline", "lock-in"], "reversibility": "medium", "tempo": "reactive", "deploy_cost": "high", "leverage": 3, "jurisdiction": ["IL"], "abstraction": "template", "precondition": "Substantial change in circumstances documented; foreseeability is statutorily barred as defense; involuntary loss proven", "anti_pattern": "Vague causation chain; not quantifying financial change; accepting foreseeability argument", "vocabulary": ["substantial_change_in_circumstances", "involuntary_unemployment", "ability_to_pay", "financial_collapse", "support_modification"], "explanation": "A petition that asks the court to lower an existing support obligation by proving a substantial, involuntary change in circumstances since the last order, while citing the statutory bar that prevents the other side from arguing the change was foreseeable. It converts a 'pay or be jailed' posture into a 'the underlying number is wrong' posture.", "inverse_strategy": "When the other side files for downward modification, immediately attack voluntariness and causation: produce evidence the change is self-inflicted (resignations, declined offers, lifestyle inconsistent with claimed income) and force a vocational evaluation. Demand sworn updated financial disclosure tied to the change date."}, {"doc_id": "petition_parenting_time_607_5", "layer": "L2_refuse", "target": ["judge"], "venue": ["filing", "hearing"], "input": ["claim", "evidence"], "output": ["lock-in", "sanction"], "reversibility": "medium", "tempo": "reactive", "deploy_cost": "medium", "leverage": 4, "jurisdiction": ["IL"], "abstraction": "template", "precondition": "Parenting time denied for ≥30 days; allocation judgment in place; violations specific and documented", "anti_pattern": "Lumping violations together; not quantifying separation days; assuming reunification without proof", "vocabulary": [6075, "parenting_time_abuse", "expedited_procedure", "make_up_parenting_time", "contempt_for_violator", "reunification_therapy"], "explanation": "An expedited petition that flips a parent-versus-parent dispute by asking the court to find the custodial parent has engaged in a pattern of 'parenting time abuse' — blocking contact, ignoring required reunification steps, or refusing record access — and to impose make-up time, fines, fee-shifting, and potential jail on the blocking parent. The same statute that can be used to threaten the absent parent is reframed against the gatekeeper.", "inverse_strategy": "Maintain a contemporaneous, time-stamped log of every offered visit, every facilitated call, and every therapist referral; respond promptly in the agreed communication channel; document the other parent's refusals or no-shows in writing. Counter-file showing good-faith facilitation and shift the abuse finding back."}, {"doc_id": "precision_trigger_words", "layer": "vocab", "target": ["judge", "appellate_court"], "venue": ["filing"], "input": ["evidence", "claim"], "output": ["lock-in", "appellate"], "reversibility": "low", "tempo": "preemptive", "deploy_cost": "medium", "leverage": 3, "jurisdiction": ["universal", "IL"], "abstraction": "tactic", "precondition": "Word has ≥1 dictionary definition and ≥1 Black's Law entry; describes conduct not persons; deployed once per motion", "anti_pattern": "Reusing word across multiple motions; profane or defamatory language; personalizing the word to the litigant", "vocabulary": ["retardation", "dissipation", "dereliction", "spoliation", "contumacious", "obdurate", "peculation", "subterfuge", "unconscionable"], "explanation": "A drafting technique that selects a single dictionary-defined word with both precise technical meaning and emotional charge (e.g. retardation, dissipation, contumacious), immediately defines it with three sources to neutralize objections, then deploys it structurally throughout one filing to reframe the narrative. The friction makes the judge read instead of skim.", "inverse_strategy": "Do not object to the word — that concedes its power and signals you care about tone over substance. Instead, accept the dictionary definition in your response, then show the factual predicate for the word is absent ('the cited conduct is not, in fact, dissipation under the statute because X'). Strip its emotional charge by treating it as ordinary vocabulary."}, {"doc_id": "procedural_discovery_algorithm", "layer": "L1_demand", "target": ["self", "opposing_counsel"], "venue": ["filing", "discovery"], "input": ["situation", "silence"], "output": ["informational", "lock-in"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["IL", "universal"], "abstraction": "concept", "precondition": "Pro se litigant has incomplete procedural map; reversal of search direction (situation→tools not tool→situation)", "anti_pattern": "Assuming all tools are known; not connecting case facts to dormant procedures", "vocabulary": ["fee_waiver", "510_modification", 6075, "508a_interim_fees", "exemptions", "turner_motion", "procedural_tools"], "explanation": "A reverse-search system: instead of a litigant trying to name a tool they don't know exists, the system takes the litigant's situation (no income, no contact with kids, threatened with jail, hidden financial disclosure) and returns every applicable statute, rule, and motion that maps to that situation. It closes the gap between what the law offers and what a pro se litigant can find.", "inverse_strategy": "Run the same situation-to-tool map on your own posture and pre-empt the obvious motions — file your own fee request, your own discovery enforcement, your own modification petition before the other side does. Whoever names the tool first frames it."}, {"doc_id": "three_layer_algo", "layer": "meta", "target": ["opposing_counsel", "counterparty", "judge"], "venue": ["all"], "input": ["obligation", "charge", "claim"], "output": ["lock-in", "deadline", "appellate"], "reversibility": "high", "tempo": "parallel", "deploy_cost": "medium", "leverage": 4, "jurisdiction": ["universal"], "abstraction": "concept", "precondition": "Counterparty lies repeatedly under oath; separate L1 (owed), L2 (charged), L3 (claimed) into orthogonal vectors", "anti_pattern": "Mixing layers in one message; oral L2 without counsel; L1 without deadline; L3 with substance engagement", "vocabulary": ["layer_1_demand", "layer_2_no_contract", "layer_3_liar_algorithm", "orthogonal_vectors", "one_algorithm_per_move"], "explanation": "A meta-framework that splits adversarial moves into three orthogonal layers: demanding performance on what they owe (with deadlines and default consequences), refusing consent to charges built on missing predicate findings, and locking in their false sworn statements without arguing the substance. The rule is one layer per move — never mix demand with rebuttal in the same breath.", "inverse_strategy": "Force them to mix layers. Respond to a demand with a substantive denial; respond to a 'no consent' filing with the missing findings produced cleanly; respond to a lie-lock attempt by promptly issuing a corrected sworn record so the locked statement becomes stale. Each cross-layer move you draw from them dilutes their next move."}, {"doc_id": "title_iv_d_camarda_analysis", "layer": "L3_expose", "target": ["judge", "system", "regulator"], "venue": ["filing", "federal"], "input": ["evidence", "pattern"], "output": ["appellate", "informational"], "reversibility": "low", "tempo": "endgame", "deploy_cost": "high", "leverage": 4, "jurisdiction": ["IL", "federal"], "abstraction": "concept", "precondition": "Camarda case researched; Title IV-D structural conflict documented; federal incentive quantified", "anti_pattern": "Assuming state is neutral; not connecting IV-D incentive to enforcement pressure; missing appellate angle", "vocabulary": ["title_iv_d", "federal_incentive", "enforcement_incentive", "structural_conflict", "section_1983", "deprivation_of_rights"], "explanation": "An enforcement-defense framework that, for every coercive action (contempt, garnishment, license suspension, arrest), demands the certified signed judicial instrument behind it and the ledger of dollars seized versus dollars disbursed. When the signed predicate cannot be produced or the ledger shows a gap, the enforcement chain collapses and a federal civil-rights path opens.", "inverse_strategy": "Keep every enforcement order pristine: certified signature, complete ledger reconciliation, every disbursement traceable to a dated entry. Pre-stage the signed instrument and the running ledger as exhibits so the 'show me the paper' attack is answered before it lands."}, {"doc_id": "title_iv_d_deconstruction", "layer": "L1_demand", "target": ["regulator", "judge", "self"], "venue": ["FOIA", "filing", "federal"], "input": ["evidence", "silence"], "output": ["informational", "lock-in", "deadline"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "high", "leverage": 3, "jurisdiction": ["universal", "IL", "federal"], "abstraction": "algorithm", "precondition": "Every enforcement action must have signed judicial predicate; ledger must balance; fitness hearing required for parenting; ability finding required for incarceration", "anti_pattern": "Accepting unsigned orders; not auditing ledger gaps; mixing parenting with debt collection", "vocabulary": ["signed_instrument", "ledger_audit", "parenting_debt_separation", "fitness_hearing", "ability_finding", "section_1983_path"], "explanation": "A records-driven audit of the state child-support enforcement apparatus that pulls, via public-records request, the case status, full payment ledger, federal reimbursement totals, withholding orders, cooperative agreement, license-suspension referrals, and bonding records. The point is to expose the structural financial incentive that funds enforcement over resolution and to surface ledger gaps that contradict the underlying contempt narrative.", "inverse_strategy": "Pre-emptively maintain a clean enforcement file: matched ledger, current cooperative agreement on record, bonding compliant, every referral documented with its predicate order. If targeted, respond to the records request fully and on the statutory clock — partial or late responses are themselves evidence of the dysfunction being alleged."}, {"doc_id": "selective_recall_credibility_trap", "layer": "L3_expose", "target": ["counterparty", "opposing_counsel", "settlement_negotiator"], "venue": ["deposition", "settlement", "filing"], "input": ["claim", "pattern", "evidence"], "output": ["informational", "lock-in"], "reversibility": "medium", "tempo": "parallel", "deploy_cost": "medium", "leverage": 3, "jurisdiction": ["universal", "IL"], "abstraction": "pattern", "precondition": "Counterparty's verified filings mix dollar-precision recall (when convenient) with formulaic 'lacks requisite knowledge' responses (when inconvenient), in the same filing; ideally in the same paragraph", "anti_pattern": "Citing as standalone basis for allocation/fitness motion (judges treat axes as orthogonal); listing all contradictions found (volume dilutes impact); leaking the list to opposing counsel before deposition", "vocabulary": ["lacks_requisite_knowledge", "dollar_precision_recall", "selective_verification", "intra_paragraph_self_cancel", "verified_pleading", "credibility_asymmetry", "deposition_outline", "pretrial_memorandum"], "explanation": "A pattern-spotting algorithm: when a verified pleading from the other side mixes dollar-precise recall for facts that help them with formulaic 'lacks knowledge' boilerplate for facts that hurt them — sometimes in the same paragraph that authenticates an exhibit — that contrast becomes a credibility weapon. It is reserved for deposition, settlement memos, and the credibility section of a pretrial brief, never as a standalone motion.", "inverse_strategy": "Audit your own verified filings before signing: never plead ignorance in a paragraph that also quotes specifics; use uniform hedge language; have one drafter so the recall posture is consistent across the document. In deposition, prepare a clean answer for every disclaimer paragraph by re-reading the filing aloud with adverse intent."}, {"doc_id": "twelve_laws_legal_framework", "layer": "phil", "target": ["self", "judge", "system"], "venue": ["all"], "input": ["all"], "output": ["informational"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "low", "leverage": 2, "jurisdiction": ["universal"], "abstraction": "concept", "precondition": "Universal laws apply to litigation; Nash equilibrium is the true goal; court system by design prevents it", "anti_pattern": "Treating law as purely procedural; missing philosophical alignment; pursuing punishment instead of resolution", "vocabulary": ["law_of_oneness", "law_of_vibration", "law_of_correspondence", "law_of_attraction", "law_of_inspired_action", "nash_equilibrium"], "explanation": "A philosophical overlay that maps twelve universal principles (oneness, vibration, correspondence, attraction, inspired action, transmutation, cause-and-effect, compensation, relativity, polarity, rhythm, gender) onto litigation strategy to identify the negotiated-settlement equilibrium that serves the whole family system. It treats the courtroom as the obstacle to that equilibrium, not the path.", "inverse_strategy": "When the other side pitches a 'whole-system win-win' framing, anchor on the discrete legal issue actually before the court and the specific statutory standard that governs it. Do not let philosophical scope-expansion convert a narrow ruling into an open-ended negotiation."}, {"doc_id": "motivational_levers_rice", "layer": "phil", "target": ["counterparty", "opposing_counsel", "judge", "regulator", "self"], "venue": ["interpersonal", "settlement", "deposition", "meeting", "filing"], "tempo": "preemptive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "A diagnostic that decomposes any actor in a case (judge, opposing counsel, opposing party, regulator, witness) into four motivational channels — Reward, Ideology, Coercion, Ego — scores each on a 1-to-5 scale, and selects the dominant accessible lever to drive your approach to that actor. It prevents the common failure of pushing the lever you respond to rather than the one they respond to.", "inverse_strategy": "Run R-I-C-E on yourself first and notice which lever the other side is pushing on you (usually Coercion via threats or Ego via shame). Disclose your own dominant lever to a trusted advisor so you can be flagged when an offer is exploiting it, and respond on the lever the other actor cares about, not the one you find satisfying."}, {"doc_id": "authority_monopoly_prevention", "layer": "vocab", "target": ["opposing_counsel", "judge", "witness", "self"], "venue": ["settlement", "hearing", "deposition"], "tempo": "preemptive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "When any actor positions themselves as the sole interpreter of a domain — the only person who knows what the kids need, what the finances really say, or what the judge wants — that gatekeeper framing is the trap. The countermove is to independently pull the raw records, do your own statutory research, and refuse the translator role.", "inverse_strategy": "When this is used against you, do not argue with the gatekeeper; bypass them. Subpoena the underlying records directly from custodians, cite the statute yourself, retain a separate expert, and put your independent verification on the record so the monopoly claim is mooted by the parallel source."}, {"doc_id": "coherence_consistency_test", "layer": "L1_demand", "target": ["opposing_counsel", "judge", "advisor_subprocess"], "venue": ["interpersonal", "deposition", "settlement"], "tempo": "parallel", "leverage": 4, "jurisdiction": ["universal"], "explanation": "An ongoing scoring of how much an actor's stated values match their observed actions across at least three independent domains (treatment of subordinates, behavior under criticism, conduct toward people who can do nothing for them, consistency over weeks not minutes). The signal is the trend in the coherence delta over time, not any single instance.", "inverse_strategy": "Assume you are being scored. Keep your own actions consistent with your stated values across every domain and time window, including informal interactions, so the coherence delta on you stays small. If accused of incoherence, produce the durable-over-time record (calendar, communications log) that shows the alleged delta is cherry-picked."}, {"doc_id": "micropattern_extraction_early_detection", "layer": "L1_demand", "target": ["opposing_counsel", "witness", "judge"], "venue": ["deposition", "interpersonal", "hearing"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "In a deposition or interview, seed early questions where ground truth is known so you can baseline the witness's normal linguistic and physical tells (gaze, hand movement, gratuitous adjectives, reflexive smiles), then ask the contested question and watch for the delta from baseline. The micropatterns are not courtroom evidence — they are internal signal telling you which threads to pull harder.", "inverse_strategy": "Before any sworn examination, do a mock with adverse questioning so your baseline and stress responses are similar. Slow your cadence uniformly across all answers, avoid filler adjectives, keep hands and gaze neutral throughout. Treat every question as the contested one."}, {"doc_id": "emotional_dysregulation_leverage", "layer": "L2_refuse", "target": ["opposing_counsel", "counterparty"], "venue": ["settlement", "interpersonal", "hearing"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Stress narrows cognition in predictable ways. The algorithm tracks signs that the other side is in a degraded-judgment window (escalating message cadence, unforced procedural errors, repeated demands, after-hours sends) and times consequential offers or filings to land while that window is open, so they evaluate the move under poor judgment. The rule is to spot windows, not manufacture them.", "inverse_strategy": "Install a cooling-off rule on yourself: no signed agreement, no filing, no consequential email sent within a defined window after a triggering event (bad ruling, late-night provocation, surprise filing). Route all consequential decisions through a second reviewer who is not currently in the fight."}, {"doc_id": "momentum_cascade_filing", "layer": "L3_expose", "target": ["opposing_counsel", "judge", "counterparty"], "venue": ["filing", "hearing"], "tempo": "parallel", "leverage": 4, "jurisdiction": ["universal"], "explanation": "A coordinated wave of multiple substantively meritorious motions across distinct domains, all filed within a narrow window, that exceeds the other side's ability to respond adequately on any one. The judge reads volume as productivity, opposing counsel reads it as a billing crisis, and the counterparty reads it as falling behind — and all three readings work in the filer's favor.", "inverse_strategy": "Triage immediately: rank the incoming filings by stakes and statutory deadlines, request brief continuances on the lower-stakes ones to consolidate response time on the high-stakes ones, and move to consolidate or strike duplicative filings. Flag any unsupported filing for Rule 137 / bad-faith sanctions to convert the cascade itself into your exhibit."}, {"doc_id": "negative_sum_frame_shift", "layer": "vocab", "target": ["opposing_counsel", "judge", "counterparty", "advisor_subprocess"], "venue": ["settlement", "interpersonal"], "tempo": "preemptive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Reframes a fight from 'your gain is my loss' to 'we both lose value the longer this drags on,' making compromise feel rational instead of weak. Works by making the shared cost (fees, time, depletion of a fixed pool) visible to the decision-maker.", "inverse_strategy": "Refuse the framing by demonstrating asymmetric cost tolerance — show you can outlast and that delay actually grows your position (e.g., interest accrual, statutory clock running against them). Anchor the dispute back to concrete entitlements on the record rather than abstract pool math."}, {"doc_id": "leverage_choice_framing", "layer": "vocab", "target": ["opposing_counsel"], "venue": ["settlement", "interpersonal"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Presents the other side's attorney with a clean either/or memo — settle on these terms by date X, or face these pre-built filings on date X+1. Designed to flip opposing counsel from billing the dispute to advising their client to take the exit.", "inverse_strategy": "Treat the 'memo with deadline' as a litigation threat for the record, not a settlement overture. Reply in writing demanding any leverage be filed formally so it enters evidence, refuse to negotiate under an artificial deadline, and document the coercive framing for a future fees motion."}, {"doc_id": "credential_collapse_documentary", "layer": "L3_expose", "target": ["judge", "opposing_counsel", "counterparty"], "venue": ["filing", "hearing"], "tempo": "reactive", "leverage": 5, "jurisdiction": ["universal"], "explanation": "Builds a single annotated table of every numeric, date, and identity contradiction across the opponent's own filings until the pattern itself proves dishonesty. One inconsistency is a typo; thirty side-by-side is fraud.", "inverse_strategy": "Audit your own prior filings for internal consistency before any new submission, file errata correcting innocent discrepancies on your own initiative, and prepare a witness or affidavit that explains category differences (gross vs net, snapshot vs averaged) before they get stacked against you."}, {"doc_id": "trigger_point_mapping", "layer": "L2_refuse", "target": ["counterparty", "opposing_counsel"], "venue": ["settlement", "interpersonal", "deposition"], "tempo": "reactive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Catalogs specific topics, names, or phrasings that reliably knock the opposing party off-script, mostly to recognize them when used as bait. Primary use is defensive — spotting when the other side tries to derail you with emotional landmines.", "inverse_strategy": "Pre-rehearse flat, neutral responses to your known sensitivity topics and practice returning to the legal question within one sentence. Bring a written outline to depositions and hearings so you anchor to the document instead of reacting to provocation."}, {"doc_id": "settlement_rejection_narrative", "layer": "vocab", "target": ["judge", "advisor_subprocess", "counterparty_counsel"], "venue": ["hearing", "filing"], "tempo": "reactive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Frames the other side's rejection of a generous offer as proof they want control rather than money, shifting the judge's read of their motives. Works only when the offer genuinely exceeds what a court would order under standard formulas.", "inverse_strategy": "Reject in writing with a specific, math-backed counter that identifies missing categories (omitted assets, undisclosed income, valuation disputes), so the rejection reads as principled rather than irrational. Never let a rejection stand without an articulated number."}, {"doc_id": "procedure_compliance_signal", "layer": "L1_demand", "target": ["judge"], "venue": ["filing", "hearing"], "tempo": "parallel", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Treats every caption, deadline, certificate of service, and exhibit number as a small credibility deposit with the judge, accumulating into a substantive advantage. Opposing sloppiness then reads as substantive weakness by mirror.", "inverse_strategy": "Run a pre-filing checklist on every submission — captions, page numbers, certificate of service, exhibit indexing — and cure any past procedural defects with a clean amended filing. Do not point fingers at minor opposing defects; that draws scrutiny back to your own record."}, {"doc_id": "behavioral_coordinate_mapping", "layer": "meta", "target": ["opposing_counsel", "counterparty", "judge"], "venue": ["interpersonal"], "tempo": "parallel", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Scores each actor on three independent axes — autonomy versus control, coherence versus fragmentation, other-focus versus self-focus — to predict their responses in novel situations. Used internally to choose which lever to pull on whom.", "inverse_strategy": "Vary your own behavior deliberately across contexts so observers cannot fit you to a fixed coordinate, and keep written communications boring, factual, and identical in tone across recipients. Remove the data signal they need to model you."}, {"doc_id": "extractive_mask_vulnerability", "layer": "L1_demand", "target": ["opposing_counsel", "witness", "advisor_subprocess"], "venue": ["interpersonal", "deposition"], "tempo": "preemptive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Identifies people running a covert extraction script by their early linguistic tells — rushed intimacy, unilateral credibility claims, dense future-promises — so distance can be created before the extraction lands. Bias is toward early withdrawal.", "inverse_strategy": "Keep all interactions slow, written, and transactional; refuse rapport acceleration and verify every credential claim independently. If someone presses for fast trust, slow the cadence deliberately and route through a third party."}, {"doc_id": "mutual_destruction_parity", "layer": "L3_expose", "target": ["opposing_counsel", "counterparty"], "venue": ["filing"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Constructs symmetric exposure so the other side faces the same financial, reputational, or regulatory risk you do, removing their incentive to drag the fight out for free. Once both sides bleed equally, settlement becomes the rational move.", "inverse_strategy": "Minimize your own exposure surface by cleaning up regulatory filings, tax positions, and licensing before they can be weaponized, and segregate assets so any one threat does not cascade. Refuse to engage in symmetric-disclosure offers — demand the other side go first on the record."}, {"doc_id": "finite_pool_negative_sum_reframing", "layer": "phil", "target": ["counterparty", "judge"], "venue": ["settlement", "mediation"], "tempo": "preemptive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Shows the mediator a calendar-math chart of monthly burn rate times months remaining, converting the dispute from an outcome contest into a time contest. The party with less appetite for time loss tends to move first.", "inverse_strategy": "Reframe the time axis as working for you (statutory interest, accruing arrears, a deadline running against the opponent) and present your own chart showing their burn exceeds yours. Decline mediation framings that assume a closed pool when income or contributions are still flowing."}, {"doc_id": "information_leverage_settlement_forcing", "layer": "L2_refuse", "target": ["opposing_counsel", "counterparty"], "venue": ["settlement"], "tempo": "preemptive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Holds undisclosed damaging information in reserve and offers a binary choice in a settlement memo — agree by date X or it becomes part of the public record. The information is more valuable unfiled than filed.", "inverse_strategy": "Demand any allegation be put in a formal filing under oath rather than negotiated in private, preserving the choice memo as evidence of extortion-like leverage for a sanctions or fees motion. Get ahead of damaging facts by self-disclosing them with context first."}, {"doc_id": "documented_defection_pattern_recognition", "layer": "L1_demand", "target": ["judge", "opposing_counsel"], "venue": ["filing", "hearing"], "tempo": "parallel", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Maintains an indexed log of every missed deadline, withheld disclosure, and ignored communication by the other side, so a pattern is visible to the judge. Each entry is trivial alone; the index is the weapon.", "inverse_strategy": "Respond to every communication in writing within a stated window even if the answer is 'will respond by date,' meet every deadline or file a contemporaneous explained extension request, and keep your own dated log so any pattern claim against you can be rebutted line by line."}, {"doc_id": "cooperative_signal_through_procedural_restraint", "layer": "L1_demand", "target": ["judge"], "venue": ["filing", "hearing"], "tempo": "preemptive", "leverage": 2, "jurisdiction": ["universal"], "explanation": "Uses measured, courteous language ('respectfully requests,' 'in the interest of resolution') over aggressive substantive filings, so the judge reads you as the non-escalator while you still hit hard. The asymmetry between tone and content is the point.", "inverse_strategy": "Match the restrained tone in your own filings so no contrast benefits them, and quote their substantive content (not their polite wrapper) directly back at the court to expose the gap between tone and ask. Do not respond to courteous language with hostile language."}, {"doc_id": "motion_sequencing_ambush", "layer": "L2_refuse", "target": ["counterparty", "opposing_counsel", "judge"], "venue": ["filing"], "tempo": "reactive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Files a small number of heavy, fully-documented motions in a planned sequence so the second lands before the first is answered, compounding response burden. Each filing creates exposure the next one exploits.", "inverse_strategy": "Move immediately for consolidated briefing or a scheduling conference so all motions are heard together on a single set track, and request extensions tied to the cumulative page count. Triage your responses to the strongest motion first and answer the weaker ones with short procedural objections preserving rights."}, {"doc_id": "financial_affidavit_as_leverage_weapon", "layer": "L1_demand", "target": ["counterparty", "judge"], "venue": ["filing", "hearing"], "tempo": "preemptive", "leverage": 5, "jurisdiction": ["universal"], "explanation": "Attacks the sworn financial disclosure directly with bank records, tax returns, and third-party documents, because every downstream support and asset order rests on that one document. Collapse the affidavit and you collapse the foundation.", "inverse_strategy": "Treat your own financial disclosure as a litigation document — reconcile every line to source records before signing, file timely amendments the moment any error is found, and keep a working file of the source documents indexed to each line so any challenge can be answered the same day."}, {"doc_id": "threshold_triggered_disclosure_sequencing", "layer": "L2_refuse", "target": ["counterparty", "judge"], "venue": ["filing"], "tempo": "reactive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Pre-drafts a cascade of motions and holds them until the other side files something that can serve as the trigger, then releases the cascade as a 'response.' The reactive framing reads as more legitimate than an unprompted strike.", "inverse_strategy": "Avoid filing anything that hands them a clean trigger — keep your own filings narrow, factual, and free of provocative claims. When a 'response' arrives that obviously exceeds the scope of what you filed, move to strike the excess portions as non-responsive and request leave-of-court requirements for any new affirmative relief."}, {"doc_id": "sworn_statement_burden_shift", "layer": "L1_demand", "target": ["counterparty", "judge"], "venue": ["filing", "hearing"], "tempo": "preemptive", "leverage": 2, "jurisdiction": ["universal"], "explanation": "Convert your argumentative claims into numbered factual assertions signed under oath with supporting documents attached, so the other side must either file their own sworn counter-affidavit (with their own documents) or be treated as conceding the point. It mechanically shifts the work of disproving facts onto the opponent.", "inverse_strategy": "Reply with a point-by-point sworn counter-affidavit on the same numbered structure, attaching primary documents for every disputed item; never let a numbered sworn assertion sit unanswered, because silence is treated as admission."}, {"doc_id": "procedural_exhaustion_attrition", "layer": "L3_expose", "target": ["counterparty", "opposing_counsel"], "venue": ["filing"], "tempo": "parallel", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Use legitimate procedural friction (continuances, discovery disputes, scheduling motions) to bleed the better-resourced or more-urgent opponent dry over months, while always framing each individual delay as a good-faith procedural request rather than stalling. Time is the actual weapon.", "inverse_strategy": "Maintain a public timeline exhibit logging every continuance, extension, and scheduling motion with cumulative day counts, then file a single motion to set firm deadlines or for fee-shifting based on that pattern, converting drip-delay into one sanctionable record."}, {"doc_id": "system_extraction_loop_exit", "layer": "phil", "target": ["counterparty", "mediator"], "venue": ["settlement", "mediation"], "tempo": "preemptive", "leverage": 2, "jurisdiction": ["universal"], "explanation": "Name out loud that the litigation system itself profits from prolonged conflict (lawyers bill, experts engage, courts clear dockets via settlement) and present a negotiated exit as the only escape from a shared extractive trap rather than as a concession. Reframes the fight as both parties versus the meter.", "inverse_strategy": "Refuse the meta-frame; insist on adjudicating the specific issues on the merits and require any settlement proposal to be made as a concrete numbered offer with deadline, so abstract appeals to fatigue cannot substitute for actual terms."}, {"doc_id": "discovery_gap_foundational_challenge", "layer": "L1_demand", "target": ["judge"], "venue": ["filing", "hearing"], "tempo": "preemptive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Attack the opponent's incomplete financial or factual disclosure as a foundational defect, then argue that any prior orders entered while disclosure was incomplete should be revisited because the court was missing the information it needed. Two sequential motions force the court into a corner where granting one logically requires granting the other.", "inverse_strategy": "Produce a complete, time-stamped disclosure package proactively and certify it on the record before any contested ruling; if accused of gaps, file a sworn statement enumerating what was produced when, plus an offer to supplement on any specific category they identify within a short deadline."}, {"doc_id": "forcing_function_procedural", "layer": "L2_refuse", "target": ["opposing_counsel", "judge"], "venue": ["filing"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Number every factual assertion in your filing and label each as deemed-admitted unless the other side specifically denies it within a stated window, so the opponent's only choices are to engage on your structure or build a record of non-engagement. Either path produces a usable result.", "inverse_strategy": "File a timely, item-by-item specific denial on every numbered assertion (even weak ones), citing the rule that requires only a general traverse, and refuse to adopt the opponent's numbering as binding by reorganizing the response under your own framework."}, {"doc_id": "record_checkpoint_saturation", "layer": "L2_refuse", "target": ["judge"], "venue": ["filing"], "tempo": "parallel", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Every two or three months, file a status table listing every numbered factual assertion you've made, the date served, the opponent's response or silence, and the current status. The running scoreboard hardens uncontested items into accepted record over time.", "inverse_strategy": "On receipt of any status table, file a one-page response that converts every UNDISPUTED entry to DENIED with a short basis, before the next checkpoint, so that the scoreboard never compounds in their favor; treat the table as the filing it actually is."}, {"doc_id": "escalation_ladder_saturation", "layer": "L1_demand", "target": ["judge"], "venue": ["filing"], "tempo": "preemptive", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Match the intensity of your filings to the maturity of the case, spending early months establishing simple facts, middle months establishing patterns across facts, and later months introducing formal structure and damage quantification. Skipping rungs reads as crank energy and burns credibility.", "inverse_strategy": "Force premature escalation by demanding the opponent commit early to their full theory, damage figures, and quantitative framework via interrogatories or a case management order, so they either show their hand prematurely or look unprepared later when they try to introduce structure."}, {"doc_id": "appellate_leverage_record_auditability", "layer": "L3_expose", "target": ["judge"], "venue": ["appeal", "filing"], "tempo": "endgame", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Build a trial record where your filings are numbered, citation-anchored, and cross-referenced while the opponent's are narrative, so that any reviewing court reconstructs the case from your version because yours is the only auditable one. The leverage is not the threat of appeal but the structural reliability of your paper trail.", "inverse_strategy": "Match the structural discipline filing-for-filing: number your own assertions, cite to specific docket entries and page-line references, and on appeal include a record-supplement exhibit showing your evidence was just as traceable; never let the contrast in formatting do the opponent's work."}, {"doc_id": "burden_shift_prima_facie_collapse", "layer": "L2_refuse", "target": ["judge"], "venue": ["filing", "hearing"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "When the other side's threshold showing varies materially across their own filings (different totals, different account identifiers, different dates for the same alleged fact), move the court to find that no prima facie case was made at all, which prevents any burden-shift onto you. It's a clean legal-threshold attack, not a fact contest.", "inverse_strategy": "Before any contested hearing, file a consolidated 'corrected statement of position' that picks one set of numbers and explicitly supersedes prior inconsistent versions with a stated reason for the change; lock the prima facie case to one version so variance attacks have nothing to bite on."}, {"doc_id": "admission_netting_offset_defense", "layer": "L2_refuse", "target": ["judge"], "venue": ["filing", "hearing"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "Take the opponent's own sworn admissions and re-characterize them so they simultaneously support your offset or counter-claim, forcing a binary: either the admitted facts mean what they claimed (and credit you) or they mean what you claim (and damage their credibility). They cannot have it both ways without contradiction.", "inverse_strategy": "Before making any sworn admission, draft the exact characterization you want bound to that admission and include it in the same paragraph (purpose, limitation, category); never admit a raw fact without simultaneously fixing its legal label so it cannot be repurposed against you."}, {"doc_id": "triple_axis_pressure_independence", "layer": "L1_demand", "target": ["judge", "opposing_counsel", "regulator"], "venue": ["filing", "regulatory"], "tempo": "parallel", "leverage": 3, "jurisdiction": ["universal"], "explanation": "Deploy three independent procedural pressures in parallel on different targets at once (constitutional defenses aimed at judicial authority, statutory claims aimed at the underlying issue, ethical complaints aimed at opposing counsel), so the other side cannot defend on a single front. Each axis is independently survivable for them, but together they overwhelm.", "inverse_strategy": "Sequence and consolidate: move to stay or sever the ethical and regulatory tracks pending resolution of the merits, argue the parallel filings are improper claim-splitting or harassment, and demand a single case-management order forcing all pressures onto one calendar."}, {"doc_id": "documented_contradiction_impeachment", "layer": "L2_refuse", "target": ["counterparty", "judge"], "venue": ["filing", "discovery"], "tempo": "reactive", "leverage": 4, "jurisdiction": ["universal"], "explanation": "When the opponent's earlier sworn filing omits or denies an account, asset, or fact that a later sworn filing references, place both documents side by side and let the contradiction speak for itself. No inference is required; one of the two signed statements must be false on its face.", "inverse_strategy": "Pre-empt by filing a corrective supplemental affidavit explaining the omission as scrivener's error, late discovery, or scope limitation in the prior filing, before the opponent surfaces the contradiction; controlled disclosure of your own inconsistency beats being impeached with it."}, {"doc_id": "QWPARSE_SYSTEM", "layer": "meta", "target": ["self", "judge"], "venue": ["filing"], "input": ["evidence", "silence"], "output": ["informational", "deadline"], "reversibility": "high", "tempo": "preemptive", "deploy_cost": "medium", "leverage": 2, "jurisdiction": ["universal"], "abstraction": "concept", "precondition": "Document draft exists; vector DB populated; structural pre-defects measurable", "anti_pattern": "Treating parse-syntax score as quality metric; skipping second-pass iteration", "vocabulary": ["dog_latin_detection", "null_chain", "csscpsgp_grading", "effectiveness_score", "context_free_judge"], "explanation": "An automated drafting pipeline that scans a filing for structural and rhetorical weaknesses, then iterates it through a context-free reviewer that has zero case knowledge (mimicking a cold judge) and a vector database that fills in real citations, producing a document that stands alone to a stranger. The dual score separates fraud-detection grammar from practical effectiveness.", "inverse_strategy": "Run your own filings through a cold-reader review (any literate person who hasn't lived the case) and require every factual claim to carry a specific exhibit or docket citation before service; force the opponent's filings into the same test by objecting to any assertion that lacks a record cite."}, {"doc_id": "legal_math", "layer": "L3_expose", "target": ["judge", "opposing_counsel", "self"], "venue": ["filing", "discovery", "deposition", "appeal"], "input": ["filing", "deadline", "evidence"], "output": ["appellate", "asymmetric_cost", "informational", "lock-in"], "reversibility": "high", "tempo": "parallel", "deploy_cost": "high", "leverage": 5, "jurisdiction": ["universal", "IL"], "abstraction": "concept", "precondition": "Case has 10+ filings; structured evidence available; counsel/judge can absorb mathematical framing", "anti_pattern": "Under-saturation leaves the math invisible; over-saturation makes the judge skip it", "vocabulary": ["chain_confidence", "cycle_basis", "sheaf_cohomology", "kl_divergence", "nash_equilibrium", "discount_factor"], "explanation": "Embed formal mathematical structure (numbered logical chains, cycle detection, consistency metrics, decision-theoretic ranking) inside legal filings so that the surface reads as a normal brief but the underlying argument is an auditable proof. The judge cannot dismiss a structured proof without producing a counter-proof or explicitly ruling that logic does not apply, which itself becomes appellate leverage.", "inverse_strategy": "Attack at the model layer rather than the math: challenge the chosen variables, weights, and assumptions as arbitrary or unsupported by the record, and force the structured filer to defend each parameter individually; an unjustified parameter collapses the whole derivation without engaging the formalism."}, {"doc_id": "narrative_protocol", "layer": "L2_refuse", "target": ["judge", "opposing_counsel", "system"], "venue": ["filing", "hearing", "discovery", "appeal"], "input": ["claim", "pattern", "evidence"], "output": ["deadline", "lock-in", "sanction", "appellate", "informational"], "reversibility": "medium", "tempo": "parallel", "deploy_cost": "low", "leverage": 4, "jurisdiction": ["IL", "federal", "universal"], "abstraction": "pattern", "precondition": "Case has 3+ filings establishing factual foundation", "anti_pattern": "Over-explanation of math in filing body; jargon-heavy oral argument", "vocabulary": ["forcing_function", "assertion_checkpoint", "communication_log", "escalation_rung", "saturation_gradient", "pre_mortem"], "explanation": "A staged interaction pattern for delivering formal structure into a real courtroom: enumerated demands that require itemized response, periodic record checkpoints, structured settlement offers with deadlines, and an escalation ladder that introduces complexity only after credibility is established. The narrative arc compresses to a single 25-word sentence the judge can carry into chambers.", "inverse_strategy": "Refuse to adopt the opponent's numbering or status-table format in your responses, file shorter and cleaner narrative briefs that the court can absorb in one read, and consistently address the body of their filings on the merits while declining to engage the meta-scoreboard, which strips the structural overlay of its compounding effect."}, {"doc_id": "demand_escalation_engine", "layer": "L1_demand", "target": ["opposing_counsel", "judge"], "venue": ["email", "filing", "discovery", "hearing"], "input": ["silence"], "output": ["deadline", "lock-in", "sanction", "informational"], "reversibility": "medium", "tempo": "reactive", "deploy_cost": "low", "leverage": 3, "jurisdiction": ["IL", "universal"], "abstraction": "pattern", "precondition": "Initial demand issued; response deadline passed or deflected without resolution", "anti_pattern": "Accepting non-response as final; failing to auto-escalate; mixing levels in single message", "vocabulary": ["level_1_statement", "level_3_demand", "level_5_discovery", "level_6_motion", "level_7_contempt"], "explanation": "Every communication sits on a seven-rung ladder running from informal request to formal court order, and any deflection or non-response from the other side automatically triggers the next rung with a pre-drafted document. No demand is ever allowed to die at the polite-question stage.", "inverse_strategy": "Respond substantively (even briefly) within deadline to every itemized demand, refusing to use deflection language like 'no response required,' so the ladder cannot click forward; preserve objections on privilege or scope while still placing some answer in the record for each item."}, {"doc_id": "sardines_influence_framework", "layer": "phil", "target": ["counterparty", "opposing_counsel", "judge", "regulator", "witness", "advisor_subprocess", "self"], "venue": ["interpersonal", "settlement", "deposition", "hearing", "meeting", "filing"], "tempo": "preemptive", "leverage": 5, "jurisdiction": ["universal"]}];

const ALGOS = CATALOG.map(a => {
  const j = DATA.join[a.doc_id] || {tokens:[], matched_count:0, total_count:0, avg_leverage:0};
  return Object.assign({}, a, {
    tokens: j.tokens || [],
    matched_count: j.matched_count || 0,
    total_count: j.total_count || 0,
    avg_leverage: j.avg_leverage || 0,
  });
}).sort((a,b) => (b.avg_leverage - a.avg_leverage));

const CO = DATA.co_occurrence || {};

let state = { activeId: null, search: "" };

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c]);
}

function bar(v) {
  const pct = Math.round(Math.max(0, Math.min(1, v)) * 100);
  return `<div class="bar"><span style="width:${pct}%"></span></div>`;
}

function renderList() {
  const q = state.search.toLowerCase();
  const filtered = ALGOS.filter(a => {
    if (!q) return true;
    if (a.doc_id.toLowerCase().includes(q)) return true;
    return (a.tokens || []).some(t => t.token.toLowerCase().includes(q));
  });
  let html = "";
  for (const a of filtered) {
    const pct = a.total_count > 0 ? Math.round(a.matched_count / a.total_count * 100) : 0;
    const layer = a.layer || "unscored";
    html += `<div class="item${state.activeId === a.doc_id ? ' active' : ''}" data-id="${a.doc_id}">
      <div class="doc-id">${escapeHtml(a.doc_id)}</div>
      <div class="row">
        <span style="min-width:30px">${a.avg_leverage.toFixed(2)}</span>
        ${bar(a.avg_leverage)}
        <span style="min-width:50px;text-align:right">${a.matched_count}/${a.total_count} · ${pct}%</span>
      </div>
      <div class="row">
        <span style="color:var(--ink-faint)">layer:</span> ${escapeHtml(layer)} · <span style="color:var(--ink-faint)">lev:</span> ${a.leverage || 0}/5
      </div>
    </div>`;
  }
  document.getElementById("algo-list").innerHTML = html;
  document.querySelectorAll(".item").forEach(el => {
    el.addEventListener("click", () => {
      state.activeId = el.dataset.id;
      renderList();
      renderDetail();
    });
  });
}

function renderDetail() {
  const main = document.getElementById("detail");
  if (!state.activeId) return;
  const a = ALGOS.find(x => x.doc_id === state.activeId);
  if (!a) return;
  const tokens = a.tokens || [];
  const matched = tokens.filter(t => t.match);
  const missed = tokens.filter(t => !t.match);

  let vocabRows = "";
  for (const t of tokens) {
    const m = t.match;
    if (!m) {
      vocabRows += `<tr>
        <td class="tok miss">${escapeHtml(t.token)} <span class="tag miss">no match</span></td>
        <td colspan="3" style="color:var(--ink-faint);font-size:10px">(token not in word_leverage; candidate for vocabulary ingest)</td>
      </tr>`;
      continue;
    }
    vocabRows += `<tr>
      <td class="tok">${escapeHtml(t.token)} <span class="tag hit">→ "${escapeHtml(m.matched_word)}"</span></td>
      <td><div class="leverage-cell"><span class="v">${m.leverage_score.toFixed(2)}</span>${bar(m.leverage_score)}</div></td>
      <td class="juris">${escapeHtml(m.jurisdiction || "—")}</td>
      <td class="statute">${escapeHtml(m.statutes || "—")}</td>
    </tr>`;
  }

  const factors = [
    ["target", a.target], ["venue", a.venue], ["tempo", a.tempo],
    ["leverage", a.leverage], ["reversibility", a.reversibility],
    ["jurisdiction", a.jurisdiction], ["abstraction", a.abstraction],
    ["deploy_cost", a.deploy_cost],
  ];
  const factorLines = factors.map(([k,v]) => {
    if (v == null) return "";
    const display = Array.isArray(v) ? v.join(", ") : v;
    return `<div class="factor-line"><span class="k">${k}:</span> ${escapeHtml(String(display))}</div>`;
  }).join("");

  const co = CO[a.doc_id] || [];
  const coHtml = co.length === 0
    ? `<div style="color:var(--ink-faint); font-size:11px">(no shared vocabulary with other algos)</div>`
    : `<div class="co-list">${co.map(([name, n]) => `<div class="row"><span class="name" data-jump="${name}">${escapeHtml(name)}</span><span class="shared">${n} shared tokens</span></div>`).join("")}</div>`;

  const pctMatched = a.total_count > 0 ? Math.round(a.matched_count / a.total_count * 100) : 0;

  main.innerHTML = `
    <div class="detail-head">
      <h2>${escapeHtml(a.doc_id)}</h2>
      <div style="color:var(--ink-dim); font-size:11px;font-family:monospace">layer: ${escapeHtml(a.layer || "")}</div>
    </div>

    <div class="summary-grid">
      <div class="summary-cell"><div class="lbl">vocab tokens</div><div class="val">${tokens.length}</div></div>
      <div class="summary-cell"><div class="lbl">matched in word_leverage</div><div class="val">${matched.length}</div><div class="sub">${pctMatched}% coverage</div></div>
      <div class="summary-cell"><div class="lbl">avg leverage</div><div class="val">${a.avg_leverage.toFixed(2)}</div></div>
      <div class="summary-cell"><div class="lbl">factor leverage</div><div class="val">${a.leverage || 0} / 5</div></div>
    </div>

    <section class="block">
      <h3>Factor map</h3>
      ${factorLines}
      <div class="factor-line" style="margin-top:6px"><span class="k">precondition:</span> ${escapeHtml(a.precondition || "—")}</div>
      <div class="factor-line"><span class="k">anti-pattern:</span> ${escapeHtml(a.anti_pattern || "—")}</div>
    </section>

    <section class="block">
      <h3>Vocabulary ↔ word_leverage</h3>
      <div class="legend">Each token in this algorithm joined against the 282K-row vocabulary DB. Misses are candidates for the next vocabulary ingest run.</div>
      <table class="vocab">
        <thead><tr><th>algo token</th><th>leverage</th><th>jurisdiction</th><th>statute</th></tr></thead>
        <tbody>${vocabRows}</tbody>
      </table>
    </section>

    <section class="block">
      <h3>Co-occurrence (algos sharing vocabulary)</h3>
      ${coHtml}
    </section>
  `;

  main.querySelectorAll("[data-jump]").forEach(el => {
    el.addEventListener("click", () => {
      state.activeId = el.dataset.jump;
      renderList();
      renderDetail();
      main.scrollTop = 0;
    });
  });
}

document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  renderList();
});
