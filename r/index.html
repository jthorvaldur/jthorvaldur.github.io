<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Document Portal</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --accent: #3b82f6; --border: #334155; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; }
  p { color: #94a3b8; margin-bottom: 1.5rem; font-size: 0.9rem; }
  input {
    padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); font-size: 1rem; width: 300px;
    margin-bottom: 0.75rem;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    padding: 0.75rem 2rem; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-size: 1rem; cursor: pointer;
  }
  button:hover { background: #2563eb; }
  .error { color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
</style>
</head>
<body>
<h1>Document Portal</h1>
<p>Enter your access code.</p>
<form id="gate-form" onsubmit="event.preventDefault();go();" autocomplete="on">
  <input type="hidden" name="username" autocomplete="username" value="thorarinson-portal">
  <input type="password" id="pw" name="password" placeholder="Access code" autofocus
         autocomplete="current-password">
  <button type="submit">Enter</button>
</form>
<div class="error" id="err">Incorrect code. Try again.</div>
<script>
// No content on this page — password is the directory path
// Each code holder sees only their authorized content
async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}
const VALID = [
  '0672db75dd6bd1db52bd54baf50b5f2daa37f13145bc98efd2f2937eab3c5418',
  '0de9bc365a7225e1d89aa7c057805262fbe3870800b6d17fb9461067f12fdf78'
];
async function go() {
  const pw = document.getElementById('pw').value;
  const h = await sha256(pw);
  if (VALID.includes(h)) {
    // Trigger Chrome/1Password save prompt
    try {
      if (window.PasswordCredential) {
        const cred = new PasswordCredential({ id: 'thorarinson-portal', password: pw });
        navigator.credentials.store(cred);
      }
    } catch(x) {}
    // Password doubles as directory name — redirect there
    const suffix = h === VALID[1] ? '/filing/' : '/';
    window.location.href = pw + suffix;
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}
</script>
</body>
</html>
