function b(s){const b=atob(s);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
async function dk(p,s){const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:100000,hash:'SHA-256'},k,{name:'AES-GCM',length:256},false,['decrypt'])}
async function dc(p){const s=b(SALT),i=b(IV),d=b(CT);const k=await dk(p,s);return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:i},k,d))}
async function go(){const p=document.getElementById('pw').value;if(!p)return;try{const h=await dc(p);sessionStorage.setItem(SK,p);try{if(window.PasswordCredential)navigator.credentials.store(new PasswordCredential({id:'thorarinson-private',password:p}))}catch(x){}document.open();document.write(h);document.close()}catch(e){document.getElementById('e').style.display='block';document.getElementById('pw').value='';document.getElementById('pw').focus()}}
(async()=>{const s=sessionStorage.getItem(SK);if(!s)return;try{const h=await dc(s);document.open();document.write(h);document.close()}catch(e){sessionStorage.removeItem(SK)}})();
