<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Web</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #4ade80;
  --amber: #fbbf24;
  --rose: #f87171;
  --cyan: #22d3ee;
  --purple: #c084fc;
  --emerald: #34d399;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #1a1a2e;
    --text2: #6b7280;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

/* Header */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.header h1 span { color: var(--accent); }
.header .subtitle { font-size: 12px; color: var(--text2); }
.header .controls { display: flex; gap: 8px; }
.header button {
  padding: 6px 14px; font-size: 12px; font-weight: 600;
  background: var(--card); color: var(--text2);
  border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
  transition: all 0.2s;
}
.header button:hover { border-color: var(--accent); color: var(--text); }
.header button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Canvas */
#canvas { width: 100%; height: 100vh; display: block; }

/* Detail panel */
.panel {
  position: fixed; right: -420px; top: 48px; bottom: 0; width: 400px;
  background: var(--card); border-left: 1px solid var(--border);
  padding: 28px 24px; overflow-y: auto;
  transition: right 0.3s ease; z-index: 90;
}
.panel.open { right: 0; }
.panel .close {
  position: absolute; top: 12px; right: 16px;
  background: none; border: none; color: var(--text2);
  font-size: 20px; cursor: pointer; line-height: 1;
}
.panel .close:hover { color: var(--text); }
.panel h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.panel .domain { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 16px; }
.panel .desc { font-size: 14px; line-height: 1.7; color: var(--text2); margin-bottom: 20px; }
.panel .key-concepts { margin-bottom: 20px; }
.panel .key-concepts h3 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); margin-bottom: 8px; }
.panel .concept-tag {
  display: inline-block; padding: 4px 10px; margin: 3px;
  font-size: 12px; background: rgba(99,102,241,0.12);
  border: 1px solid rgba(99,102,241,0.2); border-radius: 6px; color: var(--accent2);
}
.panel .connections { margin-bottom: 20px; }
.panel .connections h3 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); margin-bottom: 8px; }
.panel .conn-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; margin-bottom: 4px;
  background: rgba(255,255,255,0.03); border-radius: 8px;
  font-size: 13px; cursor: pointer; transition: background 0.2s;
}
.panel .conn-item:hover { background: rgba(99,102,241,0.1); }
.panel .conn-item .arrow { color: var(--accent); font-size: 10px; }
.panel .conn-item .label { color: var(--text2); font-size: 11px; }
.panel .source-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; margin-top: 8px;
  font-size: 13px; font-weight: 600; color: var(--accent);
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.2); border-radius: 8px;
  text-decoration: none; transition: all 0.2s;
}
.panel .source-link:hover { background: rgba(99,102,241,0.15); }

/* Legend */
.legend {
  position: fixed; bottom: 16px; left: 16px; z-index: 90;
  display: flex; gap: 16px; padding: 10px 16px;
  background: rgba(15,23,42,0.85); backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: 10px;
  font-size: 11px; color: var(--text2);
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Layer indicator */
.layer-badge {
  position: fixed; bottom: 16px; right: 16px; z-index: 90;
  padding: 8px 14px;
  background: rgba(15,23,42,0.85); backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: 10px;
  font-size: 11px; color: var(--text2);
}
</style>
</head>

<div class="header">
  <div>

    <div class="subtitle">First principles &rarr; enforcement &rarr; knowledge architecture</div>

<script>
// ── Data Model ──

const NODES = [
  {

    links: [{ label: 'Federalist 46', url: 'https://avalon.law.yale.edu/18th_century/fed46.asp' }],

    color: '#6366f1',

    concepts: ['DNA as standing', 'Offspring vs children', 'Rights hierarchy', 'Pre-government rights', 'Troxel v. Granville', 'UN CRC Art. 7,8,9,18'],
    links: [{ label: 'Natural Rights Page', url: '/r/rights/natural.html#dna-claim' }],
  },

    domain: 'legal',
    color: '#6366f1',
    desc: '2026 foreclosure cases enforce: no proof, no foreclosure. Courts fatigued after 18 years of industry presumptions. Ryan v. HSBC: assignments of mortgage alone insufficient \u2014 must prove note enforcement chain. Vargas v. RRA: nonjudicial foreclosure requires the specific instrument the statute demands. The common thread: the mortgage industry cannot rely on presumptions when the law requires proof.',
    concepts: ['Lost note doctrine', 'Enforcement chain', 'Extraordinary remedy', 'Ryan v. HSBC', 'Vargas v. RRA', 'Nonjudicial foreclosure limits'],
    links: [{ label: 'LendingLies Analysis', url: 'https://x.com/LendingLiesX' }],
  },
  {
    id: 'game_theory',
    label: 'Game Theory\nof Enforcement',
    domain: 'legal',
    color: '#6366f1',
    desc: 'Nash equilibrium in rights enforcement: violation costs approach zero while compliance costs are substantial. Cost asymmetry ($500\u2013$100K+ for individuals vs ~$0 for systems) produces systematic under-enforcement. Four-tier leverage hierarchy: (1) jurisdiction/void judgments, (2) Monell + fee-shifting, (3) appeals/mandamus, (4) documentation enabling all higher tiers. Six integration principles: unimpeachable records, preserve for appeal, make non-compliance expensive, constitutional estoppel, identify incentives, find the federal hook.',
    concepts: ['Nash equilibrium', 'Cost asymmetry', 'Brady violations', 'Constitutional estoppel', 'Monell claims', 'Title IV-D conflict', 'Information asymmetry', 'Tier 1-4 leverage'],
    links: [{ label: 'Legal Bedrock & Game Theory', url: '/r/reports/legal-bedrock-gametheory.html' }],
  },

    id: 'commandments',
    label: 'Cross-Tradition\nMoral Architecture',
    domain: 'research',
    color: '#c084fc',
    desc: '9 world traditions spanning 4,000 years analyzed via factor analysis. 7 latent moral dimensions identified (85.2% variance): self-mastery (23.5%), purity (20.8%), embodied discipline (13.6%), fairness (9.4%), truth (7.9%), non-violence (5.9%), prohibition framing (4.0%). Universal convergence: all 9 independently mandate against unjust killing, for truthfulness, charity, and against theft. Sufi insight: "The Law without the Truth is ostentation; the Truth without the Law is hypocrisy."',
    concepts: ['Factor analysis', '7 moral dimensions', 'Universal convergence', 'Eastern vs Western framing', 'Linguistic shifts', 'ratsach vs kill', 'agape vs ahav'],

  {

    label: 'Eval \u2192 Regen\nLoop',
    domain: 'architecture',

    desc: 'Generate evidence chains \u2192 evaluate confidence gaps \u2192 search for missing evidence \u2192 regenerate with new context. Turns any analysis tool into an adversarial engine. Applies universally: fact extraction (legal), chain-of-evidence validation, trading signal confirmation, knowledge graph enrichment. Each cycle either confirms confidence or reveals what\u2019s missing \u2014 both outcomes are valuable.',
    concepts: ['Adversarial evaluation', 'Confidence gaps', 'Evidence search', 'Regeneration cycle', 'Universal applicability'],
    links: [],
  },
  {
    id: 'knowledge_graph',
    label: 'Knowledge Graph\n(Neo4j)',
    domain: 'architecture',
    color: '#22d3ee',
    desc: 'Volkmar\'s pattern from IBM: markdown facts \u2192 document DB \u2192 Neo4j graph \u2192 directed search. Result: 15 min brute-force queries \u2192 5 sec with graph-directed search. Summary layer reduces context window pollution \u2014 agent checks summary first, fetches original only if needed. Tiered query: summary \u2192 graph traversal \u2192 vector similarity \u2192 original document. Missing from current stack: recursive CTEs, centrality, PageRank, community detection, temporal path queries.',
    concepts: ['Tiered query', 'Graph-directed search', 'Summary layer', 'Context window optimization', 'PageRank', 'Community detection', 'Temporal paths'],
    links: [],
  },
  {
    id: 'microstructure',
    label: 'Cross-Exchange\nMicrostructure',
    domain: 'research',
    color: '#fbbf24',
    desc: 'Hyperliquid vs Binance analysis: 3.8 bps discount reflects structural basis components (funding, inventory, liquidation pressure). Adverse selection and maker economics via markout curves. HL shows independent price discovery (0.22 lead correlation). Trade count puzzle: 2\u20134x frequency despite smaller volume. Research priorities: Hasbrouck decomposition \u2192 markout segmentation \u2192 VPIN toxicity \u2192 basis regime modeling.',
    concepts: ['Basis decomposition', 'Adverse selection', 'Markout analysis', 'Information share', 'HyperBFT consensus', 'VPIN toxicity'],
    links: [{ label: 'Hyperliquid Research', url: '/hyperliquid/research.html' }],
  },
  {
    id: 'concept_layer',
    label: 'Concept\nExtraction Layer',
    domain: 'architecture',
    color: '#34d399',
    desc: '"Concepts are hidden in semantic, but those are the most powerful thing to share." The missing layer between raw embeddings and user-facing knowledge. Graph nodes should be concepts, not just documents. Each concept links to its source documents, other concepts, and the reasoning chain that connects them. This page is itself an instance of concept extraction.',
    concepts: ['Semantic \u2192 concept', 'Graph nodes as concepts', 'Reasoning chains', 'Self-referential architecture'],
    links: [{ label: 'Concept Browser', url: '/r/concepts/browser.html' }],
  },
];

const EDGES = [
  { from: 'madison', to: 'natural_rights', label: 'grounds', desc: 'First principles ground the DNA claim: sovereignty of the people precedes government authority over family' },
  { from: 'natural_rights', to: 'game_theory', label: 'constitutional estoppel', desc: 'Natural rights framework provides the constitutional estoppel argument \u2014 courts cannot repudiate their own proclaimed values' },
  { from: 'lending_fraud', to: 'game_theory', label: 'proof mechanism', desc: 'Proof requirements are the game theory enforcement mechanism \u2014 "no proof, no foreclosure" shifts the Nash equilibrium' },
  { from: 'game_theory', to: 'eval_regen', label: 'adversarial pattern', desc: 'Adversarial evaluation mirrors the legal forcing function: each cycle either confirms evidence or reveals what\u2019s missing' },
  { from: 'commandments', to: 'natural_rights', label: 'universal convergence', desc: 'Universal moral convergence across 9 traditions supports the existence of pre-government natural rights' },
  { from: 'commandments', to: 'concept_layer', label: 'factor analysis method', desc: 'Factor analysis methodology (finding latent dimensions in apparent diversity) is the same pattern as concept extraction' },
  { from: 'six_layer', to: 'knowledge_graph', label: 'Layer 6 solution', desc: 'Neo4j tiered query is the missing Layer 6 \u2014 graph-directed search replaces brute-force vector similarity' },
  { from: 'eval_regen', to: 'six_layer', label: 'Layer 4 mechanism', desc: 'Eval\u2192regen loop implements Layer 4 learning memory \u2014 every correction feeds back into the knowledge system' },
  { from: 'knowledge_graph', to: 'microstructure', label: 'graph search', desc: 'Graph-directed search applies to market data: regime detection, cross-exchange signal propagation, basis state modeling' },
  { from: 'knowledge_graph', to: 'concept_layer', label: 'enables', desc: 'Neo4j graph is the substrate on which concept extraction operates \u2014 concepts are high-centrality nodes' },
  { from: 'eval_regen', to: 'concept_layer', label: 'refinement', desc: 'Each eval cycle refines the concept graph: confirming edges, pruning false connections, discovering new links' },
  { from: 'madison', to: 'commandments', label: 'moral foundation', desc: 'Madison\'s social contract theory rests on the same moral foundations the commandments analysis identifies as universal' },
  { from: 'lending_fraud', to: 'natural_rights', label: 'property rights', desc: 'Foreclosure without proof violates natural property rights \u2014 "extraordinary remedy" language echoes natural rights hierarchy' },
  { from: 'microstructure', to: 'eval_regen', label: 'signal validation', desc: 'Trading signal validation uses the same eval\u2192regen pattern: generate hypothesis \u2192 test against data \u2192 refine' },
];

// ── Physics simulation ──

const W = () => window.innerWidth;
const H = () => window.innerHeight;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;

function resize() {
  dpr = window.devicePixelRatio || 1;
  canvas.width = W() * dpr;
  canvas.height = H() * dpr;
  canvas.style.width = W() + 'px';
  canvas.style.height = H() + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Position nodes in a force-directed layout
const cx = W() / 2, cy = H() / 2;
const angleStep = (2 * Math.PI) / NODES.length;
NODES.forEach((n, i) => {
  const angle = angleStep * i - Math.PI / 2;
  const r = Math.min(W(), H()) * 0.3;
  n.x = cx + r * Math.cos(angle);
  n.y = cy + r * Math.sin(angle);
  n.vx = 0; n.vy = 0;
  n.radius = 36;
  n.visible = true;
});

// Force simulation parameters
const SIM = { repulsion: 8000, attraction: 0.004, damping: 0.85, centerGravity: 0.01 };

function simulate() {
  // Repulsion between all nodes
  for (let i = 0; i < NODES.length; i++) {
    if (!NODES[i].visible) continue;
    for (let j = i + 1; j < NODES.length; j++) {
      if (!NODES[j].visible) continue;
      let dx = NODES[j].x - NODES[i].x;
      let dy = NODES[j].y - NODES[i].y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = SIM.repulsion / (dist * dist);
      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;
      NODES[i].vx -= fx; NODES[i].vy -= fy;
      NODES[j].vx += fx; NODES[j].vy += fy;
    }
  }

  // Attraction along edges
  for (const e of EDGES) {
    const a = NODES.find(n => n.id === e.from);
    const b = NODES.find(n => n.id === e.to);
    if (!a || !b || !a.visible || !b.visible) continue;
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
    let force = (dist - 200) * SIM.attraction;
    let fx = (dx / dist) * force;
    let fy = (dy / dist) * force;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  }

  // Center gravity
  for (const n of NODES) {
    if (!n.visible) continue;
    n.vx += (W() / 2 - n.x) * SIM.centerGravity;
    n.vy += (H() / 2 - n.y) * SIM.centerGravity;
  }

  // Apply velocity
  for (const n of NODES) {
    if (!n.visible || n.dragging) continue;
    n.vx *= SIM.damping; n.vy *= SIM.damping;
    n.x += n.vx; n.y += n.vy;
    n.x = Math.max(60, Math.min(W() - 60, n.x));
    n.y = Math.max(80, Math.min(H() - 60, n.y));
  }
}

// ── Rendering ──

let hovered = null;
let selected = null;
let filterDomain = 'all';

function setFilter(domain) {
  filterDomain = domain;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + domain.charAt(0).toUpperCase() + domain.slice(1)).classList.add('active');
  NODES.forEach(n => {
    n.visible = domain === 'all' || n.domain === domain;
  });
}

function draw() {
  ctx.clearRect(0, 0, W(), H());

  // Draw edges
  for (const e of EDGES) {
    const a = NODES.find(n => n.id === e.from);
    const b = NODES.find(n => n.id === e.to);
    if (!a || !b || !a.visible || !b.visible) continue;

    const isHighlight = hovered && (a.id === hovered.id || b.id === hovered.id);
    const isSelected = selected && (a.id === selected.id || b.id === selected.id);

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = isHighlight || isSelected
      ? 'rgba(99,102,241,0.6)'
      : 'rgba(51,65,85,0.3)';
    ctx.lineWidth = isHighlight || isSelected ? 2 : 1;
    ctx.stroke();

    // Edge label
    if (isHighlight || isSelected) {
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      ctx.font = '10px -apple-system, sans-serif';
      ctx.fillStyle = 'rgba(148,163,184,0.8)';
      ctx.textAlign = 'center';
      ctx.fillText(e.label, mx, my - 6);
    }

    // Arrowhead
    const angle = Math.atan2(b.y - a.y, b.x - a.x);
    const headLen = 8;
    const bEdge = b.radius + 4;
    const ax2 = b.x - Math.cos(angle) * bEdge;
    const ay2 = b.y - Math.sin(angle) * bEdge;
    ctx.beginPath();
    ctx.moveTo(ax2, ay2);
    ctx.lineTo(ax2 - headLen * Math.cos(angle - 0.4), ay2 - headLen * Math.sin(angle - 0.4));
    ctx.lineTo(ax2 - headLen * Math.cos(angle + 0.4), ay2 - headLen * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fillStyle = isHighlight || isSelected
      ? 'rgba(99,102,241,0.6)'
      : 'rgba(51,65,85,0.3)';
    ctx.fill();
  }

  // Draw nodes
  for (const n of NODES) {
    if (!n.visible) continue;
    const isHov = hovered && n.id === hovered.id;
    const isSel = selected && n.id === selected.id;
    const r = n.radius + (isHov ? 4 : 0);

    // Glow
    if (isHov || isSel) {
      const grad = ctx.createRadialGradient(n.x, n.y, r, n.x, n.y, r + 20);
      grad.addColorStop(0, n.color + '40');
      grad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 20, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = isSel ? n.color : isHov ? n.color + 'dd' : n.color + '30';
    ctx.fill();
    ctx.strokeStyle = n.color;
    ctx.lineWidth = isSel ? 3 : isHov ? 2.5 : 1.5;
    ctx.stroke();

    // Label
    const lines = n.label.split('\n');
    ctx.font = `${isHov || isSel ? '600' : '500'} 11px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = isSel ? '#fff' : isHov ? n.color : 'var(--text)';
    // Use actual color for fallback
    if (!isSel && !isHov) ctx.fillStyle = '#f1f5f9';
    lines.forEach((line, i) => {
      ctx.fillText(line, n.x, n.y + (i - (lines.length - 1) / 2) * 14);
    });
  }

  simulate();
  requestAnimationFrame(draw);
}

// ── Interaction ──

let dragNode = null;
let dragOffset = { x: 0, y: 0 };

function getNode(mx, my) {
  for (let i = NODES.length - 1; i >= 0; i--) {
    const n = NODES[i];
    if (!n.visible) continue;
    const dx = mx - n.x, dy = my - n.y;
    if (dx * dx + dy * dy <= (n.radius + 8) * (n.radius + 8)) return n;
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  if (dragNode) {
    dragNode.x = mx - dragOffset.x;
    dragNode.y = my - dragOffset.y;
    return;
  }
  const node = getNode(mx, my);
  hovered = node;
  canvas.style.cursor = node ? 'pointer' : 'default';
});

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const node = getNode(mx, my);
  if (node) {
    dragNode = node;
    node.dragging = true;
    dragOffset = { x: mx - node.x, y: my - node.y };
  }
});

canvas.addEventListener('mouseup', e => {
  if (dragNode) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const moved = Math.abs(mx - dragOffset.x - dragNode.x) + Math.abs(my - dragOffset.y - dragNode.y);
    // Treat as click if barely moved
    if (moved < 5) {
      openPanel(dragNode);
    }
    dragNode.dragging = false;
    dragNode = null;
    return;
  }
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const node = getNode(mx, my);
  if (node) {
    openPanel(node);
  } else {
    closePanel();
  }
});

function openPanel(node) {
  selected = node;
  const panel = document.getElementById('panel');
  document.getElementById('panelTitle').textContent = node.label.replace('\n', ' ');
  document.getElementById('panelDomain').textContent = node.domain;
  document.getElementById('panelDesc').textContent = node.desc;

  // Concepts
  const cDiv = document.getElementById('panelConcepts');
  cDiv.innerHTML = '<h3>Key Concepts</h3>' +
    node.concepts.map(c => `<span class="concept-tag">${c}</span>`).join('');

  // Connections
  const conns = EDGES.filter(e => e.from === node.id || e.to === node.id);
  const connDiv = document.getElementById('panelConns');
  connDiv.innerHTML = '<h3>Connections</h3>' +
    conns.map(e => {
      const other = NODES.find(n => n.id === (e.from === node.id ? e.to : e.from));
      const dir = e.from === node.id ? '\u2192' : '\u2190';
      return `<div class="conn-item" onclick="openPanel(NODES.find(n=>n.id==='${other.id}'))">
        <span class="arrow">${dir}</span>
        <span>${other.label.replace('\\n', ' ')}</span>
        <span class="label">${e.label}</span>
      </div>`;
    }).join('');

  // Source links
  const linkDiv = document.getElementById('panelLinks');
  linkDiv.innerHTML = node.links.map(l =>
    `<a class="source-link" href="${l.url}" target="_blank">${l.label} \u2192</a>`
  ).join(' ');

  panel.classList.add('open');
}

function closePanel() {
  selected = null;
  document.getElementById('panel').classList.remove('open');
}

// Start
draw();
</script>
</body>
</html>
