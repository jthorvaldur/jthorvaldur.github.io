<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected Page</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --red: #f87171;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #1a1a2e;
    --text2: #6b7280;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1), 0 10px 15px rgba(0,0,0,0.1);
}
.login-card h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}
.login-card p {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 24px;
}
.input-group {
  position: relative;
  margin-bottom: 16px;
}
.input-group input {
  width: 100%;
  padding: 12px 16px;
  font-size: 15px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.input-group input:focus {
  border-color: var(--accent);
}
.btn {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: var(--accent-hover); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.error {
  color: var(--red);
  font-size: 13px;
  margin-top: 10px;
  display: none;
}
.loading {
  display: none;
  text-align: center;
  padding: 40px;
  font-size: 16px;
  color: var(--text2);
}
</style>
</head>
<body>
<div class="login-card" id="loginCard">
  <h1>Private Page</h1>
  <p>Enter the password to view this page.</p>
  <form id="loginForm" onsubmit="return handleSubmit(event)">
    <div class="input-group">
      <input type="password" id="pwd" placeholder="Password" autocomplete="off" autofocus>
    </div>
    <button type="submit" class="btn" id="submitBtn">Unlock</button>
    <div class="error" id="error">Incorrect password. Please try again.</div>
  </form>
</div>
<div class="loading" id="loading">Decrypting...</div>

<script>
const SALT = "wy93vj6HeXVDKEeLa81VSQ==";
const IV = "yTnrS+bS8xlIyBOT";
const CT = "PId06yuA4aNo9nved7zM27C2VccI3ff48uGm1NZsIOi9HpMfH2sL+ZUG2/92A4FqMUTin2YrHqO24emTCwu8rABy4kpPZ2HaRHxWCeuRXp1hZoblQsIu6C0sEmE/9VmWsUNqiHWzSQWnck8R+JnfvyzjhCs9CueBaMMPK6/ATY/G1KYjf2ltkaW3bGhxNvlrBGH/aMgumqb+0YHo5heCq09bdiW7ECOaKY4eWkqPjwJdcoIhUxh5O7gmuFzZlsZ8ZvZ6k8aV3echOeu0g8PODSh374v4dAPBluBq6xN+vXR7EEBG7gTUpVvWK9paeeaPAdx/8q+cW41b3+KSUDgYI14UofaGKir4XTX4tdOMOU6vMr+K1uzMzzCy+Xz4/ZCfMoUv6ABRmoJqEAwJBCnocZdS0UL/gmI1nB4Tj6npI8i1ynzRv6GJRjVttKtmgkrLBX8mSqjOWoUGPSe0wdho7akPLC8I/HeZ85URvBn94IePlj+z4QmFwCvNw5QoCExg01I9VCnqQ7pcAYdEmtpQc8QZGCIVRApKcbAH7GaxijjW1N6V/L+So1XJVwUTagxWuvLtcZ0f+BNy0if0AbwPyoiGOAWBMJCZxhIWouj/kCBWnp2iccqiBojcrDrItkDx5QlBb1uXFmO9DN1+rZnPhrcREZwJiIslcOGtRfnDVxta4IZw/++f4Iwr9kok2qCyj8bA3cB5avVRAbL5TzoCMP0Dxfgp8uF8WBM5WkRA9yjDhw8hurHD1VbKxTPCEDiA3tiv4IgkHNzh8f64qH2075yrx2YmBhCU4RrwuU/76OjPITrb1biadm1IEne79/FirmAU7+dRz5gAkKI6BSDX3QpWIz3YrP6r4+AmomCMX4e0Rq4ypXanTffpPH/Kk/B4weicAAvBETJroqWLqHfp2p/rvizSIRXBdkjpbDVATNuDij77CqZiDqqAe594EhdqGiO0Nejj7P4FLB6h+PA+qjcgAH2ecdKAk0Z7z+WcjS+hOU89YjAzEuTjN+oSEhrtuWRPjYx298Ho2LjP8CM+4/Vy6ISZeyGmRDbbRt57RdqL9dZWTpyh+7vTR58RQB4BboHwUjJFLAXNs0CkcuDz+ZMmtXOMhrpanYwKGvyI0YXBsuS0vH57Sl6huwYrMa81Re/k7uUfVHmi31M+ccgVjq123OHNLKnXXAWHDbfXu4b06pix1m5n7P+Qerf+no1WdRYs6CY768N4BC9cJnNDbwrkgrM499vsNG3HOL/auQNu0io/K5LPjGrumNNwGrSAhMf1S3vBCZn9t+3EHa13lLgzx9zYdVVFF8BC90THsNyEswE2004R7a4ms2gCAcGPLK5fegchLuIAQRAR57Sd1qMDHmxU0ncsZzyIakwxW+jmmZwVT7RQAnnxDSytpFAc3WlRrFSaprCNxdB+L8T1WaXzJr5dgdzd9l3ptuUFTIMEd5l45V56+0ttHaffdveGdrRf8gO8HNTuGgQXABW7M5bcwpW1GNWtrWREgfFjCADESGY9d8SRk7j0fzdXG5A=";

function b64decode(s) {
  const bin = atob(s);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decrypt(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64decode(SALT), iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  const ct = b64decode(CT);
  const iv = b64decode(IV);
  const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(decrypted);
}

async function handleSubmit(e) {
  e.preventDefault();
  const pwd = document.getElementById("pwd").value;
  if (!pwd) return false;

  const btn = document.getElementById("submitBtn");
  const errEl = document.getElementById("error");
  btn.disabled = true;
  btn.textContent = "Decrypting...";
  errEl.style.display = "none";

  try {
    const html = await decrypt(pwd);
    // Store password in sessionStorage so other pages auto-unlock
    try { sessionStorage.setItem("filing_key", pwd); } catch(x) {}
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Unlock";
  }
  return false;
}

// Auto-unlock from sessionStorage (same session, no re-prompting)
(async function() {
  let saved = null;
  try { saved = sessionStorage.getItem("filing_key"); } catch(x) {}
  if (saved) {
    try {
      const html = await decrypt(saved);
      document.open();
      document.write(html);
      document.close();
      return;
    } catch(e) {
      try { sessionStorage.removeItem("filing_key"); } catch(x) {}
    }
  }
})();
</script>
</body>
</html>
