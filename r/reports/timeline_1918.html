<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected Page</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --red: #f87171;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #1a1a2e;
    --text2: #6b7280;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1), 0 10px 15px rgba(0,0,0,0.1);
}
.login-card h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}
.login-card p {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 24px;
}
.input-group {
  position: relative;
  margin-bottom: 16px;
}
.input-group input {
  width: 100%;
  padding: 12px 16px;
  font-size: 15px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.input-group input:focus {
  border-color: var(--accent);
}
.btn {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: var(--accent-hover); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.error {
  color: var(--red);
  font-size: 13px;
  margin-top: 10px;
  display: none;
}
.loading {
  display: none;
  text-align: center;
  padding: 40px;
  font-size: 16px;
  color: var(--text2);
}
</style>
</head>
<body>
<div class="login-card" id="loginCard">
  <h1>Contact Analytics</h1>
  <p>Enter the password to view this page.</p>
  <form id="loginForm" onsubmit="return handleSubmit(event)">
    <div class="input-group">
      <input type="password" id="pwd" placeholder="Password" autocomplete="off" autofocus>
    </div>
    <button type="submit" class="btn" id="submitBtn">Unlock</button>
    <div class="error" id="error">Incorrect password. Please try again.</div>
  </form>
</div>
<div class="loading" id="loading">Decrypting...</div>

<script>
const SALT = "fvUBH5XuV8aPsoKmT4N1PQ==";
const IV = "1/WYpOY/eH9I10IE";
const CT = "8xX46EO1aJwZ1s71HkwO8rur6VJtWv8oq7sMGHVO769T8n5ezhZT1HJZcLSwqxREveiHb9FAbUEHo5KNSbYcUNaJByWEW0bTkqbyb2id/hF6NR2f5Km1LjS69u6vpQKvKY4Qo7c82lFS52UVY3LE9tj8G4+Bt3Q4A0qzq6209qdFSo2WhMk0hEYXIj1wAgVJh86wlAzVu+ks/c0oNLiBvGgLVYIbRv8wR+9EGyP/OCTlHvGlf55GVOKc+gbrBK4/9tsaEAboUcuZA8A8I2kXcHamvntDylVLIwXD/A7WwaDsT4g+qKbXBqddsbn2p2thZNXIdajWHeRHi3DBCMBMqy6FATAlhoeU0g2RO8X4dJr12SZqBcuOcDEaBtpQ1UUmdRIKjUi4uICFm7lJ4ioQqZVPG699JXv2P/UtnKqC5U+CES8MuRpP0+5z3z5qPPOQy7lzFy6QoxL4JqTOCXyb/8rAI2nLSaRR2hcCgJGrpeahwLn3yyoH2zqmS4h+Xv5X/AJ+vJrE/xVs9Quxz0EbZaQMWkGujEd/CYTJxsxJBMSJlSdPQIyIQlTM0n+UiMl3fCE/jGrrxc6HFNddQaR4oCBxj60XHOVLSEF6Z53tQkxTEVhHidGhL84+9NqWyBbI7PQPXxKq0g1z9vs+qcF0XWg5yDReBCNNNta4WCOCY0MXJBrc9PcxLDUM/uacEnk4g5TPMDBVxc78U9zVbgIvY159LzVcqhxFVrw6oY8abiVp41rydJRvG156tsqSynujWAEc++OOGLp4qWSuVAzXhuydFg8FJOYnZA5ty0PS31q+QbRoA4NSVWyUm9CmmyW4WunOD3YjEAZAiINaoMjDBQZq17LsoM7kwP/uInhRjoZTRWJp7TG27z3CfgQuOi4eN08s3pW4VjwrwA284U6UIYC2fDvJw09Ozp48J70BzqrsdP9rvKPSHVq3wYrOtEWopAQVUDDpGJxr3EnVbcGGHrb4d33zY+AIA6BTc9QUCcFmUU9wE7iO8SNzgnara9Rm2OoUDgyYZ0G99u7ro0nAP9M+Otyf1EAx1Znwt392P2auqxa/djseWy3exI3E1g6nnJahp1yIORL3I1ZduTUFBuTyMtfKlPpNTybzEmC8oMFBSA4mqy5L2KYj1gHIv2hig34rynsgEp1dXvAsbZzsCcKKbBxYBQ2xl58A96AVDJM8ytVRV6Lc4D+OBfoWm3CAg5zw0cXa9uJCMk4oOQGDN8y/peBLHbTI5dzVJjbhOvdbpHmrMZprbxm8Kp+OBEx5IeiY6Xdf9xOsEbpJka2eZzcdaPYNhLE3onMGRqeZyEEUdRr/Xgsph7xZwMRfOPY+EQplltVMW/X09sUfnwjDgSCPJsmCpM/3bOp8Nq1sQFLNlcoQ2JD0pDIQXOfUIoJXOqx9OKID8YiaaGpbXTd+WIQ2vcAqS+fOJk6FwgfbFXxhUCc3vJQXHln256FvV8zRTmbLbTUfBYYlstjrKfRiql2BdJ1V0+cGpFvC7cHdk4K779uG8fW7Fe0xZc/ZhVs=";

function b64decode(s) {
  const bin = atob(s);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decrypt(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64decode(SALT), iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  const ct = b64decode(CT);
  const iv = b64decode(IV);
  const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(decrypted);
}

async function handleSubmit(e) {
  e.preventDefault();
  const pwd = document.getElementById("pwd").value;
  if (!pwd) return false;

  const btn = document.getElementById("submitBtn");
  const errEl = document.getElementById("error");
  btn.disabled = true;
  btn.textContent = "Decrypting...";
  errEl.style.display = "none";

  try {
    const html = await decrypt(pwd);
    // Store password in sessionStorage so other pages auto-unlock
    try { sessionStorage.setItem("filing_key", pwd); } catch(x) {}
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Unlock";
  }
  return false;
}

// Auto-unlock from sessionStorage (same session, no re-prompting)
(async function() {
  let saved = null;
  try { saved = sessionStorage.getItem("filing_key"); } catch(x) {}
  if (saved) {
    try {
      const html = await decrypt(saved);
      document.open();
      document.write(html);
      document.close();
      return;
    } catch(e) {
      try { sessionStorage.removeItem("filing_key"); } catch(x) {}
    }
  }
  // Fallback: check URL hash
  if (location.hash.length > 1) {
    document.getElementById("pwd").value = decodeURIComponent(location.hash.slice(1));
    handleSubmit(new Event("submit"));
  }
})();
</script>
</body>
</html>
