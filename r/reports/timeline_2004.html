<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected Page</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --red: #f87171;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #1a1a2e;
    --text2: #6b7280;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1), 0 10px 15px rgba(0,0,0,0.1);
}
.login-card h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}
.login-card p {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 24px;
}
.input-group {
  position: relative;
  margin-bottom: 16px;
}
.input-group input {
  width: 100%;
  padding: 12px 16px;
  font-size: 15px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.input-group input:focus {
  border-color: var(--accent);
}
.btn {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: var(--accent-hover); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.error {
  color: var(--red);
  font-size: 13px;
  margin-top: 10px;
  display: none;
}
.loading {
  display: none;
  text-align: center;
  padding: 40px;
  font-size: 16px;
  color: var(--text2);
}
</style>
</head>
<body>
<div class="login-card" id="loginCard">
  <h1>Contact Analytics</h1>
  <p>Enter the password to view this page.</p>
  <form id="loginForm" onsubmit="return handleSubmit(event)">
    <div class="input-group">
      <input type="password" id="pwd" placeholder="Password" autocomplete="off" autofocus>
    </div>
    <button type="submit" class="btn" id="submitBtn">Unlock</button>
    <div class="error" id="error">Incorrect password. Please try again.</div>
  </form>
</div>
<div class="loading" id="loading">Decrypting...</div>

<script>
const SALT = "/BqqBWZN6HV1ibTBjyfNxA==";
const IV = "4HrUhjH4MWym2Atr";
const CT = "7032Dcp5SZg3D9MEZpH1RobKlSmpw4swokpGKvL7QFyfzk5nz7UjfxkWYxbjC8sZDL8Wvx/6ad9oitlsqM62qPnYCXGpfLzLxogD0gSPHSZmywG/Xn6I2Zd55cpMKKZlumJ39fOw+84y8nylgJuS1HzDSCS2pAqm5Nfwxbab4E2WHP5OXAH7Fa5d/uzXV/xBtDAJy96wxr2yuw1VltmUFj0t7gkO2UdVgy6Mdmigi9nFNKaDPUrmW3GaffCcBaH/R94I0SRTfM0ttdLItx91ascSOWzEbNYeh0ngr6MCim2MygYR1JmbhZt8Gx6sxX1qygqUyk6cjDAQdqf5CRsa+LdE3B0zWcPFVx95CyoS5NZmKjCZOewpSGguL8sL3RPa4Beydcz+qyhFmeNNGWaYBSLrGxtfgfFrkSu5pqekscoubH4hXqbXF4Bj6FLo5idiGTA6z7+1k3sGS2mAAzXBBB1q0vSz2zix1TfO2cfdSgcKPPgLCJro36dtmCi/YWtY1L+rShizgAAgv5zwv6FdUtmmBPv9kPsCbL8wgcqi4SLeM156/NOGD89gfs5u2Tzp4GAqnvnVGwrjBwiK1YjETCQSAdI3wvYXGAUcwtN0zRzWO8VdPrF9S7jE9CerMQ7AbWIVRD1JHub+plH+qQe0qGbb5+0U8qlUdQCw3TxnQBiSiwcsAGCASKThGQXcs4VYXUf4F8fnNBUtJdx50YFRsDKC9RPDZ99Of5p+972EZeA/q7WEkN3IXUyKq1Qp0c+UCEKL/HGd05XvWGcKzFV9fKFKjZemmJkcXafpTJU1IJc2uBPJjv09fkVyxrYBdWQwVeJg8AiDUuAb85wXmm4ifDEskWViHQD0f/HjrLbqkGwjjJP+Hl/pFq/Ov15Q9Ha2LVG3Y3q+SJu1Qt3KLZkKj5FnzWpqO84WK6Lz3FdE0KISCTUPU3bKUvFgjwWSGkK0QFu3+GSqdb1EyhVwNKGpSkRnk0snkSe5Gw8q8ZmvdUD69Fq7YHp5sdpzqYhv4YpCzs1SRb/ibpJoxDtYNNIHu3qImuN4D/P4h2FCLEPtttiWkFVgIf3emfugT0izRj0/Z5bLKsbmv4JB+sbUvqlo7yuLmApf4wos8bkzdo3JbVNL6RnyrJWjbLvCKS8cndxpXoXnevvpoaOCaBu59EBc5+osOrxXKYu759huaDDhKYjVy7BddNptuSZefU8SQWK87kmtKpSC1o2U3Rzv3PqWjYoNGulx5/bPjUbvyY222gToFxNsUEccl97inpQpC3nT1bCN8IF/95xnaGG8wXmOMYrvnh6DjVcL/xc9iC1dSj9DSYF2jB5AjDPTuRlRRZ8+hPWvljNTE8nLdaMqAnFnxF62l5jNBv0Ng2iLoe2wDneSKpxCjfS4bfJJCWPh2bHAhZgVwkuFfb5NCSyUadhlRV/w07FQ3S8IDgCP7SkWa60++RuepCavd03PfJkd44NoHyeD7y3Qu7oLTqUYZTIah1LP5Uz25Cbv9i+ip5EdRM1I27SmjgsOC062K2hdP/AQjFfKDLP06zi/nkF6Li0=";

function b64decode(s) {
  const bin = atob(s);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decrypt(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64decode(SALT), iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  const ct = b64decode(CT);
  const iv = b64decode(IV);
  const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(decrypted);
}

async function handleSubmit(e) {
  e.preventDefault();
  const pwd = document.getElementById("pwd").value;
  if (!pwd) return false;

  const btn = document.getElementById("submitBtn");
  const errEl = document.getElementById("error");
  btn.disabled = true;
  btn.textContent = "Decrypting...";
  errEl.style.display = "none";

  try {
    const html = await decrypt(pwd);
    // Store password in sessionStorage so other pages auto-unlock
    try { sessionStorage.setItem("filing_key", pwd); } catch(x) {}
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Unlock";
  }
  return false;
}

// Auto-unlock from sessionStorage (same session, no re-prompting)
(async function() {
  let saved = null;
  try { saved = sessionStorage.getItem("filing_key"); } catch(x) {}
  if (saved) {
    try {
      const html = await decrypt(saved);
      document.open();
      document.write(html);
      document.close();
      return;
    } catch(e) {
      try { sessionStorage.removeItem("filing_key"); } catch(x) {}
    }
  }
  // Fallback: check URL hash
  if (location.hash.length > 1) {
    document.getElementById("pwd").value = decodeURIComponent(location.hash.slice(1));
    handleSubmit(new Event("submit"));
  }
})();
</script>
</body>
</html>
