<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected Page</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --red: #f87171;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #1a1a2e;
    --text2: #6b7280;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1), 0 10px 15px rgba(0,0,0,0.1);
}
.login-card h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}
.login-card p {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 24px;
}
.input-group {
  position: relative;
  margin-bottom: 16px;
}
.input-group input {
  width: 100%;
  padding: 12px 16px;
  font-size: 15px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.input-group input:focus {
  border-color: var(--accent);
}
.btn {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: var(--accent-hover); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.error {
  color: var(--red);
  font-size: 13px;
  margin-top: 10px;
  display: none;
}
.loading {
  display: none;
  text-align: center;
  padding: 40px;
  font-size: 16px;
  color: var(--text2);
}
</style>
</head>
<body>
<div class="login-card" id="loginCard">
  <h1>Contact Analytics</h1>
  <p>Enter the password to view this page.</p>
  <form id="loginForm" onsubmit="return handleSubmit(event)">
    <div class="input-group">
      <input type="password" id="pwd" placeholder="Password" autocomplete="off" autofocus>
    </div>
    <button type="submit" class="btn" id="submitBtn">Unlock</button>
    <div class="error" id="error">Incorrect password. Please try again.</div>
  </form>
</div>
<div class="loading" id="loading">Decrypting...</div>

<script>
const SALT = "OsKxXeOjJUFBud1RS6pO2A==";
const IV = "R89k9lzIOOgyEr8O";
const CT = "QRlzTFLN8nQCFBgOeCQ4YZ32ofhl38j4DANHaI7Yfe5RLBeXlivthXlxFhfg1yiV2ffTElSDYAF8px6JwDLT4R0U31Ov3d2/7NZN2No3hMZHYV/dOBuUcrt3LGjDNt762IRHSfSjninsdVM3Xr2Ln1tkBQ4OtyjEeEZmf8x1tPJm6XURWh93jN3TjAkO3Ef7gQe1JGutINqWLzjInwUV1aqGqmf6/wAnmwmxy5oHOFHPMSq6Vcg3IQUcQq+781mc0DQl8sCJxDVoSKUs4DjpiYpjWJ8QRsGebibKEVJabv6Wm8IhpsghJGT3Y9BRNA75Sq3ujTBfCC1+Rf+7uP+fQgua63hsHx5KwFCANy6eCG7Rmbocu2TTFiTy33IWcbEASwYofq/tNuD5d5slr270xaDdd7gr/dliE+1Sn1WwlZVvs6U7s7rTal3l70+dOVJzHtcOvKTazYhRJ15lZg9uCkRKl0URC4LO4uvVZOs+tTqQZ/xdCRvbG2gaD2SzpCzRrjMhcANXlmmBHUDZv6Fd25WGENKfmRTbDY4XNwF+X+xQbHWBvr6TY3hy+gdAwMs75p1h0vHFq7Hh1bfLrO3BxZeZ1a1XyPs/hcjZUYLHFBleFTmrv+JhDqYTW4YUUJvR2m3734LP6q5tkRmZWwPtKCIdIzw3Ay0xhwaBInDAdKlk2/HRQ6YsVGeCMQ5ImTpj7NrH9m/lY9pORVJAepQZqmpTeTMLandGCUF0WrrzwJ8DravaqUmsImYycN0nCwmfY4PER0b0gmnE2BWKL2SnJFpTv3KSqCznEYYtrFHPEmvGlPQhNeXXWJTqxo5kioFJ4Z7aog1umWzl+NpBofF6dXwVDzQ3kxiYHYxEFXXFpb6dSxDvopvfJX23TfhCqee+vvQGBNlGhvpTl+KsmyIG8vrlpOKB47PgQzr7AdHK8lbcwOMS7dMXeQ0u4o7uYhYWzZwuMeIXn/ohd8iqhvzu+e6T7xVkp/FYgZACuX7ABA81+Do+BdPeMgyMiILcLVU/vqu2bJIuGa4Cez1XOp3QJrjuYIvJhNU1W8LeFJsGKl8ki0xhxcUpziRKaFL1lo2yJ1psOm0t2WzHHaYF10mafpSnULfLqY6ZI6erG2m6GkuwVPhyivGn6kWi8RBz1wYXCbftf245UnJDAgtfKbN466tRe2mgvCNzEJdRM89A3V2VLeVU3opB9PR71v+byrZXd5rbGINAqzB8sxS0eFCsDx8aKMoCO8dS1vZld2+zuYvx6MLt6NsXyZKN60A15VHVN2ELwSCa50B5iUDsz8gXXiyFjamT8qSq6T+1hQTDZGsdSxTL988rn70sLr+qpTRt5cs/3Q8S67FtJOtqTIbIVB6X1BWCAVLbAd7IIH27rV7S1aAZkkQ4PzraFXDeFGDUrbU07ovKgqk143USVb3aw2/0OTg0o4cWOtXpYZFMD481JTOOyh19XcUWzxsRSMr/6/DLOkVnpeHt+AgYcmFUMMqNlNhcm2LeIeYL/a3fYiNFgCZ0t/K/KCoNpMpTAP8pmsDXDAl+34+A3IIUxQ==";

function b64decode(s) {
  const bin = atob(s);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decrypt(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64decode(SALT), iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  const ct = b64decode(CT);
  const iv = b64decode(IV);
  const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(decrypted);
}

async function handleSubmit(e) {
  e.preventDefault();
  const pwd = document.getElementById("pwd").value;
  if (!pwd) return false;

  const btn = document.getElementById("submitBtn");
  const errEl = document.getElementById("error");
  btn.disabled = true;
  btn.textContent = "Decrypting...";
  errEl.style.display = "none";

  try {
    const html = await decrypt(pwd);
    // Store password in sessionStorage so other pages auto-unlock
    try { sessionStorage.setItem("filing_key", pwd); } catch(x) {}
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Unlock";
  }
  return false;
}

// Auto-unlock from sessionStorage (same session, no re-prompting)
(async function() {
  let saved = null;
  try { saved = sessionStorage.getItem("filing_key"); } catch(x) {}
  if (saved) {
    try {
      const html = await decrypt(saved);
      document.open();
      document.write(html);
      document.close();
      return;
    } catch(e) {
      try { sessionStorage.removeItem("filing_key"); } catch(x) {}
    }
  }
  // Fallback: check URL hash
  if (location.hash.length > 1) {
    document.getElementById("pwd").value = decodeURIComponent(location.hash.slice(1));
    handleSubmit(new Event("submit"));
  }
})();
</script>
</body>
</html>
