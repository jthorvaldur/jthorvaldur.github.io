const SESSION_KEY = 'legal_key';

function b64decode(s) { const b=atob(s); const a=new Uint8Array(b.length); for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i); return a; }

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' }, km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
}

async function decryptWithPassword(pw) {
  const salt=b64decode(SALT), iv=b64decode(IV), data=b64decode(CT);
  const key = await deriveKey(pw, salt);
  const dec = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data);
  return new TextDecoder().decode(dec);
}

async function decrypt() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  try {
    const html = await decryptWithPassword(pw);
    sessionStorage.setItem(SESSION_KEY, pw);
    try { if(window.PasswordCredential){navigator.credentials.store(new PasswordCredential({id:'thorarinson-legal',password:pw}));} } catch(x){}
    document.open(); document.write(html); document.close();
  } catch (e) {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

(async function autoDecrypt() {
  const sk = sessionStorage.getItem(SESSION_KEY);
  if (!sk) return;
  try {
    const html = await decryptWithPassword(sk);
    document.open(); document.write(html); document.close();
  } catch(e) { sessionStorage.removeItem(SESSION_KEY); }
})();
