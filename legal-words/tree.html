const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H, CX, CY, SCALE;
function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; CX = W/2; CY = H/2; SCALE = Math.min(W,H)*0.35; }
resize(); addEventListener('resize', () => { resize(); });

const sysColors = {
    common_law:'#4dabf7', civil_law:'#69db7c', islamic:'#ff922b',
    mixed:'#e599f7', customary:'#38d9a9', historical:'#748ffc',
    maritime:'#74c0fc', criminal:'#ff6b6b'
};
const axColors = {tb:'#4dabf7',em:'#ff6b6b',sd:'#ffd43b',cj:'#69db7c',cf:'#cc5de8',asym:'#ff922b'};

let currentLevel = 0;
let currentKey = null;
let path = [];
let entries = [];
let loadings = [];
let variance = [];
let hovered = null;
let mx = 0, my = 0;
let animProgress = 0;

function toScreen(x, y) { return [CX + x * SCALE, CY - y * SCALE]; }

function goLevel(level, key) {
    animProgress = 0;
    if (level === 0) {
        currentLevel = 0; currentKey = null; path = [];
        entries = TREE.level0.entries;
        loadings = TREE.level0.loadings;
        variance = TREE.level0.variance;
        document.getElementById('breadcrumb').innerHTML = '<span onclick="goLevel(0)">Traditions</span>';
    } else if (level === 1) {
        const tradition = key;
        if (!TREE.level1[tradition]) return;
        currentLevel = 1; currentKey = tradition; path = [tradition];
        entries = TREE.level1[tradition].entries;
        loadings = TREE.level1[tradition].loadings;
        variance = TREE.level1[tradition].variance;
        document.getElementById('breadcrumb').innerHTML = 
            `<span onclick="goLevel(0)">Traditions</span> → <span onclick="goLevel(1,'${tradition}')">${tradition}</span>`;
    } else if (level === 2) {
        const jur = key;
        if (!TREE.level2[jur]) return;
        currentLevel = 2; currentKey = jur; path.push(jur);
        entries = TREE.level2[jur].entries;
        loadings = TREE.level2[jur].loadings;
        variance = TREE.level2[jur].variance;
        const tradPart = path[0] ? `<span onclick="goLevel(1,'${path[0]}')">${path[0]}</span> → ` : '';
        document.getElementById('breadcrumb').innerHTML = 
            `<span onclick="goLevel(0)">Traditions</span> → ${tradPart}<span>${jur}</span>`;
    }

    const varStr = variance.length >= 2 ? `PC1: ${(variance[0]*100).toFixed(0)}% · PC2: ${(variance[1]*100).toFixed(0)}%` : '';
    document.getElementById('level-info').textContent = 
        `Level ${currentLevel} · ${entries.length} nodes · ${varStr}`;
}

function getColor(e) {
    if (currentLevel === 0) return sysColors[e.system] || '#4a5580';
    if (currentLevel === 1) {
        const parent = TREE.level0.entries.find(t => t.word === path[0]);
        return parent ? (sysColors[parent.system] || '#4a5580') : '#4a5580';
    }
    // Level 2: color by score
    if (e.cf >= 0.85 && e.sd === 0) return '#cc5de8';
    if (e.score >= 0.75) return '#ff6b6b';
    if (e.score >= 0.60) return '#ffd43b';
    if (e.score >= 0.45) return '#69db7c';
    return '#4a5580';
}

function getRadius(e) {
    if (currentLevel === 0) return 8 + Math.sqrt(e.count) * 1.5;
    if (currentLevel === 1) return 6 + Math.sqrt(e.count) * 2;
    return 3 + e.score * 8;
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    animProgress = Math.min(1, animProgress + 0.04);
    const ease = 1 - Math.pow(1 - animProgress, 3);

    // Grid
    ctx.strokeStyle = '#0f1325';
    ctx.lineWidth = 1;
    for (let i = -1; i <= 1; i += 0.5) {
        const [x1,y1] = toScreen(-1.3,i); const [x2,y2] = toScreen(1.3,i);
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
        const [x3,y3] = toScreen(i,-1.3); const [x4,y4] = toScreen(i,1.3);
        ctx.beginPath(); ctx.moveTo(x3,y3); ctx.lineTo(x4,y4); ctx.stroke();
    }

    // Axes
    ctx.strokeStyle = '#1a1f35';
    ctx.beginPath(); ctx.moveTo(CX-SCALE*1.3,CY); ctx.lineTo(CX+SCALE*1.3,CY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(CX,CY-SCALE*1.3); ctx.lineTo(CX,CY+SCALE*1.3); ctx.stroke();

    // Loading arrows (if available)
    if (loadings.length >= 2) {
        const axNames = TREE.level0.axes;
        const axLabels = {tb:'Trigger',em:'Effect',sd:'Depth',cj:'Cross-Jur',cf:'Friction',asym:'Asymmetry'};
        for (let j = 0; j < axNames.length; j++) {
            const ax = axNames[j];
            const lx = loadings[0][j] * 2.5;
            const ly = loadings[1][j] * 2.5;
            const [sx, sy] = toScreen(lx * ease, ly * ease);
            ctx.beginPath(); ctx.moveTo(CX, CY); ctx.lineTo(sx, sy);
            ctx.strokeStyle = (axColors[ax] || '#4a5580') + '50';
            ctx.lineWidth = 1.5; ctx.stroke();
            ctx.fillStyle = (axColors[ax] || '#4a5580') + '80';
            ctx.font = '9px Inter, system-ui, sans-serif';
            ctx.textAlign = sx > CX ? 'left' : 'right';
            ctx.fillText(axLabels[ax] || ax, sx + (sx>CX?6:-6), sy + 3);
        }
    }

    // Nodes
    entries.forEach(e => {
        const [sx, sy] = toScreen(e.x * ease, e.y * ease);
        const r = getRadius(e);
        const color = getColor(e);
        const isHov = e === hovered;

        // Glow for hovered
        if (isHov) {
            ctx.beginPath(); ctx.arc(sx, sy, r + 8, 0, Math.PI*2);
            ctx.fillStyle = color + '20'; ctx.fill();
        }

        ctx.beginPath(); ctx.arc(sx, sy, r * ease, 0, Math.PI*2);
        ctx.fillStyle = isHov ? '#ffffff' : color;
        ctx.globalAlpha = isHov ? 1 : 0.8;
        ctx.fill();
        ctx.globalAlpha = 1;

        if (isHov) {
            ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
        }

        // Labels
        const label = e.word.length > 25 ? e.word.slice(0,23)+'…' : e.word;
        ctx.fillStyle = isHov ? '#ffffff' : '#8b93b0';
        ctx.font = currentLevel === 0 ? 'bold 11px Inter, system-ui, sans-serif' : 
                   (r > 6 || isHov ? '9px SF Mono, monospace' : '');
        if (ctx.font) {
            ctx.textAlign = 'center';
            ctx.fillText(label, sx, sy + r * ease + 12);
            if (currentLevel === 0 && e.count) {
                ctx.fillStyle = '#4a5580';
                ctx.font = '9px SF Mono, monospace';
                ctx.fillText(`${e.count} words · ${e.jurs} jurs`, sx, sy + r * ease + 23);
            }
        }
    });

    // Level hint
    if (currentLevel < 2) {
        ctx.fillStyle = '#2a3050';
        ctx.font = '10px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(currentLevel === 0 ? 'click tradition to see jurisdictions' : 'click jurisdiction to see words', CX, H - 70);
    }

    requestAnimationFrame(draw);
}

function showTooltip(e) {
    const tip = document.getElementById('tooltip');
    const axNames = ['tb','em','sd','cj','cf','asym'];
    const axLabels = {tb:'TRIGGER',em:'EFFECT',sd:'DEPTH',cj:'CROSS-J',cf:'FRICTION',asym:'ASYMM'};
    const taxHtml = axNames.filter(a => e[a] !== undefined).map(a =>
        `<div class="tax"><div class="tax-label">${axLabels[a]}</div><div class="tax-val" style="color:${axColors[a]}">${e[a].toFixed(2)}</div></div>`
    ).join('');

    let extra = '';
    if (currentLevel === 0) extra = `${e.count} words · ${e.jurs} jurisdictions · ${e.system}`;
    else if (currentLevel === 1) extra = `${e.count} words · score: ${e.score.toFixed(3)}`;
    else extra = `${e.domain || 'family'} · score: ${e.score.toFixed(3)}`;

    tip.innerHTML = `
        <div class="tw" style="color:${getColor(e)}">${e.word}</div>
        <div class="tj">${extra}</div>
        ${e.notes ? `<div class="tn">${e.notes}</div>` : ''}
        <div class="taxes">${taxHtml}</div>
    `;
    tip.style.display = 'block';
    tip.style.left = Math.min(mx+20, W-420) + 'px';
    tip.style.top = Math.min(my+15, H-220) + 'px';
}

cv.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    hovered = null;
    for (const entry of entries) {
        const [sx, sy] = toScreen(entry.x * Math.min(1, animProgress), entry.y * Math.min(1, animProgress));
        const r = getRadius(entry);
        const dx = mx-sx, dy = my-sy;
        if (dx*dx+dy*dy < (r+6)*(r+6)) { hovered = entry; break; }
    }
    if (hovered) { showTooltip(hovered); cv.style.cursor = 'pointer'; }
    else { document.getElementById('tooltip').style.display = 'none'; cv.style.cursor = 'crosshair'; }
});

cv.addEventListener('click', e => {
    if (!hovered) return;
    if (currentLevel === 0) {
        goLevel(1, hovered.word);
    } else if (currentLevel === 1) {
        goLevel(2, hovered.word);
    }
});

cv.addEventListener('contextmenu', e => {
    e.preventDefault();
    if (currentLevel === 2) goLevel(1, path[0]);
    else if (currentLevel === 1) goLevel(0);
});

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        if (currentLevel === 2) goLevel(1, path[0]);
        else if (currentLevel === 1) goLevel(0);
    }
});

goLevel(0);
draw();
</script>
</body>
</html>
