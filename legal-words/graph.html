 7, "material change": 6, "changed circumstances": 6, "default judgment": 6, "material change of circumstances": 4, "purge": 4, "frivolous": 4, "disobedience": 4, "willful violation": 4, "initial disclosures": 4, "not well grounded in fact": 3, "financial affidavit": 3, "intentional disobedience": 3, "substantial change in circumstances": 3, "present ability": 3, "coercive": 2, "bad faith": 2, "financial resources": 2, "material and substantial change": 2, "as are just": 2, "interference with custody": 2, "financial declaration": 2, "substantial change of circumstances": 2, "well grounded in fact": 2, "reasonable amount": 2}};

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H, CX, CY;
function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; CX = W/2; CY = H/2; layout(); }

const cColors = {
    fee_sanctions:'#4dabf7', filing_sanctions:'#74c0fc', support_modification:'#69db7c',
    contempt_standard:'#ff6b6b', purge_standard:'#ff922b', dissipation:'#ffd43b',
    custody_enforcement:'#e599f7', financial_disclosure:'#38d9a9', constitutional_floor:'#748ffc',
    discovery_enforcement:'#20c997'
};
const tierColor = {NUCLEAR:'#ff6b6b', HIGH:'#ffd43b', MEDIUM:'#69db7c', GAP:'#cc5de8'};

let nodes = [];
let conceptNodes = [];
let edgeList = [];
let filter = 'all';
let hovered = null;
let dragging = null;
let mx = 0, my = 0;

function layout() {
    conceptNodes = [];
    nodes = [];
    edgeList = [];

    const conceptNames = Object.keys(G.concepts);
    const R = Math.min(W, H) * 0.34;

    // Place concepts in a circle
    conceptNames.forEach((name, i) => {
        const angle = (i / conceptNames.length) * Math.PI * 2 - Math.PI / 2;
        conceptNodes.push({
            id: name, label: G.concepts[name].label,
            x: CX + Math.cos(angle) * R, y: CY + Math.sin(angle) * R,
            angle: angle, color: cColors[name] || '#4a5580', radius: 14
        });
    });

    // Place words near their concept
    const conceptMap = {};
    conceptNodes.forEach(c => { conceptMap[c.id] = c; });

    // Unassigned words go to center
    const unassigned = [];

    G.words.forEach((w, idx) => {
        if (filter === 'nuclear' && w.tier !== 'NUCLEAR') return;
        if (filter === 'high' && w.score < 0.60) return;
        if (filter === 'foreign' && !(w.sd === 0 && w.cf >= 0.85)) return;

        const isFgn = w.sd === 0 && w.cf >= 0.85;
        const concept = w.concepts && w.concepts[0] ? w.concepts[0] : null;
        const cNode = concept ? conceptMap[concept] : null;

        let nx, ny;
        if (cNode) {
            // Position radially outward from concept, scattered by score
            const spread = 40 + (1 - w.score) * 120;
            const jitter = (idx * 2.3) % (Math.PI * 2);
            nx = cNode.x + Math.cos(cNode.angle + jitter * 0.3) * spread + (Math.random() - 0.5) * 30;
            ny = cNode.y + Math.sin(cNode.angle + jitter * 0.3) * spread + (Math.random() - 0.5) * 30;
        } else if (isFgn) {
            // Foreign words form an inner ring
            const fIdx = nodes.filter(n => n.foreign).length;
            const fAngle = (fIdx / 20) * Math.PI * 2;
            const fR = R * 0.4;
            nx = CX + Math.cos(fAngle) * fR + (Math.random() - 0.5) * 40;
            ny = CY + Math.sin(fAngle) * fR + (Math.random() - 0.5) * 40;
        } else {
            // Unassigned — scatter in middle
            const uAngle = Math.random() * Math.PI * 2;
            const uR = Math.random() * R * 0.25;
            nx = CX + Math.cos(uAngle) * uR;
            ny = CY + Math.sin(uAngle) * uR;
        }

        nodes.push({
            id: w.word, x: nx, y: ny,
            radius: isFgn ? 5 + w.cf * 6 : 2 + w.score * 10,
            color: isFgn ? '#cc5de8' : (tierColor[w.tier] || '#4a5580'),
            score: w.score, tier: w.tier, foreign: isFgn,
            cf: w.cf, em: w.em, tb: w.tb, asym: w.asym,
            jurs: w.jurs, notes: w.notes, concept: concept,
            conceptColor: cNode ? cNode.color : null
        });
    });

    // Build edges
    const nodeMap = {};
    nodes.forEach(n => { nodeMap[n.id] = n; });
    G.edges.forEach(e => {
        if (nodeMap[e.from] && nodeMap[e.to]) {
            edgeList.push({ from: nodeMap[e.from], to: nodeMap[e.to], concept: e.concept });
        }
    });

    document.getElementById('s-words').textContent = nodes.length;
    document.getElementById('s-concepts').textContent = conceptNodes.length;
    document.getElementById('s-foreign').textContent = nodes.filter(n => n.foreign).length;
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    // Draw faint concept radial lines
    conceptNodes.forEach(c => {
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.lineTo(c.x, c.y);
        ctx.strokeStyle = c.color + '15';
        ctx.lineWidth = 1;
        ctx.stroke();
    });

    // Draw edges
    edgeList.forEach(e => {
        ctx.beginPath();
        ctx.moveTo(e.from.x, e.from.y);
        ctx.lineTo(e.to.x, e.to.y);
        const ec = e.concept && cColors[e.concept] ? cColors[e.concept] : '#4a5580';
        ctx.strokeStyle = ec + '30';
        ctx.lineWidth = 0.7;
        ctx.stroke();
    });

    // Draw word-to-concept connector lines
    nodes.forEach(n => {
        if (n.conceptColor) {
            const cNode = conceptNodes.find(c => c.id === n.concept);
            if (cNode) {
                ctx.beginPath();
                ctx.moveTo(n.x, n.y);
                ctx.lineTo(cNode.x, cNode.y);
                ctx.strokeStyle = n.conceptColor + '18';
                ctx.lineWidth = 0.4;
                ctx.stroke();
            }
        }
    });

    // Draw word nodes
    nodes.forEach(n => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
        ctx.fillStyle = n === hovered ? '#ffffff' : n.color;
        ctx.globalAlpha = n === hovered ? 1 : (n.foreign ? 0.9 : 0.7);
        ctx.fill();
        ctx.globalAlpha = 1;

        if (n.radius > 8 || n === hovered) {
            ctx.fillStyle = n === hovered ? '#ffffff' : '#8b93b0';
            ctx.font = '9px SF Mono, Fira Code, monospace';
            ctx.textAlign = 'center';
            ctx.fillText(n.id.length > 20 ? n.id.slice(0,18)+'…' : n.id, n.x, n.y + n.radius + 10);
        }
    });

    // Draw concept labels
    conceptNodes.forEach(c => {
        // Concept circle
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
        ctx.fillStyle = c.color + '40';
        ctx.fill();
        ctx.strokeStyle = c.color;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Label
        ctx.fillStyle = c.color;
        ctx.font = 'bold 11px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        const labelY = c.y < CY ? c.y - c.radius - 8 : c.y + c.radius + 14;
        ctx.fillText(c.label, c.x, labelY);
    });

    // Center label
    ctx.fillStyle = '#2a3050';
    ctx.font = '10px SF Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('unassigned / cross-concept', CX, CY + 4);
}

function showTooltip(n) {
    const tip = document.getElementById('tooltip');
    const jurStr = n.jurs ? n.jurs.slice(0, 8).join(', ') + (n.jurs.length > 8 ? ` +${n.jurs.length-8}` : '') : '';
    tip.innerHTML = `
        <div class="tw" style="color:${n.color}">${n.id}</div>
        <div class="tj">${jurStr} · ${n.tier} · score: ${n.score.toFixed(3)}${n.concept ? ' · concept: '+n.concept : ''}</div>
        <div class="tn">${n.notes || ''}</div>
        <div class="taxes">
            <div class="tax"><div class="tax-label">TRIGGER</div><div class="tax-val" style="color:#4dabf7">${(n.tb||0).toFixed(2)}</div></div>
            <div class="tax"><div class="tax-label">EFFECT</div><div class="tax-val" style="color:#ff6b6b">${(n.em||0).toFixed(2)}</div></div>
            <div class="tax"><div class="tax-label">FRICTION</div><div class="tax-val" style="color:#cc5de8">${(n.cf||0).toFixed(2)}</div></div>
            <div class="tax"><div class="tax-label">ASYMM</div><div class="tax-val" style="color:#ff922b">${(n.asym||0).toFixed(2)}</div></div>
        </div>
    `;
    tip.style.display = 'block';
    const tx = mx + 20 > W - 440 ? mx - 440 : mx + 20;
    tip.style.left = tx + 'px';
    tip.style.top = Math.min(my + 15, H - 250) + 'px';
}

function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.controls button:not(#btn-fg)').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    layout();
}

function toggleForeign() {
    document.getElementById('foreign-panel').classList.toggle('open');
    document.getElementById('btn-fg').classList.toggle('active');
}

function buildForeignPanel() {
    const args = {
        'umgangessabotage': '"Your Honor, the Swedish legal system has a word for what this parent is doing — umgängessabotage, contact sabotage. We don\'t have that word in English, which is precisely why this behavior keeps happening unaddressed."',
        'agunah (עגונה)': '"The concept of agunah — a woman chained to a marriage by her husband\'s refusal to grant a religious divorce — has no English equivalent. That absence of language is itself an absence of remedy."',
        'pagpapawalang-bisa': '"The Philippines ran an entire nation on this word — pagpapawalang-bisa, rendering without validity — because they had no divorce for over a century. When a legal system lacks a word, it lacks the concept. When it lacks the concept, it lacks the remedy."',
        '冷静期 (lěngjìng qī)': '"China\'s mandatory 30-day cooling-off period — 冷静期 — reduced divorces by 33-42%. The concept of forced reflection before dissolution has no equivalent in American law, where filing and finality are treated as the same act."',
        'shinken (親権)': '"Japan was the last G7 country with mandatory sole custody. Their word shinken — parental authority vested entirely in one parent — carried an assumption we refuse to name: that one parent must lose everything."',
        'recel de communauté': '"In France, hiding assets doesn\'t result in an add-back. It results in total forfeiture of the concealed portion — recel de communauté. We call it dissipation. Their word has teeth ours doesn\'t."',
        'Versorgungsausgleich': '"In Germany, the court splits pensions automatically — no one has to ask. They call it Versorgungsausgleich. We make parties fight for QDROs. The missing default IS the inequity."',
        'get (גט)': '"Under Israeli law, a husband holds absolute veto over divorce through the get requirement. No secular legal system gives one party that power. The word names a structural asymmetry our system pretends doesn\'t exist."',
        'lijfsdwang': '"Dutch law has lijfsdwang — body-compulsion — imprisonment specifically for willful non-payment of support. Not contempt. Not debt collection. A named, purpose-built enforcement tool. We lack it."',
        'Betreuungsunterhalt': '"Swiss law compensates the caregiver\'s lost earnings as part of child support — Betreuungsunterhalt. American law treats caregiving as invisible labor. The missing word hides the missing compensation."',
        'mu\'sir': '"Islamic law names the person who cannot pay — mu\'sir — and grants them respite as a matter of right, not judicial discretion. We have no word for this. Our system treats inability and unwillingness as the same thing."',
        'mamzer (ממזר)': '"The concept of mamzer — a child stigmatized for ten generations by the circumstances of their parents\' union — has no modern equivalent because modern law rejects the premise. But the word reveals what happens when status is inherited: the child bears the cost of the parents\' conduct forever."',
        'konin todoke fuji uketsuke': '"In Japan, you can file a pre-emptive block — konin todoke fuji uketsuke — to prevent your spouse from forging your signature on a divorce form at city hall. The concept only exists because Japanese divorce can be completed without a court. The word reveals the system."',
        '彩礼 (cǎilǐ)': '"China\'s 2024 Supreme Court interpretation of 彩礼 (bride price) created return rules based on marriage duration and cohabitation. Neither dowry nor gift, it occupies a legal category that English simply does not have."',
    };

    const panel = document.getElementById('foreign-panel');
    const words = G.foreign.filter(w => w.cf >= 0.90).sort((a,b) => b.cf - a.cf || b.score - a.score);
    panel.innerHTML = `<h2>Foreign Arguments — The Missing Detector</h2>
        <p style="color:#6b7394;font-size:11px;margin-bottom:14px;line-height:1.5">
        The argument isn't "adopt foreign law." The argument is: <em>"the phenomenon exists — your system just lacks the detector."</em> These words name what English law cannot see.</p>
        ${words.map(w => `<div class="fcard">
            <div class="fw">${w.word}</div>
            <div class="fj">${w.jur} · friction: ${w.cf.toFixed(2)} · score: ${w.score.toFixed(3)}</div>
            <div class="fn">${w.notes}</div>
            ${args[w.word] ? `<div class="farg">${args[w.word]}</div>` : ''}
        </div>`).join('')}`;
}

cv.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    hovered = null;
    for (const n of nodes) {
        const dx = mx - n.x, dy = my - n.y;
        if (dx*dx + dy*dy < (n.radius+5)*(n.radius+5)) { hovered = n; break; }
    }
    if (hovered) { showTooltip(hovered); cv.style.cursor = 'pointer'; }
    else { document.getElementById('tooltip').style.display = 'none'; cv.style.cursor = 'default'; }
    if (dragging) { dragging.x = mx; dragging.y = my; }
});
cv.addEventListener('mousedown', e => {
    for (const n of nodes) {
        const dx = mx - n.x, dy = my - n.y;
        if (dx*dx + dy*dy < (n.radius+5)*(n.radius+5)) { dragging = n; break; }
    }
});
cv.addEventListener('mouseup', () => { dragging = null; });

resize();
window.addEventListener('resize', resize);
buildForeignPanel();

function loop() { draw(); requestAnimationFrame(loop); }
loop();
</script>
