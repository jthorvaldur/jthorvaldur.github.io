<script>
const graphData = {"foreign_words": [{"word": "agunah (עגונה)", "jur": "IL-ISR", "score": 0.54, "cf": 1, "asym": 0.95, "tb": 0.3, "em": 0.9, "notes": "Translation: chained-woman. A woman whose husband refuses to grant a get (religious divorce). She is TRAPPED — cannot remarry, children from new relationship are mamzerim (illegitimate for generations). No Western equivalent. The most extreme example of one party holding absolute power over divorce."}, {"word": "mamzer (ממזר)", "jur": "IL-ISR", "score": 0.48999998, "cf": 1, "asym": 0.9, "tb": 0.1, "em": 0.9, "notes": "Translation: illegitimate. Child of an adulterous union under Jewish law. Cannot marry another Jew. Stigma persists for TEN GENERATIONS. No modern Western equivalent. The concept that a child's marital options are PERMANENTLY restricted by parents' status is alien to Western law."}, {"word": "konin todoke fuji uketsuke", "jur": "JP", "score": 0.45, "cf": 1, "asym": 0.8, "tb": 0.2, "em": 0.7, "notes": "Translation: marriage-registration-non-acceptance-notification. Completely foreign concept. Pre-emptive filing to prevent unauthorized divorce. Necessary because Japanese divorce can be completed by forging a signature on a form. No equivalent anywhere."}, {"word": "umgangessabotage", "jur": "SE", "score": 0.41, "cf": 1, "asym": 0.9, "tb": 0.3, "em": 0.4, "notes": "Contact sabotage. No English equivalent. The missing word IS the argument."}, {"word": "mu'sir", "jur": "ISLAMIC", "score": 0.405, "cf": 1, "asym": 0.85, "tb": 0.3, "em": 0.4, "notes": "One unable to pay. Entitled to respite. No English equivalent."}, {"word": "pagpapawalang-bisa", "jur": "PH", "score": 0.59999996, "cf": 0.95, "asym": 0.85, "tb": 0.65, "em": 0.95, "notes": "Filipino: \"rendering without validity.\" No single English equivalent. Carries the entire weight of marital dissolution in a country that had no divorce for over a century. Nuclear-level trigger for nullity petitions."}, {"word": "冷静期 (lěngjìng qī)", "jur": "CN", "score": 0.5825, "cf": 0.95, "asym": 0.9, "tb": 0.6, "em": 0.9, "notes": "Chinese: \"cooling-off period.\" Globally unique 30-day mandatory waiting period for registration divorce. Either party can unilaterally withdraw. No Western equivalent. Reduced divorces 33-42%. Extreme asymmetry: traps DV victims."}, {"word": "shinken (親権)", "jur": "JP", "score": 0.5675, "cf": 0.95, "asym": 0.9, "tb": 0.5, "em": 0.9, "notes": "Translation: parental-authority. Until 2026, Japan was the ONLY G7 country with mandatory sole custody after divorce. One parent gets ALL authority; the other parent has NO legal relationship with the child. The most extreme custody system in the developed world."}, {"word": "get (גט)", "jur": "IL-ISR", "score": 0.5525, "cf": 0.95, "asym": 0.95, "tb": 0.4, "em": 0.9, "notes": "Translation: bill-of-divorce. A physical document husband must VOLUNTARILY give to wife. Without it, divorce is invalid under Israeli law for Jews. The husband holds absolute veto power over divorce. No equivalent in any secular legal system."}, {"word": "Versorgungsausgleich", "jur": "DE", "score": 0.5275, "cf": 0.95, "asym": 0.5, "tb": 0.5, "em": 0.9, "notes": "Translation: pension-equalization. No English equivalent. AUTOMATIC — court does it without anyone asking. In US, parties must request QDRO. In Germany, the judge splits pensions by default."}, {"word": "recel de communauté", "jur": "FR", "score": 0.5275, "cf": 0.95, "asym": 0.9, "tb": 0.3, "em": 0.9, "notes": "Translation: concealment-of-community. NUCLEAR: spouse who hides assets FORFEITS their share of the hidden assets. No US equivalent — in US, dissipation results in add-back. In France, it results in TOTAL FORFEITURE of the concealed portion."}, {"word": "彩礼 (cǎilǐ)", "jur": "CN", "score": 0.5275, "cf": 0.95, "asym": 0.7, "tb": 0.55, "em": 0.8, "notes": "Chinese: \"bride price.\" Customary pre-marriage property transfer with no Western legal equivalent. Neither dowry nor gift. 2024 SPC interpretation creates nuanced return rules. Amounts can be hundreds of thousands of yuan. Extremely current — 2024 Supreme People's Court interpretation."}, {"word": "illoyale Vermögensminderung", "jur": "DE", "score": 0.48250002, "cf": 0.95, "asym": 0.7, "tb": 0.3, "em": 0.8, "notes": "Translation: disloyal-asset-reduction. No single English term. The concept of \"disloyalty\" to the marriage through financial waste. Combines bad faith + dissipation + gift in one statutory phrase."}, {"word": "lijfsdwang", "jur": "NL", "score": 0.48250002, "cf": 0.95, "asym": 0.7, "tb": 0.3, "em": 0.8, "notes": "Translation: body-compulsion. Physical detention to force compliance with support orders. No English equivalent — conceptually between contempt and debtor's prison. Dutch law allows IMPRISONMENT specifically for willful non-payment of alimony."}, {"word": "Betreuungsunterhalt", "jur": "CH", "score": 0.4675, "cf": 0.95, "asym": 0.6, "tb": 0.4, "em": 0.7, "notes": "Translation: care-contribution. Since 2017, Swiss child support includes a component that COMPENSATES THE CAREGIVER for the economic cost of personally caring for the child. Not just child's needs — it values the parent's caregiving labor. No English equivalent. Revolutionary concept."}, {"word": "stridhan", "jur": "IN-HMA", "score": 0.4575, "cf": 0.95, "asym": 0.7, "tb": 0.3, "em": 0.7, "notes": "Translation: woman's-property. Property received by a woman as marriage gifts. Exclusively hers — husband has no claim. No Western equivalent. Conceptually opposite to community property — stridhan is NEVER shared."}, {"word": "Errungenschaftsbeteiligung", "jur": "CH", "score": 0.4575, "cf": 0.95, "asym": 0.5, "tb": 0.4, "em": 0.7, "notes": "Translation: participation-in-acquests. Default Swiss property regime. Each spouse keeps their own property but shares in the SURPLUS of what was acquired during marriage. More refined than US community property or equitable distribution — only the NET GAIN is shared."}, {"word": "giftorättsgods", "jur": "SE", "score": 0.4575, "cf": 0.95, "asym": 0.5, "tb": 0.4, "em": 0.7, "notes": "Translation: marital-rights-property. No English equivalent. The concept of property that carries a \"marital right\" embedded in it — the other spouse has an inherent claim just by being married."}, {"word": "mut'ah (متعة)", "jur": "AE", "score": 0.4575, "cf": 0.95, "asym": 0.7, "tb": 0.3, "em": 0.7, "notes": "Translation: consolation-gift/enjoyment-compensation. Additional payment from husband to wife BEYOND mahr for the emotional harm of divorce. No Western equivalent. It is compensation for the loss of marriage itself — a concept that does not exist in Western law."}, {"word": "mensetsu kōshō (面接交渉)", "jur": "JP", "score": 0.4175, "cf": 0.95, "asym": 0.8, "tb": 0.3, "em": 0.5, "notes": "Translation: face-meeting-negotiation. Japanese \"visitation.\" Almost impossible to enforce. Japan has no mechanism to compel a custodial parent to allow contact. The non-custodial parent effectively disappears from the child's life."}, {"word": "lobola / ilobolo", "jur": "ZA", "score": 0.4075, "cf": 0.95, "asym": 0.5, "tb": 0.3, "em": 0.6, "notes": "Translation: bride-wealth. Traditional African customary payment (historically cattle) from groom's family to bride's family. Creates legal obligations. Recognized by statute since 1998. No Western equivalent — conceptually between Islamic mahr and a gift, but given to the bride's FAMILY, not the bride."}, {"word": "Umgangspfleger", "jur": "DE", "score": 0.3925, "cf": 0.95, "asym": 0.5, "tb": 0.2, "em": 0.6, "notes": "Translation: contact-curator. Court-appointed facilitator who enforces contact between child and parent. No US equivalent — combines guardian ad litem + supervised visitation coordinator + enforcement officer in one role."}, {"word": "Pflichtteil", "jur": "DE", "score": 0.37, "cf": 0.95, "asym": 0.8, "tb": 0.25, "em": 0.35, "notes": "Duty-portion. Children cannot be fully disinherited. No US equivalent except Louisiana."}, {"word": "ubuntu", "jur": "ZA", "score": 0.3625, "cf": 0.95, "asym": 0.3, "tb": 0.3, "em": 0.5, "notes": "Translation: humaneness/\"I am because we are.\" Nguni Bantu philosophy incorporated into South African constitutional law. Used in family law to emphasize communal obligations over individual rights. No equivalent in any other legal system."}, {"word": "capitis deminutio", "jur": "LATIN", "score": 0.3475, "cf": 0.95, "asym": 0.8, "tb": 0.2, "em": 0.3, "notes": "Loss of family status. No modern equivalent. Parental erasure has no legal category."}, {"word": "talaq", "jur": "PH", "score": 0.5825, "cf": 0.9, "asym": 0.95, "tb": 0.5, "em": 0.95, "notes": "Arabic (Philippine Muslim law): husband's unilateral repudiation. Existed in PH law since 1977, making Muslim Filipinos the only citizens with divorce access. Extreme asymmetry — only husband can initiate talaq."}, {"word": "Lupong Tagapamayapa", "jur": "PH", "score": 0.55, "cf": 0.9, "asym": 0.75, "tb": 0.8, "em": 0.7, "notes": "Filipino: \"peace-making council.\" Uniquely Filipino institution — mandatory community mediation panel. No Western equivalent. Failure to go through Lupon is grounds for case dismissal. High procedural leverage."}, {"word": "Katarungang Pambarangay", "jur": "PH", "score": 0.53499997, "cf": 0.9, "asym": 0.7, "tb": 0.75, "em": 0.7, "notes": "Filipino: \"barangay justice.\" The entire mandatory community dispute resolution system. No Western parallel — it is a legally mandated village-level justice system that is a prerequisite to court action."}, {"word": "mahr (مهر)", "jur": "SA", "score": 0.53, "cf": 0.9, "asym": 0.8, "tb": 0.5, "em": 0.8, "notes": "Translation: dower/bride-price. Mandatory payment from husband to wife. No Western equivalent — it is the wife's ABSOLUTE right, not negotiable. Can be deferred (payable on divorce) creating a financial disincentive to divorce. Conceptually opposite to Western prenup."}, {"word": "réserve héréditaire", "jur": "FR", "score": 0.52, "cf": 0.9, "asym": 0.7, "tb": 0.4, "em": 0.9, "notes": "Translation: hereditary-reserve. Children cannot be disinherited. 1 child = 50%, 2 children = 66%, 3+ children = 75% reserved. No US equivalent except Louisiana. The concept of a child's ENTITLEMENT to inheritance does not exist in common law."}, {"word": "prisão civil por alimentos", "jur": "BR", "score": 0.52, "cf": 0.9, "asym": 0.9, "tb": 0.3, "em": 0.9, "notes": "Translation: civil-imprisonment-for-support. Brazil CONSTITUTIONALLY permits imprisonment for support non-payment — the only civil debt exception. 30-90 days. No bail. The harshest support enforcement in the Western hemisphere."}, {"word": "khul", "jur": "PH", "score": 0.5195, "cf": 0.9, "asym": 0.8, "tb": 0.4, "em": 0.85, "notes": "Arabic (Philippine Muslim law): wife-initiated divorce by returning mahr. Wife must purchase her freedom — economic cost absent in Western divorce. Creates gender-asymmetric exit mechanism."}, {"word": "精神损害赔偿 (jīngshén sǔnhài péicháng)", "jur": "CN", "score": 0.513, "cf": 0.9, "asym": 0.7, "tb": 0.5, "em": 0.8, "notes": "Chinese: \"emotional/mental damages compensation.\" Codified right to claim monetary compensation for emotional suffering caused by marital fault. Distinct from Western IIED/NIED — specifically tied to marital fault categories. No English equivalent for the specific statutory mechanism."}, {"word": "khul (خلع)", "jur": "SA", "score": 0.51, "cf": 0.9, "asym": 0.8, "tb": 0.4, "em": 0.8, "notes": "Translation: wife-release. Wife buys her way out of marriage by returning mahr. No Western equivalent — the concept of a wife PAYING to get divorced does not exist in Western law. Creates financial barrier to wife-initiated divorce."}, {"word": "wilayah (ولاية)", "jur": "SA", "score": 0.51, "cf": 0.9, "asym": 0.8, "tb": 0.4, "em": 0.8, "notes": "Translation: guardianship/authority. Father's legal authority over child even when child is physically with mother (hadanah). Includes power to consent to child's marriage, manage property, authorize travel. No Western equivalent for this retained paternal authority."}, {"word": "pérdida de patria potestad", "jur": "MX", "score": 0.51, "cf": 0.9, "asym": 0.8, "tb": 0.3, "em": 0.9, "notes": "Translation: loss-of-fatherland-authority. Total forfeiture of parental rights for specified causes. Key: non-payment of support for 90+ days is AUTOMATIC grounds. In US, termination of parental rights requires a separate, extremely high-bar proceeding. Mexico makes it statutory and automatic for support default."}, {"word": "violazione degli obblighi di assistenza familiare", "jur": "IT", "score": 0.51, "cf": 0.9, "asym": 0.8, "tb": 0.3, "em": 0.9, "notes": "Translation: violation-of-family-assistance-obligations. Criminal offense for not paying maintenance. Up to 1 year imprisonment. Like France's system but as a specific criminal code article. US treats support default as civil contempt; Italy makes it a CRIME."}, {"word": "non-représentation d'enfant", "jur": "FR", "score": 0.51, "cf": 0.9, "asym": 0.8, "tb": 0.3, "em": 0.9, "notes": "Translation: non-presentation-of-child. CRIMINAL offense for refusing to hand over a child. Up to 1 year prison + €15K fine. No US equivalent — US treats custody interference as civil contempt. France makes it a CRIME."}, {"word": "Zugewinnausgleich", "jur": "DE", "score": 0.505, "cf": 0.9, "asym": 0.6, "tb": 0.5, "em": 0.8, "notes": "Translation: gain-equalization. No single English word. Default German property regime — mathematical formula. Half the difference in accrued gains during marriage. More mechanical than US equitable distribution."}, {"word": "addebito", "jur": "IT", "score": 0.505, "cf": 0.9, "asym": 0.8, "tb": 0.4, "em": 0.8, "notes": "Translation: attribution/imputation. Italian fault-attribution in separation. The \"guilty\" spouse LOSES inheritance rights and maintenance rights. No US equivalent — US no-fault divorce eliminated fault consequences. Italy preserves fault with devastating financial penalties."}, {"word": "prestation compensatoire", "jur": "FR", "score": 0.505, "cf": 0.9, "asym": 0.6, "tb": 0.5, "em": 0.8, "notes": "Translation: compensatory-benefit. NOT alimony. One-time capital payment to offset economic disparity caused by divorce. Conceptually different from US maintenance — it is compensation for the marriage's economic effect, not ongoing support."}, {"word": "tafriq lil-darar (تفريق للضرر)", "jur": "AE", "score": 0.5, "cf": 0.9, "asym": 0.7, "tb": 0.4, "em": 0.8, "notes": "Translation: separation-for-harm. Court-ordered divorce when harm is proven. Key concept: in Islamic law, HARM (darar) is the central divorce ground — not \"irreconcilable differences.\" The wife must prove actual harm, not just unhappiness."}, {"word": "astreinte", "jur": "FR", "score": 0.465, "cf": 0.9, "asym": 0.6, "tb": 0.4, "em": 0.7, "notes": "Translation: coercive-daily-fine. France has NO contempt. Instead, uses daily accumulating fines. Key distinction from US: astreinte is prospective (compels future compliance), not punitive (punishes past disobedience)."}, {"word": "Zwangsgeld", "jur": "DE", "score": 0.46, "cf": 0.9, "asym": 0.6, "tb": 0.4, "em": 0.7, "notes": "Translation: coercive-fine. Germany has NO contempt power. Instead uses graduated coercive fines. The conceptual gap: German law distinguishes between compelling future compliance (Zwangsgeld) and punishing past disobedience (Ordnungsgeld). English/US law merges both into \"contempt.\""}, {"word": "assegno divorzile", "jur": "IT", "score": 0.46, "cf": 0.9, "asym": 0.6, "tb": 0.4, "em": 0.7, "notes": "Translation: divorce-allowance. Since 2018, Italian courts assess this on COMPENSATORY criteria — valuing the spouse's sacrifice for the family, not just need. Conceptually closer to French prestation compensatoire than US alimony."}, {"word": "wisaryo (위자료)", "jur": "KR", "score": 0.45, "cf": 0.9, "asym": 0.7, "tb": 0.3, "em": 0.7, "notes": "Translation: consolation-money. Korean concept of damages paid by the at-fault spouse for emotional distress. Not alimony, not property division — a separate claim for emotional harm caused by the reason for divorce (adultery, cruelty). No US equivalent."}, {"word": "ouderverstoting", "jur": "NL", "score": 0.45, "cf": 0.9, "asym": 0.7, "tb": 0.3, "em": 0.7, "notes": "Translation: parent-repudiation. Dutch term for parental alienation. More visceral than English — literally means the child \"repudiates/expels\" the parent. Captures the child's perspective, not just the alienating parent's behavior."}, {"word": "vederlag", "jur": "SE", "score": 0.45, "cf": 0.9, "asym": 0.7, "tb": 0.3, "em": 0.7, "notes": "Translation: compensation/recompense. Swedish statutory remedy for marital property dissipation. Closest English is \"add-back\" but vederlag is a claim for compensation, not notional restoration."}, {"word": "kyōgi rikon (協議離婚)", "jur": "JP", "score": 0.425, "cf": 0.9, "asym": 0.5, "tb": 0.4, "em": 0.6, "notes": "Translation: agreement-divorce. Divorce by signing a form at city hall. No court, no lawyer, no waiting period. 87% of Japanese divorces. Nothing like this exists in any Western country. Can be completed in minutes."}, {"word": "KESB", "jur": "CH", "score": 0.42499998, "cf": 0.9, "asym": 0.5, "tb": 0.3, "em": 0.7, "notes": "Translation: Child-and-Adult-Protection-Authority. Administrative body (not a court) with power to strip parental authority, appoint guardians, order child removal. No US equivalent — CPS is investigative; KESB has JUDICIAL POWER without being a court."}, {"word": "Familieretshuset", "jur": "DK", "score": 0.405, "cf": 0.9, "asym": 0.4, "tb": 0.5, "em": 0.5, "notes": "Translation: Family-Law-House. Unique Danish institution created 2019. An administrative body (not a court) that handles family disputes as first instance. No equivalent in any English-speaking country. Combines mediation + investigation + decision-making."}, {"word": "ketubbah (כתובה)", "jur": "IL-ISR", "score": 0.405, "cf": 0.9, "asym": 0.5, "tb": 0.3, "em": 0.6, "notes": "Translation: marriage-contract. Ancient Jewish contract specifying husband's financial obligations. Similar conceptually to Islamic mahr but embedded in religious law. No secular Western equivalent — closest is a prenup but ketubbah is mandatory and standardized."}, {"word": "hyeonui ihon (협의이혼)", "jur": "KR", "score": 0.39, "cf": 0.9, "asym": 0.4, "tb": 0.4, "em": 0.5, "notes": "Translation: agreement-divorce. Like Japanese kyōgi rikon but with mandatory cooling-off (3 months with children, 1 month without) and court confirmation hearing. A middle ground between Japanese form-filing and Western court proceedings."}, {"word": "hakam (حكم)", "jur": "AE", "score": 0.375, "cf": 0.9, "asym": 0.4, "tb": 0.3, "em": 0.5, "notes": "Translation: family-arbitrator. Court-appointed arbitrators from each spouse's family. Mandatory reconciliation step. Different from Western mediation — hakam have authority to recommend divorce terms, not just facilitate discussion."}, {"word": "legitieme portie", "jur": "NL", "score": 0.36249998, "cf": 0.9, "asym": 0.8, "tb": 0.25, "em": 0.35, "notes": "Legitimate portion. Dutch forced heirship. The word that started the dead-person analysis."}, {"word": "Restschuldbefreiung", "jur": "DE", "score": 0.3475, "cf": 0.9, "asym": 0.75, "tb": 0.2, "em": 0.35, "notes": "Remaining-debt-liberation. German insolvency discharge. No family law equivalent anywhere."}, {"word": "wali", "jur": "PH", "score": 0.414, "cf": 0.88, "asym": 0.5, "tb": 0.35, "em": 0.6, "notes": "Arabic (Philippine Muslim law): mandatory marriage guardian. No Western equivalent. Absence of wali consent can invalidate a Muslim marriage. Kinship hierarchy determines wali appointment."}, {"word": "idda", "jur": "PH", "score": 0.4065, "cf": 0.88, "asym": 0.65, "tb": 0.3, "em": 0.55, "notes": "Arabic (Philippine Muslim law): mandatory waiting period after divorce (wife only). Unilateral burden — only the wife must observe. Religiously mandated; serves paternity and spiritual purposes. Distinct from Western waiting periods."}, {"word": "过错方 (guòcuò fāng)", "jur": "CN", "score": 0.565, "cf": 0.85, "asym": 0.75, "tb": 0.7, "em": 0.85, "notes": "Chinese: \"party at fault.\" Triggers both unfavorable property division and damages liability. Broader than Western fault: includes catch-all \"other major faults.\" The concept of fault directly reducing property share is more aggressive than most Western equitable distribution."}, {"word": "Section 498A", "jur": "IN-HMA", "score": 0.5125, "cf": 0.85, "asym": 0.95, "tb": 0.3, "em": 0.9, "notes": "Criminal provision for cruelty by husband/in-laws. Non-bailable. Can result in immediate arrest of entire family. No Western equivalent — family law cruelty is civil everywhere else. In India, it is a CRIMINAL offense."}, {"word": "Punong Barangay", "jur": "PH", "score": 0.505, "cf": 0.85, "asym": 0.7, "tb": 0.7, "em": 0.65, "notes": "Filipino: \"barangay captain.\" Combines executive and quasi-judicial authority: chairs Lupon AND issues protection orders. No Western parallel — a community elected official with judicial-type powers."}, {"word": "alienação parental", "jur": "BR", "score": 0.4925, "cf": 0.85, "asym": 0.7, "tb": 0.4, "em": 0.8, "notes": "Translation: parental-alienation. Brazil has a DEDICATED STATUTE on parental alienation (Lei 12.318/2010) — one of very few countries. Defines 7 specific acts of alienation and provides escalating sanctions up to custody loss. No US equivalent at federal level."}, {"word": "Kindeswohl", "jur": "DE", "score": 0.48250002, "cf": 0.85, "asym": 0.5, "tb": 0.6, "em": 0.7, "notes": "Translation: child-welfare. Broader than US \"best interests\" — includes Kindeswille (child's will) as separate factor. The child's own expressed preference has independent legal weight."}, {"word": "hadanah (حضانة)", "jur": "SA", "score": 0.4775, "cf": 0.85, "asym": 0.6, "tb": 0.5, "em": 0.7, "notes": "Translation: custodial-care. Distinguished from wilayah (legal guardianship). Mother gets physical care, father keeps legal authority. No Western equivalent for this split — US \"custody\" combines both. Islamic law separates them fundamentally."}, {"word": "Umgangsrecht", "jur": "DE", "score": 0.4725, "cf": 0.85, "asym": 0.6, "tb": 0.5, "em": 0.7, "notes": "Translation: contact-right. Key difference from US \"visitation\" — it is conceptualized as the CHILD's right to contact, not the parent's right to visit. The child is the rights-holder."}, {"word": "patria potestad", "jur": "MX", "score": 0.4675, "cf": 0.85, "asym": 0.5, "tb": 0.5, "em": 0.7, "notes": "Translation: fatherland-authority. Roman law concept surviving in Mexican civil code. Both parents ALWAYS retain patria potestad unless forfeited — divorce does not affect it. US has nothing equivalent — US custody ends on termination of parental rights."}, {"word": "kasunduan", "jur": "PH", "score": 0.465, "cf": 0.85, "asym": 0.6, "tb": 0.55, "em": 0.65, "notes": "Filipino: \"covenant/agreement.\" Settlement before the Lupon that has the force of a court judgment. Deeper than English \"settlement\" — connotes community-witnessed covenant. No Anglo-American ADR equivalent."}, {"word": "Sorgerecht", "jur": "DE", "score": 0.4625, "cf": 0.85, "asym": 0.5, "tb": 0.5, "em": 0.7, "notes": "Translation: care-right. Combines legal and physical custody into one concept. Has sub-categories: Personensorge (care of person), Vermögenssorge (care of property). No US equivalent for this unified concept."}, {"word": "verspilling", "jur": "NL", "score": 0.4625, "cf": 0.85, "asym": 0.7, "tb": 0.4, "em": 0.7, "notes": "Translation: wasteful-squandering. Dutch statutory term for marital property dissipation. More specific than English \"waste\" — implies reckless, deliberate squandering."}, {"word": "bodelning", "jur": "SE", "score": 0.4625, "cf": 0.85, "asym": 0.5, "tb": 0.5, "em": 0.7, "notes": "Translation: property-division. Mandatory equal split of all giftorättsgods. More rigid than US equitable distribution — everything is 50/50 unless excluded by prenup or gift condition."}, {"word": "guarda compartilhada", "jur": "BR", "score": 0.4625, "cf": 0.85, "asym": 0.5, "tb": 0.5, "em": 0.7, "notes": "Translation: shared-custody. Brazilian default since 2014 even when parents DISAGREE. One of the strongest shared custody presumptions in the world. US has no comparable mandatory presumption at federal level."}, {"word": "dwangsom", "jur": "NL", "score": 0.4575, "cf": 0.85, "asym": 0.6, "tb": 0.4, "em": 0.7, "notes": "Translation: compulsion-sum. Dutch coercive fine, equivalent to French astreinte. Accumulating daily fine for non-compliance. No US equivalent — US uses contempt (punitive) while dwangsom is purely coercive (forward-looking)."}, {"word": "separazione", "jur": "IT", "score": 0.4425, "cf": 0.85, "asym": 0.5, "tb": 0.5, "em": 0.6, "notes": "Translation: separation. Mandatory first step before divorce in Italy. 6 months consensual, 12 months contested. No US state requires this mandatory two-step process. Italy forces a cooling-off separation before divorce is even possible."}, {"word": "foreldreansvar", "jur": "NO", "score": 0.4375, "cf": 0.85, "asym": 0.5, "tb": 0.5, "em": 0.6, "notes": "Translation: parental-responsibility. Broader than \"custody.\" Encompasses all parental decision-making power. Norway distinguishes foreldreansvar (authority), fast bosted (residence), and samvær (contact) as three separate legal concepts. US lumps these together."}, {"word": "tvangsmulkt", "jur": "NO", "score": 0.4225, "cf": 0.85, "asym": 0.5, "tb": 0.4, "em": 0.6, "notes": "Translation: coercive-fine. Norwegian equivalent of Swedish vite, Dutch dwangsom, French astreinte. Civil law enforcement without contempt power."}, {"word": "vite", "jur": "SE", "score": 0.4225, "cf": 0.85, "asym": 0.5, "tb": 0.4, "em": 0.6, "notes": "Translation: coercive-fine. Swedish enforcement tool. Similar to French astreinte and Dutch dwangsom. Per-occasion fine to compel compliance. No US equivalent — US uses contempt."}, {"word": "delt bosted", "jur": "NO", "score": 0.41750002, "cf": 0.85, "asym": 0.5, "tb": 0.4, "em": 0.6, "notes": "Translation: shared-residence. Not \"joint custody\" — Norway separates where the child LIVES from who makes DECISIONS. Delt bosted = child lives 50/50 with both parents. US conflates residence and decision-making under \"custody.\""}, {"word": "bopæl", "jur": "DK", "score": 0.3825, "cf": 0.85, "asym": 0.4, "tb": 0.4, "em": 0.5, "notes": "Translation: residence/domicile. Denmark separates bopæl (where child lives), forældremyndighed (authority), and samvær (contact) as three independent legal concepts. Like Norway. US conflates these under \"custody.\""}, {"word": "børnebidrag", "jur": "DK", "score": 0.3825, "cf": 0.85, "asym": 0.4, "tb": 0.4, "em": 0.5, "notes": "Translation: child-contribution. Key Danish concept: if parents share 7/7 time, NEITHER pays child support — each is deemed to fulfill their obligation directly. No US equivalent — US always calculates support regardless of equal time."}], "concept_words": {"constitutional_floor": {"label": "Constitutional Floor", "words": [{"word": "imprisonment for debt", "score": 0.785, "tier": "NUCLEAR", "jurs": 7}, {"word": "due process of law", "score": 0.7725, "tier": "NUCLEAR", "jurs": 1}, {"word": "habeas corpus", "score": 0.77, "tier": "NUCLEAR", "jurs": 1}, {"word": "law of the land", "score": 0.7675, "tier": "NUCLEAR", "jurs": 1}, {"word": "no imprisonment for debt except fraud", "score": 0.7375, "tier": "HIGH", "jurs": 1}, {"word": "no imprisonment for debt", "score": 0.73, "tier": "HIGH", "jurs": 2}, {"word": "necessary comforts of life", "score": 0.705, "tier": "HIGH", "jurs": 1}, {"word": "absconding debtors", "score": 0.6375, "tier": "HIGH", "jurs": 1}]}, "contempt_standard": {"label": "Contempt Standard", "words": [{"word": "intentional disobedience", "score": 0.865, "tier": "NUCLEAR", "jurs": 1}, {"word": "disobedience", "score": 0.8625, "tier": "NUCLEAR", "jurs": 1}, {"word": "willful f const tierColor = { NUCLEAR: '#ff6b6b', HIGH: '#ffd43b', MEDIUM: '#69db7c', GAP: '#cc5de8', LOW: '#4a5580' };
const conceptColor = {
    fee_sanctions: '#4dabf7', filing_sanctions: '#74c0fc', support_modification: '#69db7c',
    contempt_standard: '#ff6b6b', purge_standard: '#ff922b', dissipation: '#ffd43b',
    custody_enforcement: '#e599f7', financial_disclosure: '#38d9a9', constitutional_floor: '#748ffc',
    discovery_enforcement: '#20c997'
};

let nodes = [];
let edges = [];
let currentView = 'network';
let dragging = null;
let mouseX = 0, mouseY = 0;
let hoveredNode = null;

function buildNetwork() {
    nodes = [];
    edges = [];
    const wordSet = new Set();
    const nodeMap = {};

    graphData.top_words.forEach((w, i) => {
        const angle = (i / graphData.top_words.length) * Math.PI * 2;
        const r = 200 + w.score * 150;
        const node = {
            id: w.word, x: W/2 + Math.cos(angle) * r + (Math.random()-0.5)*80,
            y: H/2 + Math.sin(angle) * r + (Math.random()-0.5)*80,
            vx: 0, vy: 0,
            radius: 4 + w.score * 12,
            color: w.foreign ? '#cc5de8' : (tierColor[w.tier] || '#4a5580'),
            score: w.score, tier: w.tier, jurs: w.jurs,
            notes: w.notes, foreign: w.foreign,
            cf: w.cf, em: w.em, tb: w.tb, asym: w.asym
        };
        nodes.push(node);
        nodeMap[w.word] = node;
        wordSet.add(w.word);
    });

    graphData.synonym_edges.forEach(e => {
        if (nodeMap[e.from] && nodeMap[e.to]) {
            edges.push({ from: nodeMap[e.from], to: nodeMap[e.to], concept: e.concept });
        }
    });

    document.getElementById('node-count').textContent = nodes.length;
    document.getElementById('edge-count').textContent = edges.length;
    document.getElementById('concept-count').textContent = Object.keys(graphData.concept_words).length;
}

function buildConceptView() {
    nodes = [];
    edges = [];
    const concepts = Object.entries(graphData.concept_words);
    const nodeMap = {};

    concepts.forEach(([name, data], ci) => {
        const cx = W * 0.15 + (ci % 5) * (W * 0.17);
        const cy = H * 0.25 + Math.floor(ci / 5) * (H * 0.4);
        const cnode = {
            id: name, x: cx, y: cy, vx: 0, vy: 0,
            radius: 18, color: conceptColor[name] || '#4a5580',
            score: 1, tier: 'CONCEPT', label: data.label,
            isConcept: true, notes: data.label
        };
        nodes.push(cnode);
        nodeMap[name] = cnode;

        data.words.forEach((w, wi) => {
            const angle = (wi / data.words.length) * Math.PI * 2;
            const wnode = {
                id: w.word + '_' + name, x: cx + Math.cos(angle) * 80,
                y: cy + Math.sin(angle) * 80, vx: 0, vy: 0,
                radius: 3 + w.score * 8,
                color: tierColor[w.tier] || '#4a5580',
                score: w.score, tier: w.tier, jurs: w.jurs,
                notes: w.word, word: w.word
            };
            nodes.push(wnode);
            edges.push({ from: cnode, to: wnode });
        });
    });

    document.getElementById('node-count').textContent = nodes.length;
    document.getElementById('edge-count').textContent = edges.length;
}

function simulate() {
    const k = 0.01;
    const repulsion = 2000;
    const damping = 0.85;

    nodes.forEach(a => {
        nodes.forEach(b => {
            if (a === b) return;
            let dx = a.x - b.x, dy = a.y - b.y;
            let dist = Math.sqrt(dx*dx + dy*dy) || 1;
            let force = repulsion / (dist * dist);
            a.vx += (dx / dist) * force * k;
            a.vy += (dy / dist) * force * k;
        });
    });

    edges.forEach(e => {
        let dx = e.to.x - e.from.x, dy = e.to.y - e.from.y;
        let dist = Math.sqrt(dx*dx + dy*dy) || 1;
        let target = currentView === 'concepts' ? 90 : 150;
        let force = (dist - target) * 0.003;
        e.from.vx += (dx / dist) * force;
        e.from.vy += (dy / dist) * force;
        e.to.vx -= (dx / dist) * force;
        e.to.vy -= (dy / dist) * force;
    });

    nodes.forEach(n => {
        if (n === dragging) return;
        let cx = W/2, cy = H/2;
        n.vx += (cx - n.x) * 0.0003;
        n.vy += (cy - n.y) * 0.0003;
        n.vx *= damping; n.vy *= damping;
        n.x += n.vx; n.y += n.vy;
        n.x = Math.max(30, Math.min(W-30, n.x));
        n.y = Math.max(70, Math.min(H-30, n.y));
    });
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    edges.forEach(e => {
        ctx.beginPath();
        ctx.moveTo(e.from.x, e.from.y);
        ctx.lineTo(e.to.x, e.to.y);
        ctx.strokeStyle = e.concept ? (conceptColor[e.concept] || '#1e2540') + '40' : '#1e254060';
        ctx.lineWidth = 0.5;
        ctx.stroke();
    });

    nodes.forEach(n => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
        ctx.fillStyle = n === hoveredNode ? '#ffffff' : n.color;
        ctx.globalAlpha = n === hoveredNode ? 1 : 0.85;
        ctx.fill();
        ctx.globalAlpha = 1;

        if (n.radius > 8 || n === hoveredNode || n.isConcept) {
            ctx.fillStyle = '#c8d0e0';
            ctx.font = n.isConcept ? 'bold 11px Inter, system-ui, sans-serif' : '10px SF Mono, monospace';
            ctx.textAlign = 'center';
            const label = n.isConcept ? n.label : (n.word || n.id);
            ctx.fillText(label, n.x, n.y + n.radius + 12);
        }
    });
}

function showTooltip(n) {
    const tip = document.getElementById('tooltip');
    const wordLabel = n.word || n.id;
    const jurStr = n.jurs ? (Array.isArray(n.jurs) ? n.jurs.join(', ') : n.jurs) : '';
    const tierStr = n.tier || '';
    const color = n.color;

    let taxesHtml = '';
    if (n.tb !== undefined) {
        taxesHtml = `<div class="taxes">
            <div class="tax"><div class="tax-label">TRIGGER</div><div class="tax-val" style="color:#4dabf7">${(n.tb||0).toFixed(2)}</div></div>
            <div class="tax"><div class="tax-label">EFFECT</div><div class="tax-val" style="color:#ff6b6b">${(n.em||0).toFixed(2)}</div></div>
            <div class="tax"><div class="tax-label">FRICTION</div><div class="tax-val" style="color:#cc5de8">${(n.cf||0).toFixed(2)}</div></div>
            <div class="tax"><div class="tax-label">ASYMMETRY</div><div class="tax-val" style="color:#ff922b">${(n.asym||0).toFixed(2)}</div></div>
        </div>`;
    }

    tip.innerHTML = `
        <div class="tw" style="color:${color}">${wordLabel}</div>
        <div class="tj">${jurStr} · ${tierStr} · score: ${(n.score||0).toFixed(3)}</div>
        <div class="tn">${n.notes || ''}</div>
        ${taxesHtml}
    `;
    tip.style.display = 'block';
    tip.style.left = Math.min(mouseX + 15, W - 420) + 'px';
    tip.style.top = Math.min(mouseY + 15, H - 200) + 'px';
}

function buildForeignPanel() {
    const panel = document.getElementById('foreign-panel');
    const words = graphData.foreign_words.filter(w => w.cf >= 0.90).sort((a,b) => b.cf - a.cf || b.score - a.score);

    const arguments_map = {
        'umgangessabotage': '"Your Honor, the Swedish legal system has a word for what this parent is doing — umgängessabotage, contact sabotage. We don\'t have that word, which is precisely why it keeps happening unaddressed."',
        'agunah (עגונה)': '"The concept of agunah — a woman chained to a marriage by her husband\'s refusal — has no English equivalent. That absence of language is itself an absence of remedy."',
        'pagpapawalang-bisa': '"The Philippines ran an entire nation on this word — rendering without validity — because they had no divorce. When a legal system lacks a word, it lacks the concept. When it lacks the concept, it lacks the remedy."',
        '冷静期 (lěngjìng qī)': '"China\'s mandatory 30-day cooling-off period reduced divorces by 33-42%. The concept — forcing reflection before dissolution — has no equivalent in American law, where filing and finality are treated as the same act."',
        'shinken (親権)': '"Japan was the last G7 country with mandatory sole custody. Their word shinken — parental authority — carried an assumption we refuse to name: that one parent must lose everything."',
        'recel de communauté': '"In France, hiding assets doesn\'t result in an add-back. It results in forfeiture of the hidden portion. We call it dissipation. They call it recel de communauté. The French word has teeth ours doesn\'t."',
        'Versorgungsausgleich': '"In Germany, the court splits pensions automatically — no one has to ask. They call it Versorgungsausgleich. We make parties fight for QDROs. The missing default IS the inequity."',
        'get (גט)': '"Under Israeli law, a husband holds absolute veto over divorce through the get. No secular legal system gives one party that power. The word names a structural asymmetry we pretend doesn\'t exist."',
        'lijfsdwang': '"Dutch law has lijfsdwang — body-compulsion — a specific mechanism for imprisoning those who willfully refuse to pay support. Not contempt. Not debt collection. A named, purpose-built tool. We lack it."',
        'Betreuungsunterhalt': '"Swiss law compensates the caregiver\'s lost earnings as part of child support — Betreuungsunterhalt. American law treats caregiving as invisible labor. The missing word hides the missing compensation."',
        'mu\'sir': '"Islamic law names the person who cannot pay — mu\'sir — and grants them respite as a matter of right, not judicial discretion. We have no word for this. Our system treats inability and unwillingness as the same thing."',
    };

    panel.innerHTML = `<h2>Foreign Arguments — Words as Legal Weapons</h2>
        <p style="color:#6b7394;font-size:11px;margin-bottom:12px;line-height:1.5">
        These words name concepts that English law cannot express. The absence of the word IS the argument.
        When a legal system lacks a word for something, it lacks the ability to address it.</p>
        ${words.map(w => {
            const arg = arguments_map[w.word] || '';
            return `<div class="fcard">
                <div class="fw">${w.word}</div>
                <div class="fj">${w.jur} · friction: ${w.cf.toFixed(2)} · score: ${w.score.toFixed(3)}</div>
                <div class="fn">${w.notes.substring(0, 200)}</div>
                ${arg ? `<div class="farg">${arg}</div>` : ''}
            </div>`;
        }).join('')}`;
}

function toggleForeign() {
    const panel = document.getElementById('foreign-panel');
    panel.classList.toggle('open');
    document.getElementById('btn-foreign').classList.toggle('active');
}

function setView(view, btn) {
    currentView = view;
    document.querySelectorAll('.controls button:not(#btn-foreign)').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (view === 'network') buildNetwork();
    else buildConceptView();
}

canvas.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
    hoveredNode = null;
    for (const n of nodes) {
        const dx = e.clientX - n.x, dy = e.clientY - n.y;
        if (dx*dx + dy*dy < (n.radius+4) * (n.radius+4)) {
            hoveredNode = n;
            break;
        }
    }
    if (hoveredNode) { showTooltip(hoveredNode); canvas.style.cursor = 'pointer'; }
    else { document.getElementById('tooltip').style.display = 'none'; canvas.style.cursor = 'default'; }
    if (dragging) { dragging.x = e.clientX; dragging.y = e.clientY; dragging.vx = 0; dragging.vy = 0; }
});

canvas.addEventListener('mousedown', e => {
    for (const n of nodes) {
        const dx = e.clientX - n.x, dy = e.clientY - n.y;
        if (dx*dx + dy*dy < (n.radius+4) * (n.radius+4)) { dragging = n; break; }
    }
});
canvas.addEventListener('mouseup', () => { dragging = null; });

buildNetwork();
buildForeignPanel();

function loop() {
    simulate();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
