<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal Leverage Words — 3D Space</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #c0c0c0; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
#header { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 14px 20px; background: linear-gradient(to bottom, rgba(10,10,10,0.95), rgba(10,10,10,0)); pointer-events: none; }
#header h1 { font-size: 16px; font-weight: 700; color: #c0a060; letter-spacing: 3px; }
#header p { font-size: 10px; color: #666; margin-top: 3px; }
#controls { position: fixed; top: 14px; right: 20px; z-index: 10; display: flex; gap: 6px; }
#controls button { background: rgba(20,20,20,0.9); border: 1px solid #333; color: #888; padding: 5px 12px; font-size: 10px; font-family: inherit; cursor: pointer; letter-spacing: 1px; }
#controls button:hover, #controls button.active { color: #c0a060; border-color: #c0a060; }
#canvas-container { width: 100vw; height: 100vh; }
#tooltip { position: fixed; display: none; background: rgba(10,10,10,0.97); border: 1px solid #c0a060; padding: 12px 16px; font-size: 11px; pointer-events: none; z-index: 100; max-width: 360px; box-shadow: 0 0 30px rgba(192,160,96,0.15); }
#tooltip .tw { font-size: 15px; font-weight: 700; color: #c0a060; margin-bottom: 3px; }
#tooltip .tj { color: #666; font-size: 10px; margin-bottom: 5px; }
#tooltip .tn { color: #999; font-size: 10px; line-height: 1.4; }
#tooltip .taxes { display: flex; gap: 8px; margin-top: 6px; }
#tooltip .tax { text-align: center; }
#tooltip .tax-l { font-size: 8px; color: #555; }
#tooltip .tax-v { font-size: 12px; font-weight: 500; }
#legend { position: fixed; left: 16px; bottom: 16px; z-index: 10; background: rgba(10,10,10,0.9); border: 1px solid #222; padding: 10px 14px; font-size: 10px; }
#legend .row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
#legend .dot { width: 8px; height: 8px; border-radius: 50%; }
#stats { position: fixed; right: 16px; bottom: 16px; z-index: 10; background: rgba(10,10,10,0.9); border: 1px solid #222; padding: 10px 14px; font-size: 10px; color: #666; text-align: right; }
nav { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 10px; }
nav a { color: #c0a060; text-decoration: none; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="header">
  <h1>LEGAL WORD SPACE</h1>
  <p style="font-size:11px;color:#888;margin-top:2px">282,600 words in database — 2,818 highest-leverage terms projected from 6-dimensional scoring space into 3D</p>
  <p id="subtitle" style="font-size:10px;color:#555;margin-top:2px">drag to orbit · scroll to zoom · hover for detail</p>
</div>
<div id="controls">
  <button class="active" onclick="setEmbed('t3',this)">t-SNE 3D</button>
  <button onclick="setEmbed('p3',this)">PCA 3D</button>
  <span style="border-left:1px solid #333;margin:0 4px"></span>
  <button class="active" onclick="setColor('tier',this)">TIER</button>
  <button onclick="setColor('domain',this)">DOMAIN</button>
  <button onclick="setColor('friction',this)">FRICTION</button>
  <button onclick="setColor('score',this)">SCORE</button>
</div>
<div id="canvas-container"></div>
<div id="tooltip"></div>
<div id="legend"></div>
<div id="stats"></div>
<nav>
  <a href="v2.html">Word Index</a> ·
  <a href="tsne.html">t-SNE 2D</a> ·
  <a href="tensor.html">PCA Biplot</a> ·
  <a href="tree.html">Tradition Tree</a> ·
  <a href="graph.html">Concept Graph</a> ·
  <a href="index.html">Original (48 words)</a>
</nav>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Data loaded from data/embeddings.json
let E = null;
fetch('data/embeddings.json')
  .then(r => r.json())
  .then(d => { E = d; onDataLoaded(); })
  .catch(e => document.body.innerHTML = '<p style="color:#ff6b6b;padding:40px">Failed to load data/embeddings.json: ' + e + '</p>');

const domainColors = {
    family:0x69db7c, maritime:0x4dabf7, criminal:0xff6b6b, constitutional:0x748ffc,
    tort:0xff922b, property:0xffd43b, commercial:0x38d9a9, tax:0xe599f7, labor:0x74c0fc,
    iate_law:0x4a6a8a, iate_finance:0x6a8a4a, iate_insurance:0x8a6a4a,
    iate_social:0x6a4a8a, iate_admin:0x4a8a6a, iate_commercial:0x8a4a6a
};
const tierColors = {nuclear:0xff6b6b, high:0xffd43b, medium:0x69db7c, gap:0xcc5de8, low:0x4a5580};
const axLabels = ['TRIGGER','EFFECT','DEPTH','CROSS-J','FRICTION','ASYMM'];
const axColors = ['#4dabf7','#ff6b6b','#ffd43b','#69db7c','#cc5de8','#ff922b'];

let embedMode = 't3';
let colorMode = 'tier';
let container, scene, camera, renderer, points, raycaster, mouse;
let hovered = -1;

function init() {
    container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
    camera.position.set(2.5, 2, 3);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    container.appendChild(renderer.domElement);

    raycaster = new THREE.Raycaster();
    raycaster.params.Points.threshold = 0.05;
    mouse = new THREE.Vector2();

    buildPoints();
    buildAxes();
    updateLegend();
    updateStats();

    // Orbit controls (manual)
    let isDragging = false, prevX, prevY;
    let theta = 0.8, phi = 0.5, radius = 4;

    function updateCamera() {
        camera.position.x = radius * Math.sin(phi) * Math.cos(theta);
        camera.position.y = radius * Math.cos(phi);
        camera.position.z = radius * Math.sin(phi) * Math.sin(theta);
        camera.lookAt(0, 0, 0);
    }
    updateCamera();

    renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
    renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
    renderer.domElement.addEventListener('mousemove', e => {
        mouse.x = (e.clientX / innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / innerHeight) * 2 + 1;
        if (isDragging) {
            theta += (e.clientX - prevX) * 0.005;
            phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi + (e.clientY - prevY) * 0.005));
            prevX = e.clientX; prevY = e.clientY;
            updateCamera();
        }
        checkHover(e);
    });
    renderer.domElement.addEventListener('wheel', e => {
        radius = Math.max(1.5, Math.min(10, radius + e.deltaY * 0.005));
        updateCamera();
    });

    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });

    animate();
}

function getColor(w) {
    if (colorMode === 'tier') {
        if (w.f) return 0xcc5de8;
        if (w.s >= 0.75) return 0xff6b6b;
        if (w.s >= 0.60) return 0xffd43b;
        if (w.s >= 0.45) return 0x69db7c;
        return 0x4a5580;
    }
    if (colorMode === 'domain') return domainColors[w.d] || 0x4a5580;
    if (colorMode === 'score') {
        const t = Math.max(0, Math.min(1, (w.s - 0.3) / 0.7));
        return new THREE.Color().setHSL(t * 0.3, 0.8, 0.5).getHex();
    }
    if (colorMode === 'friction') {
        const t = w.ax[4];
        return new THREE.Color().setHSL(0.8 - t * 0.5, 0.7, 0.3 + t * 0.4).getHex();
    }
    return 0x4a5580;
}

function buildPoints() {
    if (points) scene.remove(points);
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(E.words.length * 3);
    const colors = new Float32Array(E.words.length * 3);
    const sizes = new Float32Array(E.words.length);

    E.words.forEach((w, i) => {
        const pos = w[embedMode];
        positions[i*3] = pos[0];
        positions[i*3+1] = pos[1];
        positions[i*3+2] = pos[2];
        const c = new THREE.Color(getColor(w));
        colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
        sizes[i] = w.f ? 6 : (w.s >= 0.75 ? 4 : (w.s >= 0.6 ? 3 : 2));
    });

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const mat = new THREE.PointsMaterial({
        size: 0.04, vertexColors: true, transparent: true, opacity: 0.75,
        sizeAttenuation: true, depthWrite: false
    });
    points = new THREE.Points(geo, mat);
    scene.add(points);
}

function buildAxes() {
    // Subtle grid
    const grid = new THREE.GridHelper(4, 20, 0x1a1a1a, 0x111111);
    grid.position.y = -1;
    scene.add(grid);
    // Origin axes
    const axMat = [0x4dabf7, 0xff6b6b, 0x69db7c];
    const dirs = [new THREE.Vector3(1,0,0), new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,1)];
    dirs.forEach((d, i) => {
        const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), d.clone().multiplyScalar(1.2)]);
        scene.add(new THREE.Line(geo, new THREE.LineBasicMaterial({color: axMat[i], transparent: true, opacity: 0.3})));
    });
}

function checkHover(e) {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(points);
    const tip = document.getElementById('tooltip');

    if (intersects.length > 0) {
        const idx = intersects[0].index;
        if (idx !== hovered) {
            hovered = idx;
            const w = E.words[idx];
            tip.innerHTML = `
                <div class="tw">${w.w}</div>
                <div class="tj">${w.j} · ${w.d} · ${w.s.toFixed(3)}${w.f ? ' · FOREIGN' : ''}</div>
                <div class="tn">${w.n}</div>
                <div class="taxes">${w.ax.map((v,i) => 
                    `<div class="tax"><div class="tax-l">${axLabels[i]}</div><div class="tax-v" style="color:${axColors[i]}">${v.toFixed(2)}</div></div>`
                ).join('')}</div>
            `;
        }
        tip.style.display = 'block';
        tip.style.left = Math.min(e.clientX + 15, innerWidth - 380) + 'px';
        tip.style.top = Math.min(e.clientY + 15, innerHeight - 200) + 'px';
        document.body.style.cursor = 'crosshair';
    } else {
        hovered = -1;
        tip.style.display = 'none';
        document.body.style.cursor = 'default';
    }
}

function setEmbed(mode, btn) {
    embedMode = mode;
    document.querySelectorAll('#controls button').forEach(b => {
        if (b.textContent.includes('SNE') || b.textContent.includes('PCA'))
            b.classList.remove('active');
    });
    btn.classList.add('active');
    buildPoints();
    const label = mode === 't3' ? 't-SNE 3D (nonlinear, preserves clusters)' : 'PCA 3D (linear, ' + E.pca_var.map(v=>(v*100).toFixed(0)+'%').join('+') + ' variance)';
    document.getElementById('subtitle').textContent = `2,818 words · ${label} · drag to orbit`;
}

function setColor(mode, btn) {
    colorMode = mode;
    document.querySelectorAll('#controls button').forEach(b => {
        if (['DOMAIN','SCORE','FRICTION','TIER'].includes(b.textContent))
            b.classList.remove('active');
    });
    btn.classList.add('active');
    buildPoints();
    updateLegend();
}

function updateLegend() {
    const leg = document.getElementById('legend');
    if (colorMode === 'tier') {
        leg.innerHTML = `
            <div class="row"><div class="dot" style="background:#ff6b6b"></div> Nuclear ≥0.75</div>
            <div class="row"><div class="dot" style="background:#ffd43b"></div> High 0.60-0.75</div>
            <div class="row"><div class="dot" style="background:#69db7c"></div> Medium 0.45-0.60</div>
            <div class="row"><div class="dot" style="background:#cc5de8"></div> Foreign Gap</div>
            <div class="row"><div class="dot" style="background:#4a5580"></div> Low</div>`;
    } else if (colorMode === 'domain') {
        const doms = [...new Set(E.words.map(w => w.d))].sort();
        leg.innerHTML = doms.slice(0,12).map(d => {
            const c = domainColors[d] || 0x4a5580;
            return `<div class="row"><div class="dot" style="background:#${c.toString(16).padStart(6,'0')}"></div> ${d}</div>`;
        }).join('');
    } else {
        leg.innerHTML = `<div style="color:#666">${colorMode}</div>`;
    }
}

function updateStats() {
    const foreign = E.words.filter(w => w.f).length;
    const nuclear = E.words.filter(w => !w.f && w.s >= 0.75).length;
    const high = E.words.filter(w => !w.f && w.s >= 0.60 && w.s < 0.75).length;
    const domains = new Set(E.words.map(w => w.d)).size;
    const jurs = new Set(E.words.map(w => w.j)).size;
    document.getElementById('stats').innerHTML = `
        <div style="color:#c0a060;font-weight:700;margin-bottom:4px">${E.words.length.toLocaleString()} WORDS</div>
        ${jurs} jurisdictions<br>
        ${domains} legal domains<br>
        <span style="color:#ff6b6b">${nuclear}</span> nuclear ·
        <span style="color:#ffd43b">${high}</span> high ·
        <span style="color:#cc5de8">${foreign}</span> foreign<br>
        <div style="margin-top:6px;color:#555">6D scoring axes:<br>
        trigger · effect · depth<br>
        cross-jur · friction · asymmetry</div>`;
}

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

function onDataLoaded() {
  init();
}
</script>
</body>
</html>
