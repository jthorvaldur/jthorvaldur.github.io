        const t = w.em;
        const r = Math.round(t * 255);
        const g = Math.round((1 - t) * 100 + 80);
        const b = Math.round((1 - t) * 100);
        return `rgb(${r},${g},${b})`;
    }
    return '#4a5580';
}

function toScreen(x, y) {
    return [CX + x * SCALE, CY - y * SCALE];
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = '#141830';
    ctx.lineWidth = 1;
    for (let i = -1; i <= 1; i += 0.5) {
        const [x1, y1] = toScreen(-1.2, i);
        const [x2, y2] = toScreen(1.2, i);
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        const [x3, y3] = toScreen(i, -1.2);
        const [x4, y4] = toScreen(i, 1.2);
        ctx.beginPath(); ctx.moveTo(x3, y3); ctx.lineTo(x4, y4); ctx.stroke();
    }

    // Origin cross
    ctx.strokeStyle = '#1e2540';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(CX - SCALE * 1.2, CY); ctx.lineTo(CX + SCALE * 1.2, CY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(CX, CY - SCALE * 1.2); ctx.lineTo(CX, CY + SCALE * 1.2); ctx.stroke();

    // Biplot arrows (PCA loading vectors)
    if (showArrows) {
        T.arrows.forEach(a => {
            const [ax, ay] = toScreen(a.x, a.y);
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.lineTo(ax, ay);
            ctx.strokeStyle = axisColors[a.axis] || '#4a5580';
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.6;
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Arrowhead
            const angle = Math.atan2(CY - ay, ax - CX);
            ctx.beginPath();
            ctx.moveTo(ax, ay);
            ctx.lineTo(ax - 8 * Math.cos(angle - 0.4), ay + 8 * Math.sin(angle - 0.4));
            ctx.lineTo(ax - 8 * Math.cos(angle + 0.4), ay + 8 * Math.sin(angle + 0.4));
            ctx.fillStyle = axisColors[a.axis];
            ctx.globalAlpha = 0.6;
            ctx.fill();
            ctx.globalAlpha = 1;

            // Label at arrow tip
            ctx.fillStyle = axisColors[a.axis];
            ctx.font = '10px Inter, system-ui, sans-serif';
            ctx.textAlign = ax > CX ? 'left' : 'right';
            ctx.fillText(a.label, ax + (ax > CX ? 10 : -10), ay + 4);
        });
    }

    // Plot words
    T.words.forEach(w => {
        const [sx, sy] = toScreen(w.x, w.y);
        const r = w.foreign ? 4 + w.cf * 5 : 2 + w.score * 7;
        const color = getColor(w);
        const isHov = w === hovered;

        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = isHov ? '#ffffff' : color;
        ctx.globalAlpha = isHov ? 1.0 : (w.foreign ? 0.9 : 0.6);
        ctx.fill();
        ctx.globalAlpha = 1;

        if (isHov) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        if (showLabels && (r > 6 || isHov)) {
            ctx.fillStyle = isHov ? '#ffffff' : '#6b739480';
            ctx.font = w.foreign ? 'bold 9px SF Mono, monospace' : '8px SF Mono, monospace';
            ctx.textAlign = 'center';
            const label = w.word.length > 22 ? w.word.slice(0, 20) + '…' : w.word;
            ctx.fillText(label, sx, sy + r + 10);
        }
    });

    // Axis annotations at edges
    ctx.fillStyle = '#2a3050';
    ctx.font = '11px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('← Established / Universal', CX - SCALE * 0.6, H - 60);
    ctx.fillText('Exotic / High Friction →', CX + SCALE * 0.6, H - 60);
    ctx.save();
    ctx.translate(25, CY);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('← Defensive / Procedural', -SCALE * 0.5, 0);
    ctx.fillText('Nuclear / Offensive →', SCALE * 0.5, 0);
    ctx.restore();
}

function showTooltip(w) {
    const tip = document.getElementById('tooltip');
    tip.innerHTML = `
        <div class="tw" style="color:${getColor(w)}">${w.word}</div>
        <div class="tj">${w.jur} · ${w.domain} · score: ${w.score.toFixed(3)}${w.foreign ? ' · FOREIGN GAP' : ''}</div>
        <div class="tn">${w.notes}</div>
        <div class="taxes">
            <div class="tax"><div class="tax-label">TRIGGER</div><div class="tax-val" style="color:#4dabf7">${w.tb.toFixed(2)}</div></div>
            <div class="tax"><div class="tax-label">EFFECT</div><div class="tax-val" style="color:#ff6b6b">${w.em.toFixed(2)}</div></div>
            <div class="tax"><div class="tax-label">DEPTH</div><div class="tax-val" style="color:#ffd43b">${w.sd.toFixed(2)}</div></div>
            <div class="tax"><div class="tax-label">CROSS-JUR</div><div class="tax-val" style="color:#69db7c">${w.cj.toFixed(2)}</div></div>
            <div class="tax"><div class="tax-label">FRICTION</div><div class="tax-val" style="color:#cc5de8">${w.cf.toFixed(2)}</div></div>
            <div class="tax"><div class="tax-label">ASYMM</div><div class="tax-val" style="color:#ff922b">${w.asym.toFixed(2)}</div></div>
        </div>
    `;
    tip.style.display = 'block';
    tip.style.left = Math.min(mx + 20, W - 440) + 'px';
    tip.style.top = Math.min(my + 15, H - 250) + 'px';
}

function updateLegend() {
    const leg = document.getElementById('legend');
    if (colorMode === 'tier') {
        leg.innerHTML = `
            <div class="row"><div class="dot" style="background:#ff6b6b"></div> Nuclear (≥0.75)</div>
            <div class="row"><div class="dot" style="background:#ffd43b"></div> High (0.60-0.75)</div>
            <div class="row"><div class="dot" style="background:#69db7c"></div> Medium (0.45-0.60)</div>
            <div class="row"><div class="dot" style="background:#cc5de8"></div> Foreign Gap</div>
            <div class="row"><div class="dot" style="background:#4a5580"></div> Low (<0.45)</div>
        `;
    } else if (colorMode === 'domain') {
        leg.innerHTML = Object.entries(domainColors).map(([d, c]) =>
            `<div class="row"><div class="dot" style="background:${c}"></div> ${d}</div>`
        ).join('');
    } else if (colorMode === 'friction') {
        leg.innerHTML = `<div style="color:#6b7394">Color: cognitive friction<br>
            <span style="color:#33b4e8">low (standard term)</span> →
            <span style="color:#cc5de8">high (reader pauses)</span></div>`;
    } else {
        leg.innerHTML = `<div style="color:#6b7394">Color: effect magnitude<br>
            <span style="color:#505050">low (procedural)</span> →
            <span style="color:#ff0000">high (jail/treble)</span></div>`;
    }
}

function setColor(mode, btn) {
    colorMode = mode;
    document.querySelectorAll('.controls button').forEach(b => {
        if (!b.id) b.classList.remove('active');
    });
    btn.classList.add('active');
    updateLegend();
}

function toggleArrows(btn) { showArrows = !showArrows; btn.classList.toggle('active'); }
function toggleLabels(btn) { showLabels = !showLabels; btn.classList.toggle('active'); }

cv.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    hovered = null;
    for (const w of T.words) {
        const [sx, sy] = toScreen(w.x, w.y);
        const r = w.foreign ? 4 + w.cf * 5 : 2 + w.score * 7;
        const dx = mx - sx, dy = my - sy;
        if (dx*dx + dy*dy < (r+5)*(r+5)) { hovered = w; break; }
    }
    if (hovered) { showTooltip(hovered); cv.style.cursor = 'pointer'; }
    else { document.getElementById('tooltip').style.display = 'none'; cv.style.cursor = 'crosshair'; }
});

updateLegend();
function loop() { draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
